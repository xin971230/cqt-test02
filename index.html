<script>
const MCQ = [{"n": 1, "q": "根據 Juran 品質三部曲，下列哪項「不」屬於其中？", "opts": ["A. 品質規劃", "B. 品質改善", "C. 品質稽核", "D. 品質管制"], "ans": "C", "expl": "朱蘭三部曲=規劃+管制+改善，「稽核」不屬其中。"}, {"n": 2, "q": "ISO 9001:2015 共有幾個條款（Clauses）？", "opts": ["A. 8", "B. 10", "C. 12", "D. 14"], "ans": "B", "expl": "ISO 9001:2015 共10個條款（1~3為總則，4~10為要求）。"}, {"n": 3, "q": "品質成本中，「員工品質訓練」屬於哪類成本？", "opts": ["A. 鑑定成本", "B. 內部失敗成本", "C. 預防成本", "D. 外部失敗成本"], "ans": "C", "expl": "預防成本含訓練、設計審查；鑑定成本含檢驗；失敗成本含不良品。"}, {"n": 4, "q": "PDCA 循環中，「A（Act）」代表？", "opts": ["A. 分析問題根因", "B. 標準化並持續推廣最佳做法", "C. 比較實際與計畫差異", "D. 收集現場數據"], "ans": "B", "expl": "Plan=計畫，Do=執行，Check=查核，Act=標準化行動/持續改善。"}, {"n": 5, "q": "當顧客「感知」遠低於「期望」時，顧客狀態為？", "opts": ["A. 極度滿意", "B. 滿意", "C. 不滿意", "D. 中性"], "ans": "C", "expl": "滿意度=感知−期望；感知<期望→不滿意，越負越不滿意。"}, {"n": 6, "q": "下列哪項屬於「外部失敗成本」？", "opts": ["A. 製程重工", "B. 進料退料", "C. 客戶保固維修", "D. 成品報廢"], "ans": "C", "expl": "外部失敗=出廠後：召回、保固、退貨；內部失敗=出廠前：重工、報廢。"}, {"n": 7, "q": "TQM（全面品質管理）的顧客概念正確描述是？", "opts": ["A. 僅指最終消費者", "B. 內外部顧客均需滿足", "C. 以股東利益為優先", "D. 只考慮大客戶"], "ans": "B", "expl": "TQM顧客含內部顧客（下一製程）與外部顧客（終端使用者）。"}, {"n": 8, "q": "田口品質損失函數 L(y)=k(y−m)² 中，k=A/Δ²，其中 A 代表？", "opts": ["A. 規格容差（Tolerance）", "B. 功能界限", "C. 損壞或修理費用", "D. 製程標準差"], "ans": "C", "expl": "k=A/Δ²：A=修理費用（超過功能界限的損失），Δ=功能界限（容許偏差）。"}, {"n": 9, "q": "ISO 9001:2015 相比 2008 版，新增的重要要求是？", "opts": ["A. 品質手冊（強制）", "B. 風險思維與情境分析", "C. 管理代表（強制）", "D. 糾正措施報告格式"], "ans": "B", "expl": "2015版新增：風險思維（6.1）、情境分析（4.1/4.2）；取消強制品質手冊與管理代表。"}, {"n": 10, "q": "QFD「品質屋」中，「屋頂」代表的是？", "opts": ["A. 顧客需求（Whats）", "B. 工程特性相互關係矩陣", "C. 競爭者比較", "D. 技術目標值"], "ans": "B", "expl": "品質屋屋頂=工程特性（Hows）之間的相關矩陣，顯示技術特性間的取捨關係。"}, {"n": 11, "q": "六標準差（6σ）允許製程有1.5σ偏移時，其長期不良率為？", "opts": ["A. 3.4 PPM", "B. 6.8 PPM", "C. 0.34 PPM", "D. 233 PPM"], "ans": "A", "expl": "6σ含1.5σ偏移時不良率=3.4 PPM，這是六標準差的標準定義。"}, {"n": 12, "q": "IATF 16949 主要適用於哪個產業？", "opts": ["A. 航太製造業", "B. 汽車零組件供應鏈", "C. 醫療器材業", "D. 食品加工業"], "ans": "B", "expl": "IATF 16949 是汽車產業品質管理系統標準，以 ISO 9001 為基礎。"}, {"n": 13, "q": "FMEA 中，RPN（風險優先數）= ？", "opts": ["A. S + O + D", "B. S × O × D", "C. S × O", "D. (S+O+D)/3"], "ans": "B", "expl": "RPN=嚴重度(S)×發生頻度(O)×難檢度(D)，用於優先排序失效模式。"}, {"n": 14, "q": "5S 活動中，「整頓（Seiton）」的正確定義是？", "opts": ["A. 清除不需要的物品", "B. 物品定位、定量、標示清楚", "C. 維持清潔標準", "D. 養成良好工作習慣"], "ans": "B", "expl": "整理=去除不要物；整頓=定位定量；清掃=保持清潔；清潔=維持整頓清掃；素養=習慣養成。"}, {"n": 15, "q": "ISO 9001:2015 條款 6（規劃）的主要內容包含？", "opts": ["A. 人員訓練與能力", "B. 風險管理、品質目標、變更規劃", "C. 內部稽核程序", "D. 顧客滿意度調查"], "ans": "B", "expl": "條款6=規劃：6.1=風險機會，6.2=品質目標，6.3=變更規劃。條款7=支援（含人員訓練）。"}, {"n": 16, "q": "8D 問題解決法中，「永久矯正措施（PCA）」屬於哪一步？", "opts": ["A. D3：臨時圍堵措施", "B. D4：根本原因分析", "C. D5：永久矯正措施選擇", "D. D6：實施永久矯正措施"], "ans": "C", "expl": "D5=選擇並確認永久矯正措施（PCA），D6=實施PCA並驗效，需區分選擇(D5)與實施(D6)。"}, {"n": 17, "q": "「第二方稽核」是指？", "opts": ["A. 公司內部自我稽核", "B. 顧客或關係方對供應商進行稽核", "C. 第三方認證機構稽核", "D. 政府法規主管機關稽核"], "ans": "B", "expl": "第一方=內部稽核，第二方=顧客稽核供應商，第三方=認證機構（如BSI、SGS）。"}, {"n": 18, "q": "防錯法（Poka-Yoke）中「控制型（Control Type）」的特點是？", "opts": ["A. 發出警報提醒操作者", "B. 記錄錯誤供事後分析", "C. 完全阻止錯誤的發生", "D. 自動修正錯誤"], "ans": "C", "expl": "控制型=阻止錯誤繼續進行（強制性防錯）；警告型=發出警報但不阻止。"}, {"n": 19, "q": "APQP（先進產品品質規劃）共分為幾個階段？", "opts": ["A. 3", "B. 4", "C. 5", "D. 6"], "ans": "C", "expl": "APQP五階段：1.規劃定義→2.產品設計開發→3.製程設計開發→4.產品製程驗證→5.回饋評估改善。"}, {"n": 20, "q": "QMS 文件層次由高至低，正確順序為？", "opts": ["A. 程序書→品質手冊→作業指導書→表單", "B. 品質手冊→程序書→作業指導書→表單", "C. 品質手冊→作業指導書→程序書→表單", "D. 品質手冊→程序書→表單→作業指導書"], "ans": "B", "expl": "Level 1=品質手冊(Why)，Level 2=程序書(What/Who)，Level 3=作業指導書(How)，Level 4=表單(Record)。"}, {"n": 21, "q": "六標準差 DMAIC 中，「M（Measure）」階段的主要工作是？", "opts": ["A. 定義問題與範圍", "B. 量測現況基準與製程能力", "C. 分析根本原因", "D. 實施改善方案"], "ans": "B", "expl": "D=定義，M=量測現況基準（含MSA、基準Cpk），A=分析根因，I=改善，C=管制維持。"}, {"n": 22, "q": "ISO 14001 是哪類管理系統標準？", "opts": ["A. 品質管理系統", "B. 環境管理系統", "C. 職業安全衛生管理", "D. 資訊安全管理"], "ans": "B", "expl": "ISO 14001=環境管理；ISO 45001=職業安全衛生；ISO 27001=資訊安全；ISO 9001=品質管理。"}, {"n": 23, "q": "PPAP（生產零件核准程序）是以下哪個標準的核心工具？", "opts": ["A. ISO 9001", "B. AS9100（航太）", "C. IATF 16949（汽車）", "D. ISO 13485（醫療）"], "ans": "C", "expl": "PPAP是IATF 16949 / AIAG的核心交付物，用於供應商新零件的品質確認。"}, {"n": 24, "q": "柏拉圖（Pareto Chart）所依據的核心原則是？", "opts": ["A. 所有問題同等重要", "B. 80%的問題由20%的原因造成", "C. 必須消除所有缺陷類型", "D. 問題依時間序列排列"], "ans": "B", "expl": "80/20法則（Vital Few vs. Trivial Many）：少數重要原因造成大多數問題。"}, {"n": 25, "q": "魚骨圖「6M」中，下列哪項「不」在其中？", "opts": ["A. Manpower（人）", "B. Machine（機）", "C. Market（市場）", "D. Mother Nature（環境）"], "ans": "C", "expl": "6M=Man/Machine/Material/Method/Measurement/Mother Nature；Market(市場)不屬於6M。"}, {"n": 26, "q": "散佈圖相關係數 r = +0.92 代表？", "opts": ["A. 強負相關", "B. 弱正相關", "C. 強正相關", "D. 無線性相關"], "ans": "C", "expl": "|r|>0.8通常為強相關；r>0=正相關；r<0=負相關；|r|<0.3=弱或無線性相關。"}, {"n": 27, "q": "直方圖的組距（Class Width）計算公式為？", "opts": ["A. 全距 / 組數", "B. 組數 / 全距", "C. √（資料數n）", "D. 全距 × 組數"], "ans": "A", "expl": "組距 = 全距（Max-Min）/ 組數；組數通常取√n或依Sturges法則 log₂n+1。"}, {"n": 28, "q": "X̄-R 管制圖中，X̄ 圖的上管制界限（UCL）公式為？", "opts": ["A. X̄̄ + 3σ", "B. X̄̄ + A₂R̄", "C. X̄̄ + D₄R̄", "D. R̄ + 3σ_R"], "ans": "B", "expl": "UCL_X̄ = X̄̄ + A₂R̄；A₂為依子群大小n查表的係數（如n=5，A₂=0.577）。"}, {"n": 29, "q": "查檢表（Check Sheet）的主要功能是？", "opts": ["A. 分析不良原因", "B. 系統化地收集與記錄資料", "C. 排列問題的優先順序", "D. 展示各要因間的關係"], "ans": "B", "expl": "查檢表是資料收集工具，用於有系統地記錄觀測數據，不做分析。"}, {"n": 30, "q": "層別法（Stratification）最常搭配哪個工具以避免假相關？", "opts": ["A. FMEA", "B. 散佈圖", "C. 品質屋", "D. 柏拉圖"], "ans": "B", "expl": "散佈圖中若混合不同來源（機台、班別）資料可能出現假相關；層別後分組分析才準確。"}, {"n": 31, "q": "Western Electric 法則中，「Rule 4：連續6點遞增或遞減」代表？", "opts": ["A. 製程超出管制界限", "B. 製程有漂移（趨勢）的跡象", "C. 製程呈循環模式", "D. 資料呈雙峰分布"], "ans": "B", "expl": "連續6點（或以上）單調遞增或遞減=趨勢信號，可能是磨耗、老化、原料批次變化。"}, {"n": 32, "q": "柏拉圖中，累積百分比折線達 80% 時，其左側項目稱為？", "opts": ["A. 瑣事的多數（Trivial Many）", "B. 重要的少數（Vital Few）", "C. 所有問題類別", "D. 中位數附近的問題"], "ans": "B", "expl": "80%累積以內的項目=「重要的少數」（Vital Few），是改善優先目標。"}, {"n": 33, "q": "直方圖呈現「雙峰（Bimodal）」分布，最可能的原因是？", "opts": ["A. 量測系統誤差", "B. 兩種不同製程或來源的資料混合", "C. 規格設定太寬", "D. 樣本數不足"], "ans": "B", "expl": "雙峰通常代表兩個不同群體（如不同班別、供應商）混合，應使用層別法分開分析。"}, {"n": 34, "q": "新QC七手法中，「親和圖（Affinity Diagram）」的用途是？", "opts": ["A. 整理歸納大量模糊意見或構想，找出共同主題", "B. 分析複雜問題的多因果關係", "C. 規劃專案執行時程", "D. 評估多方案的優先順序"], "ans": "A", "expl": "親和圖=KJ法，將發散的語言資料歸類整合；關聯圖用於分析複雜因果關係。"}, {"n": 35, "q": "管制圖的「管制界限」與「規格界限」的關係，正確描述是？", "opts": ["A. 管制界限等於規格界限", "B. 管制界限由製程統計計算；規格界限由顧客或設計決定", "C. 規格界限通常比管制界限更窄", "D. 兩者可互相替換使用"], "ans": "B", "expl": "管制界限=製程自然變異邊界（±3σ）；規格界限=顧客要求。二者不可混用，這是SPC最重要概念之一。"}, {"n": 36, "q": "ANSI Z1.4 正常檢驗轉換為加嚴檢驗（Tightened）的條件是？", "opts": ["A. 連續5批中有2批被拒收", "B. 連續10批全數允收", "C. AQL超過規定標準", "D. 批量超過規定值"], "ans": "A", "expl": "正常→加嚴：近5批中有2批拒收；加嚴→正常：連續5批全數允收；加嚴→停檢：連續5批拒收。"}, {"n": 37, "q": "OC 曲線（Operating Characteristic Curve）的縱軸代表？", "opts": ["A. 批不合格率 p", "B. 允收機率 Pa", "C. 樣本數 n", "D. 拒收機率 (1-Pa)"], "ans": "B", "expl": "OC曲線：橫軸=批不合格率p，縱軸=允收機率Pa；完整描述抽樣計畫的辨別力。"}, {"n": 38, "q": "雙次抽樣（Double Sampling）的主要優點是？", "opts": ["A. 計算比單次更簡單", "B. 決策比單次更快速", "C. 品質明顯好或差時，ASN通常少於單次", "D. 允收數一定較大"], "ans": "C", "expl": "雙次抽樣對品質極好或極差的批，ASN通常比單次少；品質中等時ASN可能更多。"}, {"n": 39, "q": "「生產者風險（α，Producer's Risk）」的定義是？", "opts": ["A. 劣批被允收的機率", "B. 良批被拒收的機率", "C. 抽樣過程的統計誤差", "D. 檢驗員的判斷錯誤率"], "ans": "B", "expl": "α=Type I Error=良批被誤判拒收（冤枉好批）；β=Type II Error=劣批被誤判允收。"}, {"n": 40, "q": "「平均出廠品質上限（AOQL）」代表？", "opts": ["A. 允收品質界限", "B. 批不合格率的上限", "C. 長期出廠品質最差的可能值", "D. 拒收批的比率"], "ans": "C", "expl": "AOQL=AOQ曲線的峰值，是採用該抽樣計畫後，長期出廠品質最差的可能平均值。"}, {"n": 41, "q": "系統抽樣（Systematic Sampling）的抽樣間隔 k = ？", "opts": ["A. 批量 N / 樣本數 n", "B. 樣本數 n / 批量 N", "C. √批量 N", "D. AQL × 批量 N"], "ans": "A", "expl": "系統抽樣：k = N/n，隨機決定第一個起始點（1≤r≤k），之後每隔k個取一個。"}, {"n": 42, "q": "計量值抽樣計畫（ANSI Z1.9）相比計數值（Z1.4）的優點是？", "opts": ["A. 不需要常態分配假設", "B. 相同保護程度下所需樣本數更少", "C. 適用於所有資料類型", "D. 計算更為簡單"], "ans": "B", "expl": "計量值抽樣利用每個樣本的量測資訊，同等保護程度下樣本數約為計數值的1/2~1/3。"}, {"n": 43, "q": "批量 N=1,000，GIS II，AQL=2.5%，正常單次抽樣，樣本代字為？", "opts": ["A. G", "B. J", "C. K", "D. H"], "ans": "B", "expl": "N=501~1200，GIS II → 樣本代字 J；n=80，AQL 2.5%正常單次 → Ac=5，Re=6。"}, {"n": 44, "q": "下列哪種情況「最不適合」使用抽樣檢驗？", "opts": ["A. 批量大且破壞性試驗", "B. 檢驗成本高昂", "C. 零缺點要求的生命攸關零件", "D. 允許少量缺陷存在"], "ans": "C", "expl": "生命攸關（Safety Critical）零件不能依賴抽樣風險，需全數或100%自動化檢測。"}, {"n": 45, "q": "平均全檢數（ATI）在批不合格率 p 很低（品質很好）時，ATI 趨近於？", "opts": ["A. 批量 N", "B. 樣本數 n", "C. 0", "D. AQL × N"], "ans": "B", "expl": "品質好時多數批允收，ATI≈n（只抽樣不全檢）；品質差時多數批拒收後全檢，ATI→N。"}, {"n": 46, "q": "允收數 c=0 的抽樣計畫，其 OC 曲線特性是？", "opts": ["A. 對生產者最有利", "B. OC曲線較陡，對小缺陷率也有高拒收機率", "C. 樣本數可大幅減少", "D. 消費者風險最高"], "ans": "B", "expl": "c=0：任一不良即拒收，OC曲線陡峭，對生產者嚴格（α↑），但對消費者保護也強。"}, {"n": 47, "q": "二項分配 B(n,p) 的變異數 Var(X) = ？", "opts": ["A. np", "B. np(1-p)", "C. np²", "D. n²p(1-p)"], "ans": "B", "expl": "二項分配：E(X)=np，Var(X)=np(1-p)=npq，標準差=√(npq)。"}, {"n": 48, "q": "泊松分配（Poisson Distribution）的重要特性是？", "opts": ["A. 平均數 ≠ 變異數", "B. 平均數 = 變異數 = λ", "C. 僅適用於二元結果", "D. 需要有限樣本空間"], "ans": "B", "expl": "Poisson分配：E(X)=Var(X)=λ；這是泊松分配的識別特徵，常用於考題辨識。"}, {"n": 49, "q": "超幾何分配（Hypergeometric）與二項分配最主要的差異是？", "opts": ["A. 超幾何用於連續資料", "B. 超幾何用於無放回抽樣（有限母體）", "C. 二項用於無放回且有限母體", "D. 兩者在大樣本下差異很大"], "ans": "B", "expl": "超幾何=無放回抽樣（有限母體）；二項=有放回或母體很大；有限母體無放回用超幾何。"}, {"n": 50, "q": "標準常態分配中，P(−1.96 < Z < 1.96) ≈ ？", "opts": ["A. 68.27%", "B. 95.00%", "C. 95.45%", "D. 99.73%"], "ans": "B", "expl": "Z=±1.96 → 95.00%；Z=±1 → 68.27%；Z=±2 → 95.45%；Z=±3 → 99.73%。"}, {"n": 51, "q": "若 X ~ N(μ, σ²)，則 P(X > μ + 2σ) ≈ ？", "opts": ["A. 15.87%", "B. 4.55%", "C. 2.28%", "D. 0.13%"], "ans": "C", "expl": "P(Z>2)=1-Φ(2)=1-0.9772=0.0228=2.28%；P(Z>1)≈15.87%；P(Z>3)≈0.13%。"}, {"n": 52, "q": "中央極限定理（CLT）說明，樣本平均數 X̄ 的抽樣分配趨近？", "opts": ["A. N(μ, σ²)", "B. N(μ, σ²/n)", "C. t(n-1)", "D. χ²(n-1)"], "ans": "B", "expl": "CLT：X̄ ~ N(μ, σ²/n)，標準誤SE=σ/√n；n愈大，X̄的分配愈接近常態。"}, {"n": 53, "q": "幾何分配（Geometric Distribution）描述的是？", "opts": ["A. n次試驗中的成功次數", "B. 第一次成功前所需的試驗次數", "C. 單位時間內的事件次數", "D. 無放回抽樣的抽樣結果"], "ans": "B", "expl": "幾何分配：P(X=k)=(1-p)^(k-1)×p，描述第一次成功前需要的試驗次數。"}, {"n": 54, "q": "標準常態分配的峰態係數（Kurtosis）= ？", "opts": ["A. 0", "B. 1", "C. 2", "D. 3"], "ans": "D", "expl": "標準常態分配：偏態係數=0（對稱），峰態係數（超峰態=0，絕對峰態=3）。"}, {"n": 55, "q": "t 分配當自由度趨向無窮大（df→∞）時，趨近於？", "opts": ["A. 卡方分配", "B. 標準常態分配 N(0,1)", "C. F 分配", "D. 均勻分配"], "ans": "B", "expl": "t分配尾部比常態厚；df越大越接近標準常態；df→∞時，t分配=N(0,1)。"}, {"n": 56, "q": "若 X ~ B(20, 0.1)，E(X) = 2，則 Var(X) = ？", "opts": ["A. 2", "B. 0.2", "C. 1.8", "D. 4"], "ans": "C", "expl": "Var(X)=np(1-p)=20×0.1×0.9=1.8；E(X)=np=20×0.1=2。"}, {"n": 57, "q": "指數分配（Exponential）具有「無記憶性」，意義是？", "opts": ["A. 量測值不隨時間改變", "B. P(X>s+t|X>s)=P(X>t)，過去的時間不影響未來發生機率", "C. 分配呈完全對稱", "D. 平均數永遠等於標準差"], "ans": "B", "expl": "無記憶性：已等待 s 時間，再等 t 時間的機率，等同於全新計時等 t 時間的機率。"}, {"n": 58, "q": "「95% 信賴區間」的正確統計解讀是？", "opts": ["A. 母體參數有95%機率落在此區間", "B. 重複抽樣多次，約95%的區間會涵蓋真實母體參數", "C. 95%的樣本觀測值落在此範圍", "D. 犯Type I Error的機率為95%"], "ans": "B", "expl": "頻率學觀點：信賴區間是隨機的（每次抽樣不同），95%代表長期涵蓋率，非機率。"}, {"n": 59, "q": "p 管制圖監控的是哪個統計量？", "opts": ["A. 每批不良品數量（整數）", "B. 不良率（比例，0~1之間）", "C. 每單位缺點數", "D. 個別量測值"], "ans": "B", "expl": "p圖=不良率；np圖=不良品數（固定n）；c圖=缺點數（固定n）；u圖=單位缺點數（n可變）。"}, {"n": 60, "q": "製程能力指數 Cpk = 1.33 對應的製程σ水準約為？", "opts": ["A. 3σ", "B. 4σ", "C. 5σ", "D. 6σ"], "ans": "B", "expl": "Cpk=1.0→3σ；Cpk=1.33→4σ（IATF 16949最低要求）；Cpk=1.67→5σ；Cpk=2.0→6σ。"}, {"n": 61, "q": "X̄-R 管制圖中，若 X̄ 圖出現趨勢但 R 圖穩定，最可能的原因是？", "opts": ["A. 製程變異性逐漸增大", "B. 設備精度下降", "C. 製程平均值發生緩慢偏移", "D. 量測系統有問題"], "ans": "C", "expl": "X̄圖監控製程位置（均值），R圖監控散布（變異）；X̄趨勢+R穩定=均值漂移。"}, {"n": 62, "q": "%GR&R < 10% 代表量測系統的判斷結論是？", "opts": ["A. 量測系統不合格", "B. 需要改善，但可暫時使用", "C. 量測系統可接受", "D. 必須更換量具"], "ans": "C", "expl": "%GR&R<10%→可接受；10%~30%→條件性接受（視應用而定）；>30%→不合格，需改善。"}, {"n": 63, "q": "EWMA 管制圖中，加權參數 λ 越小時（如 λ=0.05），代表？", "opts": ["A. 只使用最新一個觀測值", "B. 對過去歷史資料給予更大權重，對小偏移更敏感", "C. 等同於Shewhart X圖", "D. 只考慮最近3個觀測值"], "ans": "B", "expl": "λ小→大量歷史平均→EWMA對小且持續偏移敏感；λ=1時EWMA=Shewhart個別值圖。"}, {"n": 64, "q": "Pp（Process Performance Index）與 Cp 的主要差異是？", "opts": ["A. Pp使用 R̄/d₂ 估算短期σ", "B. Cp使用整體標準差 s 評估長期績效", "C. Pp使用整體標準差 s，反映長期製程績效", "D. 兩者在公式上完全相同"], "ans": "C", "expl": "Cp=短期能力（組內σ=R̄/d₂）；Pp=長期績效（整體s）；通常 Pp≤Cp。"}, {"n": 65, "q": "個別值管制圖（X-MR）最適用的情境是？", "opts": ["A. 每批量測4~5個樣本", "B. 每次只有一個量測值（化學製程、長週期生產）", "C. 計數型不良率資料", "D. 批量很大且需快速決策"], "ans": "B", "expl": "X-MR圖用於無法形成子群的製程（每次一個量測），MR圖用相鄰兩點的差估計變異。"}, {"n": 66, "q": "管制圖「穩定製程（In Control）」的定義是？", "opts": ["A. 所有產品均在規格界限內", "B. 製程只有普通原因（Common Cause）變異", "C. Cpk ≥ 1.33", "D. 連續20點都在管制界限以內"], "ans": "B", "expl": "管制狀態=只有隨機普通原因，無特殊原因；與規格和Cpk無直接關係。"}, {"n": 67, "q": "np 管制圖的使用前提條件是？", "opts": ["A. 不良率必須恆定", "B. 每次抽樣的樣本數 n 必須固定", "C. 批量大小必須固定", "D. 缺點數必須服從常態分配"], "ans": "B", "expl": "np圖需固定n，因為CL=np̄，若n變動則中心線也變動，應改用p圖。"}, {"n": 68, "q": "DMAIC 中「C（Control）」階段最核心的工具是？", "opts": ["A. 迴歸分析（Regression）", "B. 變異數分析（ANOVA）", "C. 管制計畫（Control Plan）與 SPC 管制圖", "D. 量測系統分析（MSA）"], "ans": "C", "expl": "Control階段=維持改善成果，核心工具：管制計畫、SPC管制圖、標準作業程序（SOP）。"}, {"n": 69, "q": "Cpk 公式中，CPU（上方製程能力）= ？", "opts": ["A. (μ − LSL) / (3σ)", "B. (USL − μ) / (3σ)", "C. (USL − LSL) / (6σ)", "D. (USL − LSL) / (3σ)"], "ans": "B", "expl": "CPU=(USL−μ)/(3σ)；CPL=(μ−LSL)/(3σ)；Cpk=min(CPU,CPL)；Cp=(USL−LSL)/(6σ)。"}, {"n": 70, "q": "CUSUM 管制圖（Cumulative Sum）判斷失控最常使用的方法是？", "opts": ["A. 傳統 ±3σ 管制界限", "B. V型遮罩（V-Mask）或決策區間（h 和 k 參數）", "C. A₂, D₃, D₄ 係數表", "D. 相關係數 r 值"], "ans": "B", "expl": "CUSUM使用V型遮罩（V-Mask）或決策區間（決策參數h=允許漂移寬度，k=參考值）。"},{"n": 101, "q": "ISO 9001:2015 遵循 PDCA 循環，其中「Do（執行）」主要對應的條款是？", "opts": ["A. 條款 4、5、6", "B. 條款 8（運作）", "C. 條款 9（績效評估）", "D. 條款 10（改善）"], "ans": "B", "expl": "Plan=條款4+5+6+7；Do=條款8（運作）；Check=條款9；Act=條款10。"}, {"n": 102, "q": "ISO 9001:2015 條款 4.2 要求組織識別？", "opts": ["A. 內部稽核計畫", "B. 利害關係者（Interested Parties）的需求與期望", "C. 顧客滿意度調查方法", "D. 供應商評鑑標準"], "ans": "B", "expl": "條款4.1=組織情境（內外部議題）；4.2=利害關係者需求；4.4=品質管理系統範圍。"}, {"n": 103, "q": "ISO 9000:2015 品質管理七大原則中，「不」包含哪項？", "opts": ["A. 顧客導向", "B. 以事實為基礎的決策", "C. 零缺陷承諾", "D. 持續改善"], "ans": "C", "expl": "七大原則：顧客導向、領導力、人員投入、流程方法、改善、證據決策、關係管理；「零缺陷」不在列。"}, {"n": 104, "q": "AS9100 Rev D 品質管理系統標準主要適用於？", "opts": ["A. 汽車製造業", "B. 醫療器材業", "C. 航太國防工業", "D. 食品加工業"], "ans": "C", "expl": "AS9100=航太防衛；IATF 16949=汽車；ISO 13485=醫療器材；ISO 22000=食品安全。"}, {"n": 105, "q": "風險矩陣（Risk Matrix）中，風險等級由哪兩個維度決定？", "opts": ["A. 發生機率 × 嚴重影響程度", "B. 可偵測性 × 發生率", "C. 成本 × 時程", "D. 顧客滿意度 × 市場佔有率"], "ans": "A", "expl": "風險=發生機率（Likelihood）×影響嚴重度（Severity）；與FMEA的RPN三維不同，矩陣通常用兩維。"}, {"n": 106, "q": "APQP（先進產品品質規劃）中，「管制計畫」分為幾種類型？", "opts": ["A. 2 種", "B. 3 種", "C. 4 種", "D. 5 種"], "ans": "B", "expl": "管制計畫分3種：原型（Prototype）、試量產前（Pre-Launch）、量產（Production）。"}, {"n": 107, "q": "FMEA 中，「嚴重度（S）」評分 9~10 分代表？", "opts": ["A. 輕微的外觀缺陷", "B. 對使用者安全或法規的嚴重影響（無預警）", "C. 功能部分喪失但可繼續使用", "D. 顧客可察覺但無功能問題"], "ans": "B", "expl": "S=9：安全/法規相關且有預警；S=10：安全/法規相關且無預警；S=1：無影響。"}, {"n": 108, "q": "AIAG-VDA FMEA（2019版）引入「AP（Action Priority）」，其優先級由哪些因素決定？", "opts": ["A. 僅由 RPN 值決定", "B. 由 S、O、D 的組合閾值表決定 H/M/L 優先級", "C. 由成本效益分析決定", "D. 僅由嚴重度 S 決定"], "ans": "B", "expl": "2019版取消RPN排序，改用AP矩陣依S-O-D組合查表定出 High/Medium/Low，強調嚴重度優先。"}, {"n": 109, "q": "IATF 16949 的「核心工具」（Core Tools）包含？", "opts": ["A. APQP, PPAP, FMEA, MSA, SPC", "B. 8D, A3, DMAIC, VSM, 5S", "C. ISO 9001, AS9100, ISO 14001", "D. PDCA, SDCA, DMADV"], "ans": "A", "expl": "IATF 16949五大核心工具：APQP（先進品質規劃）、PPAP（生產件核准）、FMEA、MSA、SPC。"}, {"n": 110, "q": "PPAP（生產零件核准程序）提交等級1的內容是？", "opts": ["A. 僅提交零件保證書（PSW）", "B. 完整PPAP資料包寄送至顧客", "C. 僅留存於供應商端", "D. 提交尺寸報告+PSW"], "ans": "A", "expl": "Level 1=僅提交PSW；Level 2=PSW+選擇性文件；Level 3=完整包；Level 4=依顧客特殊要求。"}, {"n": 111, "q": "ISO 9001:2015 條款 7.5「文件化資訊」要求，下列何者正確？", "opts": ["A. 必須有書面品質手冊", "B. 強制要求六大程序書", "C. 組織可自行決定需要何種文件，以確保有效運作", "D. 所有程序都必須文件化"], "ans": "C", "expl": "2015版取消強制品質手冊與六大程序書，改為組織自行判斷所需文件化資訊的範圍。"}, {"n": 112, "q": "「管理代表（Management Representative）」在 ISO 9001:2015 的地位為？", "opts": ["A. 仍為強制要求職位", "B. 已被取消強制要求，責任可分配給多人或由高階主管承擔", "C. 由第三方機構指派", "D. 需具備驗證員資格"], "ans": "B", "expl": "2015版取消強制「管理代表」職位；品質責任更分散，強調高階主管直接參與（條款5.1）。"}, {"n": 113, "q": "「設計驗證（Verification）」與「設計確認（Validation）」的差異是？", "opts": ["A. 兩者相同", "B. 驗證=符合設計要求；確認=符合顧客使用需求（最終使用狀況）", "C. 確認先於驗證", "D. 驗證需顧客簽核"], "ans": "B", "expl": "Verification=「我們有沒有把產品做對？」（符合規格）；Validation=「我們有沒有做對的產品？」（滿足使用需求）。"}, {"n": 114, "q": "「系統稽核」、「流程稽核」、「產品稽核」三者中，稽核深度由廣至深的順序為？", "opts": ["A. 產品→流程→系統", "B. 系統→流程→產品", "C. 流程→系統→產品", "D. 三者深度相同"], "ans": "B", "expl": "系統稽核=全面品質管理系統；流程稽核=特定製程；產品稽核=具體產品特性；深度由淺至深。"}, {"n": 115, "q": "ISO 9001:2015 條款 9.3（管理審查）的「輸入」不包含哪項？", "opts": ["A. 內部稽核結果", "B. 顧客滿意度資料", "C. 各部門員工薪資", "D. 品質目標達成狀況"], "ans": "C", "expl": "管理審查輸入：稽核結果、顧客回饋、目標達成、外部議題、風險機會、資源需求等；員工薪資不在列。"}, {"n": 116, "q": "魚骨圖（Ishikawa Diagram）最適合用於哪個問題解決步驟？", "opts": ["A. 量測問題嚴重程度", "B. 展示問題隨時間的變化", "C. 找出造成問題的可能原因", "D. 計算問題發生的機率"], "ans": "C", "expl": "魚骨圖=因果圖，用於腦力激盪並歸納可能原因（6M）；不做定量分析。"}, {"n": 117, "q": "散佈圖（Scatter Diagram）中，相關係數 r = -0.92 表示？", "opts": ["A. 強正相關", "B. 強負相關", "C. 弱負相關", "D. 無相關"], "ans": "B", "expl": "|r|>0.8=強相關；r<0=負相關（一變數增大，另一下降）；r=-0.92=強負相關。"}, {"n": 118, "q": "直方圖左側呈「懸崖型」（截斷型）分布，最可能的原因是？", "opts": ["A. 製程均值偏高", "B. 已進行全數篩選或100%檢驗，將不良品剔除", "C. 樣本數不足", "D. 規格設定太寬"], "ans": "B", "expl": "左截斷=下規格附近的資料被人為去除，通常代表有100%篩選或隱瞞報告的情況。"}, {"n": 119, "q": "查檢表（Check Sheet）中「位置查檢表」的用途是？", "opts": ["A. 記錄各類缺陷的頻率", "B. 標示缺陷在產品上的位置分布", "C. 記錄製程參數變化", "D. 排列問題優先順序"], "ans": "B", "expl": "位置查檢表（Defect Location Check Sheet）在產品示意圖上標記缺陷位置，分析缺陷集中區域。"}, {"n": 120, "q": "「層別法（Stratification）」在分析散佈圖時最重要的功能是？", "opts": ["A. 增加資料點數", "B. 避免因混合不同來源資料而產生假相關或假無相關", "C. 計算相關係數", "D. 繪製趨勢線"], "ans": "B", "expl": "不同班別/機台混合時，散佈圖可能出現假象；層別後各組單獨分析，才能揭露真實關係。"}, {"n": 121, "q": "柏拉圖中，欄位排列的正確方式是？", "opts": ["A. 依問題字母順序", "B. 依頻率由低至高", "C. 依頻率由高至低", "D. 依時間先後順序"], "ans": "C", "expl": "柏拉圖=由高至低排列，累積折線由左往右上升；目的是快速識別最重要的問題類別。"}, {"n": 122, "q": "管制圖（Control Chart）是由哪位學者發明的？", "opts": ["A. 朱蘭（Juran）", "B. 戴明（Deming）", "C. 休哈特（Shewhart）", "D. 克勞斯比（Crosby）"], "ans": "C", "expl": "Walter Shewhart 於1924年在貝爾實驗室發明管制圖；戴明則將PDCA推廣普及（原為Shewhart Cycle）。"}, {"n": 123, "q": "「走勢圖（Run Chart）」與「管制圖」最主要的差異是？", "opts": ["A. 走勢圖有管制界限，管制圖沒有", "B. 走勢圖只繪製資料時間序列，沒有統計計算出的管制界限", "C. 走勢圖只用於計數型資料", "D. 管制圖不需要時間序列"], "ans": "B", "expl": "走勢圖（Run Chart）只有中位數或目標線，無UCL/LCL；管制圖有以統計計算的±3σ管制界限。"}, {"n": 124, "q": "在新QC七手法中，「關聯圖（Relations Diagram）」主要用於？", "opts": ["A. 規劃專案時程", "B. 找出複雜問題中各要因之間的因果關係鏈", "C. 歸納整合語言資訊", "D. 矩陣比較方案優劣"], "ans": "B", "expl": "關聯圖：原因→結果箭頭，適用於多因素相互影響的複雜問題；親和圖是歸納整合。"}, {"n": 125, "q": "箭線圖（Arrow Diagram）相當於專案管理中的哪個工具？", "opts": ["A. 甘特圖（Gantt Chart）", "B. PERT/CPM（關鍵路徑法）", "C. WBS（工作分解結構）", "D. 資源直方圖"], "ans": "B", "expl": "箭線圖=AON/AOA網路圖，顯示活動順序與關鍵路徑，等同於PERT/CPM；甘特圖為橫條時程圖。"}, {"n": 126, "q": "矩陣圖（Matrix Diagram）最適合用來？", "opts": ["A. 分析因果關係", "B. 顯示兩組或多組要素間的相互關係強弱", "C. 展示製程流程順序", "D. 追蹤累積資料趨勢"], "ans": "B", "expl": "矩陣圖：行列交叉點標示關係強弱（◎○△×），常見如QFD品質屋、4M管制矩陣。"}, {"n": 127, "q": "樹狀圖（Tree Diagram）在新QC七手法中的用途是？", "opts": ["A. 展示資料分配", "B. 系統化地將目標分解為子目標與具體執行任務", "C. 顯示活動網路關係", "D. 按主題分類構想"], "ans": "B", "expl": "樹狀圖=系統圖，由目標→手段→方法→細節逐層展開，用於規劃與問題對策展開。"}, {"n": 128, "q": "PDPC（過程決策程式圖）最適合用於？", "opts": ["A. 記錄製程流程", "B. 在計畫執行前預測可能的障礙並提前擬定對策", "C. 比較設計方案", "D. 分析歷史缺陷數據"], "ans": "B", "expl": "PDPC=預防計畫圖；「若…則…」場景分析，事前準備對策，常用於新產品開發與專案風險管理。"}, {"n": 129, "q": "流程圖中，菱形（◇）符號代表？", "opts": ["A. 作業步驟", "B. 決策/判斷點（Decision Point）", "C. 開始/結束", "D. 文件輸入"], "ans": "B", "expl": "流程圖符號：矩形=作業；菱形=決策（是/否）；橢圓=開始/終止；平行四邊形=輸入/輸出。"}, {"n": 130, "q": "QFD（品質機能展開）「品質屋」中，「屋頂（Roof）」矩陣代表？", "opts": ["A. 顧客需求（Whats）清單", "B. 工程技術特性（Hows）之間的相關矩陣", "C. 競爭者比較分析", "D. 技術目標值設定"], "ans": "B", "expl": "屋頂=技術特性（How vs. How）的相互影響分析，顯示各設計參數間的衝突或協同關係。"}, {"n": 131, "q": "ANSI Z1.4 中，AQL（允收品質水準）在 OC 曲線上對應的生產者風險通常為？", "opts": ["A. α = 1%", "B. α = 5%", "C. α = 10%", "D. α = 50%"], "ans": "B", "expl": "按慣例，AQL點對應的生產者風險 α ≈ 5%，即良批被誤判拒收的機率約5%。"}, {"n": 132, "q": "ANSI Z1.4 中，從「加嚴（Tightened）」轉換回「正常（Normal）」的條件是？", "opts": ["A. 連續5批在加嚴下全數允收", "B. 連續5批在正常下全數允收", "C. 連續10批在加嚴下全數允收", "D. 顧客書面同意"], "ans": "A", "expl": "Tightened→Normal：連續5批在加嚴下允收；Normal→Tightened：近5批中有2批拒收。"}, {"n": 133, "q": "「LTPD（批允收品質界限）」是指對應消費者風險（β）的批不良率，β 通常為？", "opts": ["A. β = 1%", "B. β = 5%", "C. β = 10%", "D. β = 20%"], "ans": "C", "expl": "LTPD（Lot Tolerance Percent Defective）：β=10%（消費者風險），即劣批允收的機率≤10%。"}, {"n": 134, "q": "在抽樣檢驗中，「Type II Error（β）」的定義是？", "opts": ["A. 良批被拒收", "B. 劣批被允收（消費者風險）", "C. 樣本數不足", "D. AQL 超標"], "ans": "B", "expl": "α（Type I）=良批拒收=生產者風險；β（Type II）=劣批允收=消費者風險，即放行問題批。"}, {"n": 135, "q": "連續抽樣計畫（Continuous Sampling Plan, CSP）最適用於？", "opts": ["A. 離散批量生產", "B. 連續大量製造的流線型生產（如化工、食品連續線）", "C. 小批量高價值品", "D. 破壞性試驗"], "ans": "B", "expl": "CSP用於無法分批的連續生產；以個別件輪替全數→抽樣→全數的方式管控出廠品質。"}, {"n": 136, "q": "「平均出廠品質（AOQ）」的公式為 AOQ ≈ p × Pa。當 p 趨近 0 時，AOQ？", "opts": ["A. 趨近 1（最差）", "B. 趨近 0（最佳，因為好的批幾乎全數允收）", "C. 趨近 AOQL", "D. 等於 AQL"], "ans": "B", "expl": "p→0（品質極好）時，Pa→1（幾乎全數允收），AOQ≈p×1→0；品質越好，出廠品質也越好。"}, {"n": 137, "q": "「跳批抽樣（Skip-Lot Sampling）」最適合用在什麼情況？", "opts": ["A. 新供應商第一批來料", "B. 供應商已長期展示優異且穩定的品質記錄", "C. 高安全性零件的進料驗收", "D. 不良率超過 AQL 的情形"], "ans": "B", "expl": "Skip-Lot=對已證明品質穩定的供應商降低抽樣頻率，以節省驗收資源；不適用於未驗證的供應商。"}, {"n": 138, "q": "道奇-羅明（Dodge-Romig）抽樣表設計的主要目標是？", "opts": ["A. 最小化生產者風險", "B. 最小化平均全檢數（ATI），在保證 AOQL 或 LTPD 的條件下", "C. 最小化樣本數", "D. 最大化 AQL"], "ans": "B", "expl": "Dodge-Romig表：已知製程平均不良率時，找出使ATI最小的n和c，有兩種表：AOQL表與LTPD表。"}, {"n": 139, "q": "OC 曲線「斜率越陡峭」代表？", "opts": ["A. 區分良批與劣批的能力越弱", "B. 區分良批與劣批的能力越強（辨別力高）", "C. 樣本數越小", "D. 消費者風險越大"], "ans": "B", "expl": "OC曲線越陡（趨近垂直）=辨別力越高，能清楚分開好批（Pa≈1）與壞批（Pa≈0）；n越大越陡。"}, {"n": 140, "q": "「允收數 c=0」的抽樣計畫，對生產者的影響是？", "opts": ["A. 生產者風險大幅降低", "B. 生產者風險大幅增加（任一不良即拒收，α↑）", "C. 對生產者無影響", "D. 只影響消費者風險"], "ans": "B", "expl": "c=0：任何一件不良品即拒收，在同等n下生產者風險α顯著高於c>0的計畫；整體保護更嚴格。"}, {"n": 141, "q": "ANSI Z1.9（計量值抽樣）相比 Z1.4（計數值）的主要優勢是？", "opts": ["A. 不需要常態分配假設", "B. 相同保護水準下，所需樣本數更少（約1/2~1/3）", "C. 適用於所有資料分配", "D. 計算更為簡單"], "ans": "B", "expl": "計量值抽樣利用每個量測值的完整資訊，效率更高；但需要常態分配假設，否則需使用其他方法。"}, {"n": 142, "q": "二次抽樣（Double Sampling）的優點是？", "opts": ["A. 計算比單次更簡單", "B. 對品質極好或極差的批，ASN 通常小於單次抽樣", "C. 允收數一定比單次大", "D. 可消除消費者風險"], "ans": "B", "expl": "雙次抽樣：品質明顯好（第一次即允收）或差（第一次即拒收）時，平均樣本數ASN<單次n。"}, {"n": 143, "q": "批量 N=800，GIS II，AQL=1.0%，正常單次抽樣（ANSI Z1.4），樣本代字為？", "opts": ["A. H", "B. J", "C. K", "D. L"], "ans": "B", "expl": "N=501~1200，GIS II → 樣本代字 J；n=80，AQL=1.0%正常單次 → Ac=2，Re=3。"}, {"n": 144, "q": "下列何種產品「最不適合」使用抽樣驗收？", "opts": ["A. 大批量電子零件", "B. 破壞性試驗材料", "C. 攸關生命安全的醫療植入物", "D. 一般包裝材料"], "ans": "C", "expl": "生命安全零件（Safety Critical）不允許抽樣風險，需全數自動化100%檢測或其他保證方式。"}, {"n": 145, "q": "「生產者風險點（Producer's Risk Point）」在OC曲線上的位置是？", "opts": ["A. 對應消費者風險 β 的點", "B. 對應允收機率=（1-α）的不良率點，通常靠近 AQL", "C. OC曲線的中點", "D. 對應 Pa=50% 的點"], "ans": "B", "expl": "生產者風險點：批不良率=AQL，對應Pa=（1-α）≈95%；消費者風險點：批不良率=LTPD，Pa=β≈10%。"}, {"n": 146, "q": "中央極限定理（CLT）指出，當樣本數 n 足夠大時（通常 n≥30），X̄ 的抽樣分配會趨近？", "opts": ["A. t 分配（自由度n-1）", "B. 常態分配 N(μ, σ²/n)", "C. 卡方分配", "D. F 分配"], "ans": "B", "expl": "CLT核心：無論母體分配為何，X̄ 的抽樣分配在n夠大時趨近常態；σ²/n反映樣本均值的變異。"}, {"n": 147, "q": "若 σ=4，n=64，則樣本平均數的標準誤（SE）= ？", "opts": ["A. 4", "B. 2", "C. 0.5", "D. 1"], "ans": "C", "expl": "SE = σ/√n = 4/√64 = 4/8 = 0.5；標準誤隨樣本數增大而減小。"}, {"n": 148, "q": "99% 信賴區間相比 95% 信賴區間？", "opts": ["A. 較窄（更精確）", "B. 較寬（涵蓋更大範圍以提高信心）", "C. 寬度相同", "D. 取決於樣本數"], "ans": "B", "expl": "信心程度越高（99%>95%），需要更寬的區間才能涵蓋真實參數；寬度與z值成正比（z=2.576 vs 1.96）。"}, {"n": 149, "q": "F 分配常用於哪類假設檢定？", "opts": ["A. 比較兩樣本均值", "B. 比較兩個或多個變異數（含ANOVA）", "C. 測試常態性", "D. 二項比例估計"], "ans": "B", "expl": "F分配用於：兩變異數比（σ₁²/σ₂²）的檢定 和 ANOVA（分析組間vs組內變異比值）。"}, {"n": 150, "q": "ANOVA（變異數分析）的虛無假設 H₀ 是？", "opts": ["A. 所有樣本變異數相等", "B. 所有母體均值相等（μ₁=μ₂=...=μk）", "C. 資料服從常態分配", "D. 因子間無交互作用"], "ans": "B", "expl": "ANOVA H₀：所有組別均值相等；H₁：至少一組均值不同；F值=組間變異/組內變異。"}, {"n": 151, "q": "假設檢定中，減少犯 Type I Error 的機率（α）而不改變樣本數，會造成？", "opts": ["A. Type II Error（β）也減少", "B. Type II Error（β）增大", "C. 檢定力（1-β）增加", "D. 對 β 無影響"], "ans": "B", "expl": "α↓且n固定 → β↑（更難拒絕H₀，劣批更易漏網）；同時降低α和β需增加n。"}, {"n": 152, "q": "迴歸分析的決定係數 R²=0.85 的解讀是？", "opts": ["A. 相關係數 r=0.85", "B. Y的變異中有85%可由迴歸模型（自變數X）解釋", "C. 有15%的資料被排除", "D. 預測準確率為85%"], "ans": "B", "expl": "R²=SSR/SST，表示模型解釋了多少Y的變異；R²=0.85表示模型解釋了85%的Y變異（未解釋15%）。"}, {"n": 153, "q": "指數分配（Exponential Distribution）最常用於建模何種情境？", "opts": ["A. 各種品質特性的分配", "B. 固定失效率（隨機失效）情況下的失效時間", "C. 計數型不良品數", "D. 子群平均值的分配"], "ans": "B", "expl": "指數分配描述Poisson過程中事件間的等待時間；在可靠度中對應「浴缸曲線」的隨機失效期。"}, {"n": 154, "q": "威布爾分配（Weibull）形狀參數 β=1 時，等同於？", "opts": ["A. 常態分配", "B. 指數分配（固定失效率）", "C. 對數常態分配", "D. 二項分配"], "ans": "B", "expl": "β<1=遞減失效率（早夭）；β=1=固定失效率=指數分配（隨機失效）；β>1=遞增失效率（磨耗）。"}, {"n": 155, "q": "「檢定力（Power of the Test）」的定義是？", "opts": ["A. α（Type I Error 機率）", "B. β（Type II Error 機率）", "C. 1-β（正確拒絕假 H₀ 的機率）", "D. 1-α"], "ans": "C", "expl": "Power=1-β，即H₁為真時成功拒絕H₀的能力；Power越高=越能偵測到真實差異；與n正相關。"}, {"n": 156, "q": "χ²（卡方）獨立性檢定用於？", "opts": ["A. 比較兩組連續數據的均值", "B. 檢定兩個類別變數是否相互獨立", "C. 測試樣本是否來自常態母體", "D. 比較兩組的標準差"], "ans": "B", "expl": "卡方獨立性檢定：列聯表（Contingency Table）中行列變數是否獨立；χ²=(觀測-期望)²/期望，求和。"}, {"n": 157, "q": "常態分配中，P(μ-1.645σ < X < μ+1.645σ) ≈ ？", "opts": ["A. 68.27%", "B. 90.00%", "C. 95.45%", "D. 99.00%"], "ans": "B", "expl": "Z=±1.645 → 90%；Z=±1 → 68.27%；Z=±1.96 → 95%；Z=±2 → 95.45%；Z=±2.576 → 99%。"}, {"n": 158, "q": "若 X₁~N(μ₁,σ₁²) 與 X₂~N(μ₂,σ₂²) 獨立，則 X₁+X₂ 的分配為？", "opts": ["A. N(μ₁+μ₂, σ₁+σ₂)", "B. N(μ₁+μ₂, σ₁²+σ₂²)", "C. N(μ₁×μ₂, σ₁²×σ₂²)", "D. t 分配"], "ans": "B", "expl": "兩個獨立常態分配相加：均值相加，變異數相加（不是標準差相加）；σ_sum=√(σ₁²+σ₂²)。"}, {"n": 159, "q": "「無母數統計法（Nonparametric）」相比參數法的特點是？", "opts": ["A. 需要更嚴格的分配假設", "B. 不需要常態分配等特定分配假設，適用於小樣本或有序資料", "C. 統計效力通常更高", "D. 只適用於計量資料"], "ans": "B", "expl": "無母數法：無需分配假設；適用於次序尺度、小樣本、偏態資料；但統計效力通常低於參數法。"}, {"n": 160, "q": "Kruskal-Wallis 檢定是哪個參數統計法的無母數對應版本？", "opts": ["A. 配對 t 檢定", "B. 單因子 ANOVA", "C. 卡方檢定", "D. F 比值檢定"], "ans": "B", "expl": "Kruskal-Wallis=單因子ANOVA的無母數版本，用秩次（Rank）代替原始數值比較多組。"}, {"n": 161, "q": "X̄-R 管制圖中，「R 圖」監控的是製程的哪個特性？", "opts": ["A. 製程均值的穩定性", "B. 製程變異（散布）的穩定性", "C. 批不良率", "D. 個別量測值"], "ans": "B", "expl": "R圖=組內全距，監控製程變異；X̄圖監控製程位置（均值）。兩圖搭配才能完整監控製程。"}, {"n": 162, "q": "建立管制圖管制界限，通常建議至少需要幾組（子群）的資料？", "opts": ["A. 5~10 組", "B. 20~25 組", "C. 50 組以上", "D. 100 組以上"], "ans": "B", "expl": "一般建議20~25組以上，才能有足夠資料估計穩定的X̄̄和R̄；組數太少管制界限不可靠。"}, {"n": 163, "q": "I-MR（個別值-移動全距）管制圖最適合哪種情境？", "opts": ["A. 每批量測4~5個樣本", "B. 每次只有單一量測值（化工、長週期製程）", "C. 計數型不良率資料", "D. 子群樣本數 n>10"], "ans": "B", "expl": "I-MR圖：X圖監控個別值，MR圖用相鄰兩點差估計變異；適用於每次只有一個觀測的製程。"}, {"n": 164, "q": "u 管制圖（單位缺點數管制圖）與 c 圖的差異是？", "opts": ["A. u 圖用於固定樣本數", "B. u 圖允許每次抽樣的樣本數不同（變動n），以「單位缺點數」標準化", "C. u 圖監控不良品數", "D. c 圖允許變動樣本數"], "ans": "B", "expl": "c圖：固定樣本大小（如每次固定1片PCB）；u圖：可變樣本大小，u=總缺點數/樣本數，更有彈性。"}, {"n": 165, "q": "管制圖出現「緊縮（Hugging）中心線」現象（幾乎所有點都在中心線1σ內），最可能原因是？", "opts": ["A. 製程控制極佳", "B. 子群混合了兩個或多個製程的資料，或計算錯誤", "C. 製程變異趨於零", "D. 量測解析度不足"], "ans": "B", "expl": "緊縮中心線=子群內變異被人為增大（混合不同製程），使R̄過大→管制界限過寬→所有點看似「緊縮」。"}, {"n": 166, "q": "np 管制圖的中心線（CL）公式是？", "opts": ["A. p̄（平均不良率）", "B. n × p̄（平均不良品數）", "C. √(np̄(1-p̄))", "D. p̄(1-p̄)/n"], "ans": "B", "expl": "np圖CL = np̄；UCL = np̄+3√(np̄(1-p̄))；LCL = np̄-3√(np̄(1-p̄))（負數取0）。"}, {"n": 167, "q": "CUSUM（累積和）管制圖相比休哈特管制圖，對何種異常更敏感？", "opts": ["A. 突發的大幅偏移（>3σ）", "B. 小而持續的製程均值偏移（1~2σ的漂移）", "C. 製程變異增大", "D. 離群值（Outliers）"], "ans": "B", "expl": "CUSUM累積每個點的偏差，對小持續偏移敏感；Shewhart圖對大突發偏移（>3σ）更有效。"}, {"n": 168, "q": "Western Electric 規則（8大判斷規則）中，「規則3」是指？", "opts": ["A. 連續2點中有1點在2σ外", "B. 連續4點中有3點在1σ外（同側）", "C. 連續6點持續上升或下降", "D. 14點交替上下"], "ans": "B", "expl": "WE Rule 3：連續4點中有3點在同側1σ外（Zone A以外）=趨勢信號；Rule 4=連續6點單調趨勢。"}, {"n": 169, "q": "u 管制圖的控制界限 UCL_u = ？", "opts": ["A. ū + 3√(ū)", "B. ū + 3√(ū/n)", "C. ū + A₂ × MR̄", "D. D₄ × ū"], "ans": "B", "expl": "UCL_u = ū + 3√(ū/n)，其中ū=平均單位缺點數，n=每次檢驗的樣本數；n變動時界限也隨之改變。"}, {"n": 170, "q": "管制圖「穩定且有能力（In Control and Capable）」代表？", "opts": ["A. 只有普通原因變異，且Cpk≥規定值", "B. 製程均值=目標值", "C. 所有點在±2σ內", "D. 不良率=0"], "ans": "A", "expl": "Stable（穩定）=只有普通原因，無特殊原因信號；Capable（有能力）=Cpk≥門檻（如1.33）；兩者獨立概念。"}, {"n": 171, "q": "「合理子群（Rational Subgroup）」的組成原則是？", "opts": ["A. 盡可能使子群樣本數最大", "B. 子群內變異最小（同一短暫時間、機台、原料），子群間能偵測到製程偏移", "C. 完全隨機抽樣", "D. 固定時間間隔且每組n=5"], "ans": "B", "expl": "合理子群：子群內=普通原因（最小）；子群間=製程偏移（最易顯現）；這是SPC有效性的關鍵。"}, {"n": 172, "q": "個別值管制圖中，移動全距（MR）的計算方式是？", "opts": ["A. 相鄰兩個觀測值的平均", "B. 相鄰兩個觀測值之差的絕對值，|Xᵢ - Xᵢ₋₁|", "C. 每組內最大值-最小值", "D. 觀測值與均值的差"], "ans": "B", "expl": "MR = |Xᵢ - Xᵢ₋₁|，反映短期相鄰點的變異；MR̄/d₂（d₂=1.128 for n=2）估算製程短期標準差。"}, {"n": 173, "q": "製程「穩定（In Control）」但 Cpk = 0.85，此狀況代表？", "opts": ["A. 兩者矛盾，不可能同時發生", "B. 製程可預測，但不符合規格要求（不良品會產生）", "C. 製程完全沒問題", "D. 需要更多管制圖判斷"], "ans": "B", "expl": "穩定（In Control）≠有能力（Capable）。穩定=只有普通原因；Cpk<1=製程散布超出規格寬度→有不良品。"}, {"n": 174, "q": "短期製程 SPC（Short-Run SPC）的標準化管制圖，將不同零件的資料？", "opts": ["A. 合并在同一張圖，不做處理", "B. 轉換為標準化偏差值（Z分數），使不同規格的零件可在同張圖比較", "C. 分別建立各自的管制圖", "D. 只用屬性資料"], "ans": "B", "expl": "短期SPC：Z = (X - Target) / σ，標準化後不同零件的資料可繪於同一張CUSUM或Z圖。"}, {"n": 175, "q": "管制圖的「Phase I」（建立階段）目標是？", "opts": ["A. 生產線上的即時監控", "B. 回顧性分析歷史資料以建立初步管制界限（去除特殊原因後）", "C. 顧客驗收測試", "D. 設備校正"], "ans": "B", "expl": "Phase I：蒐集歷史資料→識別並去除特殊原因→建立基準管制界限；Phase II：用已建界限進行即時監控。"}, {"n": 176, "q": "Cp = 1.33 等同於製程的幾個 σ 水準？", "opts": ["A. 3σ", "B. 4σ", "C. 5σ", "D. 6σ"], "ans": "B", "expl": "Cp = (USL-LSL)/(6σ) = 1.33 → USL-LSL = 8σ，規格寬度含 ±4σ，即 4σ 水準（短期不良率約63 PPM）。"}, {"n": 177, "q": "當只有單側規格（如只有 USL，無 LSL）時，適用的製程能力指數是？", "opts": ["A. Cp（雙側）", "B. CPU 或 CPL（單側能力指數）", "C. Cr（能力比）", "D. Cpm（田口能力指數）"], "ans": "B", "expl": "單側規格：只用CPU=(USL-μ)/(3σ) 或 CPL=(μ-LSL)/(3σ)；Cp需要雙側規格，不適用。"}, {"n": 178, "q": "能力比（Cr = 1/Cp），若 Cr = 0.75，代表？", "opts": ["A. Cp = 0.75（製程能力不足）", "B. Cp = 1.33（製程能力良好）", "C. 製程利用75%的規格空間", "D. B 和 C 都正確"], "ans": "D", "expl": "Cr = 1/Cp = 0.75 → Cp = 1/0.75 = 1.33；同時，Cr代表製程散布占規格寬的比例，0.75=佔75%。"}, {"n": 179, "q": "6σ 製程（含1.5σ偏移）的 Cpk 約為？", "opts": ["A. 2.0（無偏移時）", "B. 1.5", "C. 1.0", "D. 0.5"], "ans": "B", "expl": "無偏移6σ：Cpk=2.0；含1.5σ偏移後：Cpk=(6σ-1.5σ)/(3σ)=4.5/3=1.5；不良率=3.4PPM。"}, {"n": 180, "q": "當 Cp > Cpk 時，代表什麼製程狀況？", "opts": ["A. 製程有能力但未在規格中心（偏移）", "B. 製程精度不足", "C. 規格設定太嚴", "D. Cpk 計算錯誤"], "ans": "A", "expl": "Cp>Cpk→製程有潛在能力但均值未對準目標（偏移）；完全居中時Cp=Cpk；對準後Cpk可達Cp的水準。"}, {"n": 181, "q": "Cpm（田口製程能力指數）懲罰的是？", "opts": ["A. 僅過大的製程變異", "B. 製程均值偏離目標值（T）以及過大的製程變異", "C. 僅均值偏離", "D. 樣本數不足"], "ans": "B", "expl": "Cpm分母=√[σ²+(μ-T)²]，同時考量散布和偏目標值；Cpm≤Cpk，均值越偏離T，Cpm降越多。"}, {"n": 182, "q": "IATF 16949 對量產新品初始製程能力要求通常為 Ppk ≥ ？", "opts": ["A. 1.00", "B. 1.33", "C. 1.67", "D. 2.00"], "ans": "C", "expl": "IATF 16949新品PPAP初始製程能力：Ppk≥1.67（短期/初始），量產穩定後Cpk≥1.33。"}, {"n": 183, "q": "當製程資料非常態分配時，傳統 Cpk 計算的問題是？", "opts": ["A. 完全無效，無法使用", "B. 可能高估或低估真實製程能力，需轉換或使用百分位法", "C. 只有在n<30時才有問題", "D. 對單側規格無影響"], "ans": "B", "expl": "非常態資料：傳統Cpk假設常態→結論可能不準確；解決：Box-Cox轉換、Johnson轉換、或百分位法計算非常態Cpk。"}, {"n": 184, "q": "AIAG MSA手冊建議，GR&R研究中操作員數至少幾位？", "opts": ["A. 1", "B. 2", "C. 3", "D. 5"], "ans": "C", "expl": "標準GR&R：≥3位操作員×≥10個零件×≥2次重複=60個量測點；3人可分析再現性（AV）。"}, {"n": 185, "q": "量測系統分析中，「穩定性（Stability）」是指？", "opts": ["A. 同一操作員多次量測同件的一致性", "B. 量測系統在一段時間內對相同基準件的量測偏差", "C. 量具在不同操作員間的一致性", "D. 量具不受環境影響的能力"], "ans": "B", "expl": "穩定性=隨時間的量具漂移（Bias的時間變化）；重複性=同一操作員/同一條件的散布；兩者不同。"}, {"n": 186, "q": "量測系統「線性（Linearity）」是指？", "opts": ["A. 量測值隨操作員不同的差異", "B. 量測系統在整個操作範圍內偏差（Bias）的一致性", "C. 量測的重複性", "D. 量具與規格的比值"], "ans": "B", "expl": "線性：在量測範圍（Min~Max）的不同點，Bias是否保持一致；若低值偏差小/高值偏差大=線性問題。"}, {"n": 187, "q": "屬性型 GR&R（Pass/Fail），評估操作員間一致性最常使用的統計量是？", "opts": ["A. ANOVA F值", "B. Kappa 統計量", "C. 相關係數 r", "D. χ² 值"], "ans": "B", "expl": "Kappa=衡量評分者間一致性（超越機率的一致）；Kappa>0.75=良好一致；0.4~0.75=中等；<0.4=差。"}, {"n": 188, "q": "「鑑別力（ndc，Number of Distinct Categories）」≥5 的含義是？", "opts": ["A. %GR&R < 30%", "B. 量測系統能夠分辨至少5個不同等級的零件品質", "C. 重複性合格", "D. 校正周期正確"], "ans": "B", "expl": "ndc=1.41×(PV/GR&R)；ndc≥5=量具能有效分類零件（至少5個可辨別的級距）；<5=需改善量具。"}, {"n": 189, "q": "量具解析度（Gauge Resolution/Discrimination）建議至少應達到規格寬度（T）的？", "opts": ["A. 20%（1/5）", "B. 10%（1/10）或更小", "C. 50%（1/2）", "D. 1%（1/100）"], "ans": "B", "expl": "一般建議：解析度≤T/10（即規格寬的1/10）；也稱「10:1法則」；解析度不足則無法有效分辨差異。"}, {"n": 190, "q": "管制計畫（Control Plan）中，「管制方法」欄位描述的是？", "opts": ["A. 品質目標", "B. 針對每個管制特性如何監控及對超標如何回應（SPC、全數檢驗、目視等）", "C. 顧客驗收標準", "D. 供應商評鑑方法"], "ans": "B", "expl": "管制計畫：識別哪些特性需管控、用何方式（SPC/全數/抽樣）、頻率多少、失控時如何反應。"}, {"n": 191, "q": "PPAP（生產零件核准程序）的主要目的是？", "opts": ["A. 確認供應商財務健全", "B. 確認供應商製程能力符合設計意圖，且能批量穩定生產", "C. 建立採購合約", "D. 完成ISO認證"], "ans": "B", "expl": "PPAP：在量產前，以實際製程條件製作樣品並驗證（尺寸/材料/功能/製程能力），確認量產準備就緒。"}, {"n": 192, "q": "First Article Inspection（FAI，首件檢驗）主要驗證的是？", "opts": ["A. 量產中的統計製程能力", "B. 製程設定、工具與夾具是否能生產出符合設計要求的零件", "C. 作業員培訓成效", "D. 供應商財務狀況"], "ans": "B", "expl": "FAI=首次生產或工程變更後，全面確認工裝/夾具/製程設定正確，並驗證產品符合所有圖面要求。"}, {"n": 193, "q": "可追溯性（Traceability）在製造業中的意義是？", "opts": ["A. GPS追蹤貨物位置", "B. 識別產品歷史（材料批號、製程參數、日期、作業員）的能力", "C. 網路連接能力", "D. 客戶資料庫存取"], "ans": "B", "expl": "追溯性：能查出「誰、何時、用什麼材料、在哪機台生產」，用於問題溯源、召回範圍確認。"}, {"n": 194, "q": "製程中「特殊原因（Special Cause）」變異的特點是？", "opts": ["A. 固有的隨機變異，無法消除", "B. 可識別且可消除的非隨機變異，通常由具體原因（人員/設備/材料）引起", "C. 製程自然變異的組成部分", "D. 管制界限內的變異"], "ans": "B", "expl": "特殊原因=可歸因的系統性變異（如換班、換料批、設備異常）→需調查消除；普通原因=系統固有隨機性。"}, {"n": 195, "q": "「防錯法（Poka-Yoke）警告型（Warning Type）」與「控制型（Control Type）」的差異是？", "opts": ["A. 控制型發出警報，警告型直接阻止錯誤", "B. 警告型發出警報提醒但不阻止；控制型直接阻止錯誤繼續", "C. 兩者功能相同", "D. 控制型成本更低"], "ans": "B", "expl": "警告型（Warning）=燈號/警鈴，需人員回應；控制型（Control）=強制阻止，如設計上的止檔、鎖具。"}, {"n": 196, "q": "在製程中，「工程變更（ECN/ECR）」的主要管控要點是？", "opts": ["A. 無需通知顧客", "B. 評估影響、更新相關文件、重新PPAP確認（若需要）、顧客通知", "C. 只需更新作業指導書", "D. 直接實施，事後報告"], "ans": "B", "expl": "ECN管控：影響評估（FMEA、管制計畫）→文件更新（圖面、SOP）→驗證確認→顧客通知→PPAP（依需要）。"}, {"n": 197, "q": "「功能測試（Functional Test）」與「外觀/尺寸檢驗」最主要的差異是？", "opts": ["A. 功能測試較不重要", "B. 功能測試確認產品在實際使用條件下的性能表現", "C. 外觀檢驗更全面", "D. 兩者測試方法相同"], "ans": "B", "expl": "尺寸/外觀=靜態符合性確認；功能測試=動態實際使用性能驗證；高可靠性產品兩者都需要。"}, {"n": 198, "q": "ISO 9001:2015 條款 8.7「不符合產品的管制」要求？", "opts": ["A. 立即報廢所有不合格品", "B. 識別、隔離，並進行文件化的處置（報廢/重工/讓步/退回）", "C. 只需通知顧客", "D. 自動降級使用"], "ans": "B", "expl": "8.7要求：識別不合格→隔離→評估影響→文件化處置決定→必要時通知顧客；所有不合格需有記錄。"}, {"n": 199, "q": "「讓步接收（Use-As-Is）」不合格品的核准需要？", "opts": ["A. 班組長口頭同意", "B. 工程或顧客書面批准（Concession/Deviation）", "C. 不需文件", "D. 品質部門單獨決定"], "ans": "B", "expl": "讓步接收：非標準處置，必須有工程評估確認無功能/安全影響，顧客要求者需顧客書面批准。"}, {"n": 200, "q": "SCAR（Supplier Corrective Action Request，供應商矯正措施要求）發出時機是？", "opts": ["A. 供應商提早交貨", "B. 供應商造成品質逃出（Quality Escape）或系統性缺陷", "C. 供應商申請漲價", "D. 認證新供應商時"], "ans": "B", "expl": "SCAR=要求供應商對已確認的品質問題進行根本原因分析並提出永久矯正措施（通常含8D報告）。"}, {"n": 201, "q": "MTBF（平均故障間隔時間）適用於哪類系統？", "opts": ["A. 不可維修的一次性零件", "B. 可維修系統（修復後可重新使用）", "C. 只適用電子元件", "D. 只適用機械設備"], "ans": "B", "expl": "MTBF=可維修系統兩次故障間的平均使用時間；MTTF（Mean Time to Failure）=不可維修元件的失效前時間。"}, {"n": 202, "q": "可靠度工程「浴缸曲線（Bathtub Curve）」的三個階段正確描述是？", "opts": ["A. 遞增→固定→遞減", "B. 遞減（早期故障）→固定（隨機故障）→遞增（磨耗故障）", "C. 固定→遞增→遞減", "D. 全程遞增"], "ans": "B", "expl": "浴缸曲線三期：①初期故障期（降低）=Burn-in；②偶發故障期（固定）=正常使用；③磨耗期（上升）=老化磨損。"}, {"n": 203, "q": "兩個串聯（Series）元件可靠度 R₁=0.95，R₂=0.90，系統可靠度為？", "opts": ["A. 0.855", "B. 0.950", "C. 0.975", "D. 0.900"], "ans": "A", "expl": "串聯系統：R_sys = R₁ × R₂ = 0.95 × 0.90 = 0.855；串聯使系統可靠度低於最低的元件可靠度。"}, {"n": 204, "q": "兩個並聯（Parallel/Redundant）元件 R₁=R₂=0.90，系統可靠度為？", "opts": ["A. 0.81", "B. 0.90", "C. 0.99", "D. 0.95"], "ans": "C", "expl": "並聯系統：R_sys = 1-(1-R₁)(1-R₂)=1-0.1×0.1=0.99；並聯提供冗餘，提升系統可靠度。"}, {"n": 205, "q": "「加速壽命試驗（ALT，Accelerated Life Testing）」的目的是？", "opts": ["A. 加快生產速度", "B. 在較高應力下快速取得壽命資料，推估正常使用條件下的壽命", "C. 減少樣本數", "D. 取代環境試驗"], "ans": "B", "expl": "ALT：用高溫/高電壓/高振動加速老化，以短時間得到長期壽命數據；用模型（如Arrhenius）外推至正常條件。"}, {"n": 206, "q": "可靠度函數 R(t) 與累積失效函數 F(t) 的關係是？", "opts": ["A. R(t) = F(t)", "B. R(t) = 1 - F(t)", "C. R(t) = F(t)²", "D. R(t) + F(t) = 2"], "ans": "B", "expl": "R(t)=生存到時間t的機率；F(t)=在t之前失效的機率；兩者互補，R(t)+F(t)=1。"}, {"n": 207, "q": "指數分配失效率 λ=0.01/hr，則 MTTF = ？", "opts": ["A. 0.01 hr", "B. 100 hr", "C. 10 hr", "D. 1000 hr"], "ans": "B", "expl": "指數分配：MTTF = 1/λ = 1/0.01 = 100 hr；指數分配的MTTF和MTBF均等於1/λ。"}, {"n": 208, "q": "系統設計中，「冗餘（Redundancy）」的目的是？", "opts": ["A. 降低單元成本", "B. 透過備援元件提升系統可靠度", "C. 提升產品性能", "D. 減少零件數目"], "ans": "B", "expl": "冗餘=並聯備援設計，即使主元件故障，備援仍可運作→系統可靠度提升（並聯系統R>單元R）。"}, {"n": 209, "q": "「可用性（Availability，A）」的計算公式是？", "opts": ["A. MTBF / MTTF", "B. MTBF / (MTBF + MTTR)", "C. 1 - MTTR", "D. MTTF × λ"], "ans": "B", "expl": "A = MTBF/(MTBF+MTTR)；MTTR=平均維修時間（Mean Time To Repair）；A高=故障間隔長且維修快。"}, {"n": 210, "q": "「故障樹分析（FTA，Fault Tree Analysis）」是？", "opts": ["A. 由下至上的故障分析（Bottom-Up）", "B. 由頂部不期望事件向下展開，找出導致頂部事件的各種組合（Top-Down/演繹法）", "C. SPC管制工具", "D. 品質成本分析"], "ans": "B", "expl": "FTA：定義頂部事件→用邏輯閘（AND/OR）展開各失效組合→計算系統失效機率；是演繹/定量工具。"}, {"n": 211, "q": "「5 個為什麼（5 Whys）」根本原因分析法，源自哪個體系？", "opts": ["A. 六標準差（GE/Motorola）", "B. 豐田生產系統（Toyota Production System）", "C. ISO 9001", "D. 品質成本管理"], "ans": "B", "expl": "5 Whys由大野耐一在豐田開發，透過連問5次「為什麼」找到根本原因，是精實生產的問題解決工具。"}, {"n": 212, "q": "8D 問題解決法中，「D3（暫時圍堵措施）」的目的是？", "opts": ["A. 找到根本原因", "B. 在根本原因確認前，立即保護顧客不受問題繼續影響", "C. 實施永久矯正措施", "D. 預防問題再次發生"], "ans": "B", "expl": "D3=ICA（Interim Containment Action）：緊急措施保護顧客；例如加強檢驗、隔離疑似品、出貨暫停。"}, {"n": 213, "q": "「價值流圖（VSM，Value Stream Mapping）」的主要用途是？", "opts": ["A. 繪製品質管制圖", "B. 視覺化物料與資訊流動，識別浪費並設計未來改善狀態", "C. 分析製程能力", "D. 建立供應商評鑑矩陣"], "ans": "B", "expl": "VSM=精實工具，繪製「當前狀態圖」找出浪費（等待/庫存/多餘動作），設計「未來狀態圖」改善方向。"}, {"n": 214, "q": "「基準標竿（Benchmarking）」在品質管理中指的是？", "opts": ["A. 設定量測基準點", "B. 與業界最佳實踐者比較，找出差距並學習改善", "C. 校正量具的標準", "D. 設定生產目標"], "ans": "B", "expl": "Benchmarking：找標竿組織→比較關鍵指標→識別差距→學習採用最佳實踐；分內部/競爭者/跨業標竿。"}, {"n": 215, "q": "精實生產中「七大浪費（7 Muda）」不包含哪項？", "opts": ["A. 過度生產（Overproduction）", "B. 等待（Waiting）", "C. 持續改善（Kaizen）", "D. 庫存（Inventory）"], "ans": "C", "expl": "7大浪費：過度生產、等待、搬運、過度加工、庫存、動作、缺陷；Kaizen是消除浪費的方法，不是浪費本身。"}, {"n": 216, "q": "「DMADV」（設計六標準差，DFSS）與 DMAIC 的差異是？", "opts": ["A. 兩者完全相同", "B. DMADV 用於設計全新產品/製程，DMAIC 用於改善既有製程", "C. DMADV 只用於軟體開發", "D. DMAIC 用於新產品設計"], "ans": "B", "expl": "DMAIC=Define-Measure-Analyze-Improve-Control（改善）；DMADV=Define-Measure-Analyze-Design-Verify（新設計）。"}, {"n": 217, "q": "「實驗設計（DOE）」中，「主效應（Main Effect）」是指？", "opts": ["A. 兩因子交互作用的效果", "B. 單一因子從低水準到高水準，對響應變數造成的平均效應", "C. 實驗誤差", "D. 中心點的重複測量"], "ans": "B", "expl": "主效應=某因子的高低水準對Y的平均影響；交互作用=某因子的效應隨另一因子水準而改變。"}, {"n": 218, "q": "「Kaizen（改善）」的核心理念是？", "opts": ["A. 大規模變革，一次到位", "B. 全員參與的持續漸進式小改善，每天比昨天更好", "C. 只由管理階層推動改善", "D. 以自動化取代人工"], "ans": "B", "expl": "Kaizen（日文：改善=好的變化）：小步驟、持續、全員參與；不同於西方式大規模變革（Innovation）。"}, {"n": 219, "q": "以下哪個是最佳的「防錯（Poka-Yoke）」設計範例？", "opts": ["A. 增加最終品質檢驗頻率", "B. USB 插座設計成只能單一方向插入，防止反向插入損壞", "C. 要求作業員更仔細操作", "D. 加設品質告示牌"], "ans": "B", "expl": "最佳Poka-Yoke=設計上完全消除錯誤（控制型）；增加檢驗是品質鑑定，不是防錯；告示牌效果有限。"}, {"n": 220, "q": "「Genchi Genbutsu（現地現物）」的理念是？", "opts": ["A. 依靠數據報告做決策", "B. 親自到現場（Gemba）觀察實際情況，再做決策", "C. 電腦模擬製程", "D. 委派部屬處理現場問題"], "ans": "B", "expl": "現地現物：豐田文化，管理者需親到現場（Gemba=真實工作場所）直接觀察問題，不依賴二手資訊。"}, {"n": 221, "q": "「SIPOC 圖」中，各字母代表的元素正確的是？", "opts": ["A. System, Inspection, Process, Output, Customer", "B. Supplier, Input, Process, Output, Customer", "C. Statistical, Inspection, Performance, Operations, Control", "D. Supply, Inventory, Process, Order, Customer"], "ans": "B", "expl": "SIPOC：Supplier（供應者）→Input（輸入）→Process（製程）→Output（輸出）→Customer（顧客），是宏觀製程圖。"}, {"n": 222, "q": "「田口雜訊（Noise Factors）」在穩健設計中是指？", "opts": ["A. 可在設計中控制的因子", "B. 難以控制或成本高昂無法控制的因子（環境變化、使用者差異、磨耗）", "C. 製程中的隨機誤差", "D. 量測系統的誤差"], "ans": "B", "expl": "田口：信號因子（可控）用於優化；雜訊因子（不可控）=客戶使用環境差異/製造變異；目標是使產品對雜訊不敏感。"}, {"n": 223, "q": "「全面預防保養（TPM，Total Productive Maintenance）」的核心目標是？", "opts": ["A. 外包所有維修工作", "B. 消除設備六大損失（故障、設置調整、小停機、速度損失、初期不良、降低品質）", "C. 只由維修部門負責設備", "D. 縮短產品設計週期"], "ans": "B", "expl": "TPM：操作員參與日常保養（自主保養），搭配計畫保養，消除OEE（設備總合效能）的六大損失。"}, {"n": 224, "q": "全因子實驗設計（Full Factorial DOE）2因子各2水準，共需幾次實驗？", "opts": ["A. 2", "B. 4", "C. 8", "D. 16"], "ans": "B", "expl": "2²=4次實驗（A低B低、A低B高、A高B低、A高B高）；3因子=2³=8次；4因子=2⁴=16次。"}, {"n": 225, "q": "「OEE（Overall Equipment Effectiveness，設備總合效能）」的計算公式是？", "opts": ["A. 可用率 × 性能率 × 品質率", "B. 產量 / 計畫產量", "C. 實際速度 / 理論速度", "D. MTBF / (MTBF + MTTR)"], "ans": "A", "expl": "OEE = 可用率（Availability）×性能率（Performance）×品質率（Quality）；OEE>85%=世界級水準。"}, {"n": 226, "q": "「歸零（Zero Defects）」概念由哪位品質大師提出？", "opts": ["A. 戴明（Deming）", "B. 朱蘭（Juran）", "C. 克勞斯比（Crosby）", "D. 石川馨（Ishikawa）"], "ans": "C", "expl": "Philip Crosby在《品質免費（Quality is Free）》中提出零缺陷哲學：「第一次就做對」，品質是免費的。"}, {"n": 227, "q": "「顧客之聲（VOC，Voice of Customer）」收集方法「不」包含哪項？", "opts": ["A. 顧客訪談與問卷調查", "B. 保固申訴分析", "C. 量具校正記錄", "D. 焦點團體（Focus Group）"], "ans": "C", "expl": "VOC收集：訪談/問卷、客訴分析、焦點團體、現場觀察、競品分析；量具校正是MSA，與VOC無關。"}, {"n": 228, "q": "「作業指導書（SOP/WI，Work Instruction）」屬於文件層次中的第幾層？", "opts": ["A. 第一層（品質手冊）", "B. 第二層（程序書）", "C. 第三層（作業指導書）", "D. 第四層（表單/記錄）"], "ans": "C", "expl": "文件層次：L1=品質手冊（Why）；L2=程序書（What/Who）；L3=作業指導書（How，步驟細節）；L4=表單記錄。"}, {"n": 229, "q": "「校正（Calibration）」的定義是？", "opts": ["A. 調整量具至正確位置", "B. 在規定條件下，確定量具示值與標準值之間關係的一組操作", "C. 清潔和維護量具", "D. 取得量具的使用許可"], "ans": "B", "expl": "校正≠調整；校正=比對（量具值vs標準值）、記錄偏差；調整=修正偏差（校正後才決定是否調整）。"}, {"n": 230, "q": "稽核中「觀察項（Observation）」vs「不符合事項（Nonconformance/Finding）」的差異是？", "opts": ["A. 兩者相同，只是名稱不同", "B. 觀察=潛在改善機會（非嚴重）；不符合=已確認違反標準要求（有客觀證據）", "C. 觀察比不符合更嚴重", "D. 不符合是非正式意見"], "ans": "B", "expl": "NC（不符合）：客觀證據顯示違反要求，需矯正；Observation：稽核員注意到潛在風險，非強制改善。"}, {"n": 231, "q": "「防錯（Error Proofing）」依錯誤發生來源，分類正確的是？", "opts": ["A. 人為錯誤與設備故障", "B. 遺忘、誤解、辨識錯誤、初學者錯誤、疏忽等多種人為錯誤類型", "C. 只有操作員錯誤", "D. 只考慮設備失效"], "ans": "B", "expl": "Shingo分類人為錯誤：遺忘/誤解/辨識錯誤/初學/無意/疏忽/刻意/慢/無標準；Poka-Yoke針對消除這些根源。"}, {"n": 232, "q": "ISO 9001:2015 條款 7.5「文件化資訊」中，「保存（Retain）」與「維持（Maintain）」的差異是？", "opts": ["A. 兩者無差異", "B. 「維持」指現行文件（程序、作業指導書）；「保存」指歷史記錄（數據、檢驗報告）", "C. 保存比維持更重要", "D. 維持只適用於電子文件"], "ans": "B", "expl": "Maintain(維持)=程序文件，持續更新使用；Retain(保存)=品質記錄，留存以展示符合性；ISO明確區分。"}, {"n": 233, "q": "「統計公差（Statistical Tolerancing，RSS法）」相比最差情況法（Worst Case）的好處是？", "opts": ["A. 比最差情況法更保守", "B. 允許各零件公差較大（組裝後尺寸仍可在目標內），降低製造成本", "C. 不需要任何假設", "D. 需要100%檢驗"], "ans": "B", "expl": "RSS（Root Sum of Squares）：假設各零件尺寸獨立，組裝後公差=√(Σσᵢ²)；結果比Worst Case法寬鬆，但有一定風險。"}, {"n": 234, "q": "「PDCA 與 SDCA」在製程管理中的關係是？", "opts": ["A. 兩者完全相同", "B. PDCA=改善循環；SDCA=標準化→執行→查核→處置，用於維持已改善的成果", "C. SDCA 用於研發，PDCA 用於製程", "D. PDCA 在 SDCA 之後執行"], "ans": "B", "expl": "SDCA（Standardize-Do-Check-Act）：先標準化維持現狀，再用PDCA突破改善；改善後PDCA成果納入新SDCA。"}, {"n": 235, "q": "「顧客滿意度（CSAT）調查」最常用的量表是？", "opts": ["A. Likert 量表（1~5或1~7分評分）", "B. 二項式（是/否）", "C. 連續刻度尺", "D. 名目尺度"], "ans": "A", "expl": "Likert量表（如非常不滿意→非常滿意）最常用於CSAT調查；NPS（淨推薦分數）則用0~10分。"}, {"n": 236, "q": "「移動平均（Moving Average, MA）管制圖」相比X圖的優點是？", "opts": ["A. 能更快偵測大幅突發偏移", "B. 平滑化隨機變動，對小而持續的均值偏移更敏感", "C. 計算更簡單", "D. 適用於計數型資料"], "ans": "B", "expl": "MA圖：對過去n點加權平均，減少隨機波動，適合偵測緩慢趨勢；缺點是加入新點就去除最老點（等權）。"}, {"n": 237, "q": "「多變量管制圖（Hotelling T²圖）」的使用時機是？", "opts": ["A. 各品質特性完全獨立，分別監控", "B. 多個品質特性相互關聯，需同時監控所有特性的聯合狀態", "C. 只有計數型資料", "D. 只監控單一特性"], "ans": "B", "expl": "T²圖：多維度管制，考慮特性間的相關性；若多特性各自在管制內，但聯合狀態可能不正常，T²能偵測到。"}, {"n": 238, "q": "預管制（Pre-Control）方法的「綠區（Green Zone）」定義為？", "opts": ["A. 超出規格界限的區域", "B. 規格中間 50% 的區域（±25% 規格寬範圍內）", "C. ±3σ 管制界限內", "D. 所有量測值範圍"], "ans": "B", "expl": "Pre-Control分區：綠區=中間50%（目標值附近）；黃區=上下各25%；紅區=超出規格；簡單但需連續5點在綠區才可生產。"}, {"n": 239, "q": "「非線性管制圖（Non-Linear Control Chart）」如 Box-Cox 轉換的目的是？", "opts": ["A. 讓管制圖看起來更美觀", "B. 將偏態或非常態資料轉換為接近常態的分配，使標準Shewhart圖有效", "C. 擴大管制界限", "D. 只用於計數型資料"], "ans": "B", "expl": "Box-Cox轉換：y'=yλ（λ由最大概似法估計），使轉換後資料接近常態，再建立管制圖。"}, {"n": 240, "q": "管制界限（UCL/LCL）需要「重新計算」的情境是？", "opts": ["A. 每月固定重新計算", "B. 製程發生根本性變更（新設備、新原料、製程重設計）後", "C. 發現任何一點超出管制界限", "D. 每隔10組子群"], "ans": "B", "expl": "管制界限應反映當前製程的固有變異；製程根本改變後需重建基準；非每次異常都需重算（先移除特殊原因後再計算）。"}, {"n": 241, "q": "量具「校正追溯性（Calibration Traceability）」的最終源頭是？", "opts": ["A. 設備製造商的出廠校正", "B. 國家計量標準（如NIST）或國際SI單位制", "C. 顧客提供的標準件", "D. ISO認證機構"], "ans": "B", "expl": "追溯鏈：工廠量具→工廠標準件→國家計量標準（如NML台灣、NIST美國）→國際SI單位制；確保全球一致性。"}, {"n": 242, "q": "「量具解析度（Gauge Resolution）」不足的後果是？", "opts": ["A. 量測時間增加", "B. 量測值只能跳躍式變動，無法分辨細微差異，導致 GR&R 結果失真", "C. 校正周期縮短", "D. 操作員需要更多培訓"], "ans": "B", "expl": "解析度不足（如刻度太大）：量測值只能以固定間距跳動，數據呈階梯狀，GR&R重複性虛低，判斷失準。"}, {"n": 243, "q": "量測「精確度（Accuracy）」vs「精密度（Precision）」的正確配對是？", "opts": ["A. 精確度=散布小；精密度=靠近真值", "B. 精確度=靠近真值（低偏差）；精密度=散布小（高重複性）", "C. 兩者定義相同", "D. 精密度由Cpk決定"], "ans": "B", "expl": "Accuracy=與真值的接近程度（靠近靶心）；Precision=重複量測的散布（射擊集中）；射擊比喻最直觀。"}, {"n": 244, "q": "量測不確定度（Measurement Uncertainty）的「擴充不確定度（U）」通常以涵蓋因子 k=2 計算，代表約？", "opts": ["A. 68% 信賴水準", "B. 95% 信賴水準", "C. 99% 信賴水準", "D. 50% 信賴水準"], "ans": "B", "expl": "k=2（約±2σ）→涵蓋機率≈95%；k=3（±3σ）→≈99.7%；k=1（±1σ）→≈68%；量測報告常用k=2，U=k×u_c。"}, {"n": 245, "q": "「外部失敗成本（External Failure Cost）」包含哪些項目？", "opts": ["A. 預防培訓費用", "B. 進料檢驗費", "C. 客戶保固維修、退貨處理、產品召回", "D. 製程內重工費用"], "ans": "C", "expl": "外部失敗=產品出廠後的問題：保固、退貨、召回、訴訟、商譽損失；內部失敗=出廠前：報廢、重工、再驗。"}, {"n": 246, "q": "品質成本「傳統最適點理論」認為，最低總成本發生在？", "opts": ["A. 預防成本最大化時", "B. 失敗成本等於預防加鑑定成本時的均衡點", "C. 鑑定成本最小化時", "D. 不良率=0%時"], "ans": "B", "expl": "傳統理論：增加預防→失敗↓但預防成本↑；最適點=邊際預防收益=邊際預防成本；但現代觀點質疑此平衡點。"}, {"n": 247, "q": "「隱藏工廠（Hidden Factory）」指的是？", "opts": ["A. 地下製造廠房", "B. 組織內用於重工、再檢、修正等非增值活動所消耗的資源與時間", "C. 加班生產的數量", "D. 外包的生產作業"], "ans": "B", "expl": "Hidden Factory：無形的「第二生產線」，用來修補不符合品質，是COPQ的核心概念，必須找出並消除。"}, {"n": 248, "q": "「不良品質成本（COPQ，Cost of Poor Quality）」主要由哪兩類構成？", "opts": ["A. 預防成本 + 鑑定成本", "B. 內部失敗成本 + 外部失敗成本", "C. 所有四類品質成本", "D. 鑑定成本 + 外部失敗成本"], "ans": "B", "expl": "COPQ=內部失敗（報廢/重工）+外部失敗（退貨/保固/召回）；預防和鑑定成本是「品質投資」，非COPQ。"}, {"n": 249, "q": "持續改善（CI）活動的量化成效最好用哪個指標衡量？", "opts": ["A. 員工滿意度", "B. COPQ 降低率、不良率改善、Cpk 提升、週期時間縮短等量化指標", "C. 改善活動次數", "D. 培訓課時數"], "ans": "B", "expl": "改善成效必須量化：COPQ降低（$）、PPM改善、Cpk提升、RTY↑、Lead time↓；才能計算ROI並持續推動。"}, {"n": 250, "q": "ISO 9001:2015 以「風險思維」取代了2008版的哪個強制要求？", "opts": ["A. 管理審查", "B. 預防措施（Preventive Action）條款", "C. 內部稽核", "D. 顧客溝通"], "ans": "B", "expl": "2008版有明確「預防措施（8.5.3）」條款；2015版改為在整個系統中融入「風險思維（6.1）」，更主動且系統化。"}, {"n": 251, "q": "「名目群體技術（Nominal Group Technique）」在品質改善中用於？", "opts": ["A. 計算製程能力", "B. 結構化投票來優先排列問題/原因，避免少數人主導討論", "C. 繪製製程圖", "D. 分析散佈圖"], "ans": "B", "expl": "NGT：每人先獨立列出構想→分享→投票排序；減少從眾效應，確保所有人意見被納入；常用於根因優先化。"}, {"n": 252, "q": "「方針管理（Hoshin Kanri）」的主要特色是？", "opts": ["A. 只關注短期財務目標", "B. 將組織長期策略目標層層展開到各單位，並透過PDCA驗證執行", "C. 以自動化取代人工管理", "D. 純粹由外部顧問推動"], "ans": "B", "expl": "Hoshin Kanri（政策展開）：從董事會→高階管理→中階→基層，X矩陣串聯目標與手段，「球」（Catchball）溝通一致。"}, {"n": 253, "q": "「統計顯著性（Statistical Significance）」在假設檢定的含義是？", "opts": ["A. 效應量（Effect Size）大，具實際重要性", "B. 觀測結果在 H₀ 為真時出現的機率<α，足以拒絕虛無假設", "C. 樣本數已足夠", "D. 結果一定具有實務重要性"], "ans": "B", "expl": "統計顯著≠實務重要；p<α=拒絕H₀（統計顯著）；效應量小但n很大也可達顯著；實務重要性需另外評估。"}, {"n": 254, "q": "「玄場走訪（Gemba Walk）」在精實製造中的意義是？", "opts": ["A. 用電腦模擬生產流程", "B. 管理者親赴實際工作場所觀察製程，以深入了解並支持改善", "C. 供應商現場稽核", "D. 設備預防保養巡檢"], "ans": "B", "expl": "Gemba=日文「現場」；Gemba Walk：領導者帶目的去觀察（不是問罪）→找到浪費→支持解決問題。"}, {"n": 255, "q": "「計量值資料（Variable Data）」相比「計數值資料（Attribute Data）」的優點是？", "opts": ["A. 較易收集，不需量測工具", "B. 提供更多資訊（大小/方向），相同保護下所需樣本數更少", "C. 不受製程分配影響", "D. 適用於所有類型的特性"], "ans": "B", "expl": "計量值（如尺寸mm）：每個數值攜帶完整資訊；計數值（合格/不合格）：資訊較少，需更大樣本才能達同等統計效力。"}, {"n": 256, "q": "「控制圖的 3σ 管制界限」選擇 ±3σ 而非 ±2σ 的主要理由是？", "opts": ["A. 3σ 是數學上唯一正確的界限", "B. 平衡兩類錯誤：α（假警報）與 β（漏偵）的最佳折衷點", "C. ISO 標準強制規定", "D. ±2σ 界限太寬"], "ans": "B", "expl": "±3σ：假警報率α≈0.27%（夠低，不干擾生產）；若±2σ則α≈4.55%，過多假警報；休哈特選3σ是實務權衡。"}, {"n": 257, "q": "「CONC（Cost of Non-Conformance，不符合成本）」等同於品質成本分類中的？", "opts": ["A. 預防成本", "B. 鑑定成本", "C. 失敗成本（內部+外部）", "D. 全部品質成本"], "ans": "C", "expl": "CONC=不符合的代價=失敗成本（報廢/重工/退貨/保固）；COC（Cost of Conformance）=預防+鑑定成本。"}, {"n": 258, "q": "「流程方法（Process Approach）」在 ISO 9001:2015 中的意義是？", "opts": ["A. 只重視最終產品", "B. 將組織視為相互關聯的流程系統，管理輸入、輸出、互動及整體效果", "C. 各部門獨立運作", "D. 以顧客為唯一關注點"], "ans": "B", "expl": "流程方法：識別組織流程→管理輸入/輸出/資源→監控整個流程網絡；7大原則之一，強調系統整合視角。"}, {"n": 259, "q": "「計數值資料（Attribute Data）」的例子是？", "opts": ["A. 軸承直徑（mm）", "B. 表面粗糙度 Ra 值（μm）", "C. 每批中不良品的數量（件數）", "D. 扭力值（N·m）"], "ans": "C", "expl": "計數值=整數計數（合格/不合格、缺陷數）；計量值=連續量測數值（mm、kg、N·m）；兩者選用不同管制圖。"}, {"n": 260, "q": "田口「穩健設計（Robust Design）」的目標是？", "opts": ["A. 消除所有雜訊因子", "B. 最大化產品對不可控雜訊因子（環境/磨耗/使用差異）的不敏感性，使品質穩定", "C. 嚴格控制所有製程參數", "D. 增加產品的功能複雜度"], "ans": "B", "expl": "田口哲學：不是消除雜訊（不可能/昂貴），而是找到使信噪比最大的設計參數組合，讓產品對雜訊免疫。"},
{"n": 301, "q": "GD&T 中「真圓度（Circularity/Roundness）」符號是？", "opts": ["A. ○（圓形）", "B. ◎（同心圓）", "C. ⊙", "D. 圓弧形"], "ans": "A", "expl": "真圓度符號=圓形○；◎=同軸度；⊙=位置度；真圓度限制截面輪廓與理想圓的偏差量。"},
{"n": 302, "q": "GD&T 中「最大實體條件（MMC, Maximum Material Condition）」符號為？", "opts": ["A. Ⓛ", "B. Ⓢ", "C. Ⓜ", "D. Ⓟ"], "ans": "C", "expl": "MMC=Ⓜ，外部特徵（軸）尺寸最大或內部特徵（孔）尺寸最小；LMC=Ⓛ；RFS=Ⓢ（無修飾符預設）。"},
{"n": 303, "q": "「位置度（Position Tolerance）」公差帶在 GD&T 中通常是什麼形狀？", "opts": ["A. 兩平行線之間的帶狀", "B. 圓柱形（3D）或圓形（2D）區域", "C. 正方形區域", "D. 球形區域"], "ans": "B", "expl": "位置度公差帶=圓柱體（3D孔位）或圓形（2D），以理想位置為中心；比正方形公差帶多約57%面積。"},
{"n": 304, "q": "「平面度（Flatness）」公差控制的是？", "opts": ["A. 兩平行平面間的距離", "B. 一個表面的所有點必須在兩條平行平面之間（與基準無關）", "C. 相對於基準的高度", "D. 表面粗糙度"], "ans": "B", "expl": "平面度=獨立控制（不參照基準）；平行度=相對基準的平行關係；兩者概念不同。"},
{"n": 305, "q": "「垂直度（Perpendicularity）」GD&T 公差帶的形狀（軸的垂直度）是？", "opts": ["A. 兩平行線", "B. 圓柱體", "C. 球形", "D. 正方形"], "ans": "B", "expl": "軸的垂直度（到基準平面）：公差帶=以理想垂直軸為中心的圓柱體，直徑=公差值。"},
{"n": 306, "q": "GD&T 中「基準特徵（Datum Feature）」的作用是？", "opts": ["A. 限制特徵的尺寸", "B. 提供用於量測其他特徵的理論精確參考平面/軸/點", "C. 設定表面粗糙度要求", "D. 指定材料硬度"], "ans": "B", "expl": "Datum Feature=製造或檢驗時用來建立座標系的實際物理特徵；對應的Datum=理論幾何參考框架。"},
{"n": 307, "q": "「真位置（True Position）」的計算公式是？", "opts": ["A. √(ΔX² + ΔY²)", "B. 2√(ΔX² + ΔY²)", "C. ΔX + ΔY", "D. √(ΔX + ΔY)"], "ans": "B", "expl": "真位置偏差量=2√(ΔX²+ΔY²)，因為位置度公差帶是直徑（以理想位置為圓心的圓），所以乘以2。"},
{"n": 308, "q": "「跳動度（Runout）」中「全跳動（Total Runout）」與「圓跳動（Circular Runout）」的差異是？", "opts": ["A. 兩者完全相同", "B. 全跳動在整個旋轉面上量測；圓跳動僅在任一截面量測", "C. 圓跳動比全跳動更嚴格", "D. 全跳動只適用於平面"], "ans": "B", "expl": "Circular Runout：各截面分別量測；Total Runout：零件旋轉並沿軸向移動，整面量測；全跳動控制更全面。"},
{"n": 309, "q": "「包容原則（Rule #1，Taylor's Principle）」在 GD&T（ASME Y14.5）中規定？", "opts": ["A. 所有特徵均適用MMC修飾符", "B. 單一特徵在MMC時，必須完全通過理想形狀的量規（Perfect Form at MMC）", "C. 最小實體條件適用於所有孔", "D. 公差帶必須是圓形"], "ans": "B", "expl": "Rule #1：個別尺寸要素在MMC（最大料）時，其形狀必須完美（無形狀誤差）；這稱為「Taylor's Principle」。"},
{"n": 310, "q": "「表面粗糙度（Surface Roughness）Ra」的定義是？", "opts": ["A. 量測長度內最高峰與最深谷的差", "B. 量測長度內輪廓與中心線偏差絕對值的算術平均", "C. 最高5個峰與5個谷的平均", "D. RMS（均方根）粗糙度"], "ans": "B", "expl": "Ra=算術平均粗糙度，最常用；Rz=最高峰谷差；Rq/RMS=均方根粗糙度；Ra計算簡單、應用廣。"},
{"n": 311, "q": "三次元量測機（CMM, Coordinate Measuring Machine）使用的探頭（Probe）類型，最常見的是？", "opts": ["A. 雷射掃描探頭", "B. 觸發式探頭（Touch-Trigger Probe）", "C. 超音波探頭", "D. 影像感測探頭"], "ans": "B", "expl": "觸發式探頭（如Renishaw）：接觸工件時電訊觸發記錄座標；掃描式探頭持續接觸；雷射/影像為非接觸式。"},
{"n": 312, "q": "「孔配件（Hole Basis System）」與「軸配件（Shaft Basis System）」的差異是？", "opts": ["A. 孔配件以孔為基準件；軸配件以軸為基準件", "B. 兩者無差異", "C. 孔配件只用於滑動配合", "D. 軸配件只用於過盈配合"], "ans": "A", "expl": "孔基準：孔公差固定，改變軸公差得到不同配合；軸基準：軸公差固定，改變孔公差；ISO使用孔基準為主。"},
{"n": 313, "q": "「餘弦誤差（Cosine Error）」在量測中是指？", "opts": ["A. 量具刻度非線性導致的誤差", "B. 量具量測軸未與被量測特徵方向完全對齊，導致的系統性量測偏差", "C. 溫度變化導致的誤差", "D. 操作員視線偏差（視差）"], "ans": "B", "expl": "餘弦誤差：讀值≠實際值，因量具軸偏角θ時，誤差∝(1-cosθ)；對齊是量測的基本要求。"},
{"n": 314, "q": "「阿貝原理（Abbe Principle）」在精密量測中指的是？", "opts": ["A. 量測力應盡量小", "B. 被量測尺寸的軸線與量具刻度軸線應在同一直線上，以消除量測誤差", "C. 量測速度應穩定", "D. 溫度應保持在20°C"], "ans": "B", "expl": "Abbe原理（First Principle）：量具的量測方向應與基準方向共線；不滿足時引入Abbe誤差（放大的角誤差）。"},
{"n": 315, "q": "「平均粗糙度深度 Rz」相比 Ra 的特點是？", "opts": ["A. Rz 對高峰/深谷不敏感", "B. Rz 對極端峰谷值更敏感，常用於有功能要求（密封、疲勞強度）的表面", "C. Rz 永遠等於 Ra", "D. Rz 只用於粗加工"], "ans": "B", "expl": "Rz=最高5峰平均-最低5谷平均；對表面缺陷（刮傷、深谷）更敏感；Ra平均化會掩蓋極端值。"},
{"n": 316, "q": "GD&T「形狀公差（Form Tolerance）」不需要？", "opts": ["A. 形狀公差帶", "B. 符號標注", "C. 基準（Datum）參考", "D. 公差數值"], "ans": "C", "expl": "形狀公差（真直度/真圓度/圓柱度/平面度）：控制特徵本身形狀，不與基準有關，故不需標示基準。"},
{"n": 317, "q": "「量規（Gauge）設計的泰勒原則」規定：通端（GO gauge）應？", "opts": ["A. 為點接觸，只量測一個尺寸", "B. 為全形量規，能同時檢驗所有尺寸要素（實體量規）", "C. 比止端（NO-GO）更短", "D. 只適用於外徑量測"], "ans": "B", "expl": "Taylor原則：GO=全形量規（Full Form），能同時控制尺寸+形狀；NO-GO=點接觸，只量單一尺寸要素。"},
{"n": 318, "q": "「表面波紋度（Waviness）」與「表面粗糙度（Roughness）」的主要差異是？", "opts": ["A. 兩者相同", "B. 波紋度波長較長（0.08-0.8mm以上），由振動/撓曲造成；粗糙度波長短，由加工刀具造成", "C. 粗糙度波長更長", "D. 波紋度只影響外觀，不影響功能"], "ans": "B", "expl": "表面輪廓分三層：粗糙度（短波，Ra評估）+波紋度（中波，Wa）+形狀誤差（長波）；功能設計需分別控制。"},
{"n": 319, "q": "游標卡尺（Vernier Caliper）的最小讀值（解析度）通常是？", "opts": ["A. 0.001 mm", "B. 0.01 mm 或 0.02 mm", "C. 0.1 mm", "D. 0.001 in"], "ans": "B", "expl": "標準游標卡尺：分度值0.02mm（50格游標）或0.05mm（20格）；數位式可達0.01mm；分釐卡為0.001mm。"},
{"n": 320, "q": "分釐卡（Micrometer）的分度值（解析度）通常是？", "opts": ["A. 0.1 mm", "B. 0.01 mm", "C. 0.001 mm", "D. 0.0001 mm"], "ans": "C", "expl": "標準分釐卡：0.001mm（1μm）；附加鼓輪（Vernier Micrometer）可讀0.001mm；電子式可達0.0001mm。"},
{"n": 321, "q": "量表（Dial Gauge/Indicator）在量測中最主要用於？", "opts": ["A. 絕對尺寸量測（absolute measurement）", "B. 相對偏差量測（比較量測，如跳動、平面度、同軸度）", "C. 表面粗糙度量測", "D. 硬度量測"], "ans": "B", "expl": "量表=比較式量測儀器，最適合量測偏差（vs.基準）；不適合絕對尺寸（需搭配量塊）；解析度0.001或0.01mm。"},
{"n": 322, "q": "「量塊（Gauge Block / Jo Block）」的主要用途是？", "opts": ["A. 量測孔徑", "B. 作為長度量測的基準，提供可追溯的精密長度標準", "C. 量測表面粗糙度", "D. 校正液體量測儀器"], "ans": "B", "expl": "量塊：精密長度基準，Grade K/0/1/2各有精度等級；可疊加使用；硬化鋼/陶瓷材質；追溯至國際米定義。"},
{"n": 323, "q": "「氣動量儀（Air Gauge）」的主要優點是？", "opts": ["A. 可量測任何材質", "B. 非接觸量測，速度快，精度高，適合量測易變形軟性零件", "C. 操作最簡單", "D. 可量測長距離"], "ans": "B", "expl": "氣動量儀：利用空氣流速/背壓原理；非接觸式（不傷工件）；量測範圍小但精度高（0.1~1μm）。"},
{"n": 324, "q": "使用分釐卡量測時，「棘輪（Ratchet）」的功能是？", "opts": ["A. 鎖定量測值", "B. 確保每次施加固定量測力（避免因施力不同造成偏差）", "C. 調整量測範圍", "D. 歸零校正"], "ans": "B", "expl": "棘輪限制施力：到達設定轉矩後空轉，確保每次量測力一致（通常約5-10N），避免因施力差異造成誤差。"},
{"n": 325, "q": "「硬度計」中，「洛氏硬度（Rockwell）」使用什麼作為壓頭？", "opts": ["A. 鋼球（僅用鋼球）", "B. 金剛石圓錐（Brale）或鋼球，依用途選擇", "C. 維氏四角錐金剛石", "D. 鈹銅球"], "ans": "B", "expl": "洛氏：HRC用鋼（或金剛石圓錐；HRB用1/16\"鋼球；各Scale有不同壓頭和主荷重；快速、適合生產現場。"},
{"n": 326, "q": "「光學比較儀（Optical Comparator / Profile Projector）」主要用於？", "opts": ["A. 量測表面粗糙度", "B. 將工件輪廓放大投影到屏幕，比對樣板或量測輪廓尺寸", "C. 量測材料化學成分", "D. 量測硬度"], "ans": "B", "expl": "輪廓投影機（Shadow Graph）：將工件影像放大（10X~100X）投影，用於齒輪、螺紋、刀具等複雜輪廓量測。"},
{"n": 327, "q": "CMM（座標量測機）量測前，需先進行的「量測工件基準建立（Part Setup）」流程是？", "opts": ["A. 直接量測所有特徵", "B. 先量測基準特徵（平面、孔、邊）建立3-2-1定位關係，確立工件座標系", "C. 校正量具即可", "D. 依圖面順序量測"], "ans": "B", "expl": "3-2-1 Datum：3點定平面（Z）→2點定軸（X或Y）→1點定原點；建立工件座標系後才能準確量測各特徵。"},
{"n": 328, "q": "「雷射干涉儀（Laser Interferometer）」在量測機台校正中主要用於？", "opts": ["A. 量測工件表面粗糙度", "B. 精密量測線性位移、直線度、直角度（nm~μm精度）", "C. 量測材料透光性", "D. 非接觸溫度量測"], "ans": "B", "expl": "雷射干涉儀利用光波干涉原理，精度達nm級，用於校正CMM、工具機直線度/定位精度/垂直度等。"},
{"n": 329, "q": "「超音波探傷（UT, Ultrasonic Testing）」在非破壞性檢驗中，最適合偵測？", "opts": ["A. 表面裂縫", "B. 內部缺陷（如裂紋、夾雜、氣孔）", "C. 材料顏色差異", "D. 表面氧化層"], "ans": "B", "expl": "UT：超音波穿透材料，遇到內部缺陷時反射；適合金屬/複合材料內部缺陷；表面缺陷用PT/MT。"},
{"n": 330, "q": "「磁粉探傷（MT, Magnetic Particle Testing）」的限制是？", "opts": ["A. 無法偵測表面缺陷", "B. 只能用於鐵磁性材料（如碳鋼、鑄鐵）", "C. 無法用於小零件", "D. 只能室外使用"], "ans": "B", "expl": "MT：利用磁場使磁粉集中在缺陷處；只對鐵磁性材料有效（不鏽鋼304、鋁、鈦無法使用）；表面/近表面缺陷。"},
{"n": 331, "q": "「液滲探傷（PT, Penetrant Testing）」最適合檢測哪類缺陷？", "opts": ["A. 內部裂紋", "B. 開口於表面的裂縫、氣孔（表面缺陷）", "C. 次表面缺陷", "D. 材料成分"], "ans": "B", "expl": "PT：滲透液進入表面開口缺陷→顯像劑吸出著色，形成可見顯示；適用金屬、陶瓷、玻璃等；限表面開口缺陷。"},
{"n": 332, "q": "「X 光射線探傷（RT, Radiographic Testing）」的主要缺點是？", "opts": ["A. 只能量測表面", "B. 輻射危害、成本高、需要人員防護與管制", "C. 無法偵測金屬缺陷", "D. 精度不夠"], "ans": "B", "expl": "RT：X光/γ射線穿透工件，缺陷使底片曝光差異顯影；優點=永久記錄；缺點=輻射危害、成本高、速度慢。"},
{"n": 333, "q": "「渦流探傷（ET, Eddy Current Testing）」最常用於？", "opts": ["A. 木材缺陷偵測", "B. 導電材料（金屬）的表面及近表面裂縫偵測，以及厚度量測", "C. 複合材料內部缺陷", "D. 塑膠件缺陷"], "ans": "B", "expl": "渦流：交流電在探頭感應渦電流於導體，缺陷改變渦流分布→電阻抗變化偵測；非接觸、快速、適合管材/航太零件。"},
{"n": 334, "q": "校正間隔（Calibration Interval）應根據什麼來決定？", "opts": ["A. 只根據製造商建議", "B. 量具使用頻率、使用條件、歷史校正結果（穩定性）、風險", "C. 固定每年一次", "D. 只根據ISO要求"], "ans": "B", "expl": "ISO/IEC 17025要求根據：使用頻率/環境、過去穩定性記錄、用途重要性（安全/精度）等動態調整校正間隔。"},
{"n": 335, "q": "「校正標準（Calibration Standards）」的等級從高到低，正確順序是？", "opts": ["A. 工作標準→基準標準→傳遞標準→國際標準", "B. 國際標準（SI）→國家標準→傳遞標準（Transfer）→工作標準", "C. 工作標準→國家標準", "D. 所有等級相同"], "ans": "B", "expl": "校正追溯階層：國際SI→國家計量院（NIST等）→傳遞/參考標準→工作標準（現場量具）；每級精度遞減。"},
{"n": 336, "q": "校正記錄應包含哪些最低限度的資訊？", "opts": ["A. 只需記錄Pass/Fail", "B. 量具編號、校正日期、校正人員、量測結果（數據）、下次校正日期", "C. 只需設備名稱", "D. 客戶名稱和合約編號"], "ans": "B", "expl": "ISO/IEC 17025要求校正報告：設備識別、環境條件、量測結果+不確定度、校正人員、日期、方法等。"},
{"n": 337, "q": "當量具發現校正逾期（Over Due），正確的處置程序是？", "opts": ["A. 繼續使用至下次校正", "B. 立即停用，追溯評估自上次校正後的量測結果影響，通知受影響方", "C. 只需重新貼校正標籤", "D. 由操作員判斷是否可用"], "ans": "B", "expl": "逾期校正≠不合格；需判斷：期間量測結果是否受影響？若有影響需啟動矯正措施並通知受影響的顧客或生產批次。"},
{"n": 338, "q": "「量測不確定度（Measurement Uncertainty）」必須在校正報告中提供的原因是？", "opts": ["A. 法規強制要求", "B. 量測結果沒有不確定度是不完整的，用戶無法判斷量測結果的可靠性", "C. 只是格式要求", "D. 為了計算成本"], "ans": "B", "expl": "ISO/IEC 17025：校正報告必須包含量測不確定度；無不確定度的量測結果無法與規格比較（是否在公差內）。"},
{"n": 339, "q": "「量測設備管理（MTE, Measuring and Test Equipment）」系統的核心要求是？", "opts": ["A. 所有設備集中一個部門", "B. 量測設備的識別、校正狀態標示、儲存保護、使用中防護", "C. 所有設備用一家廠商", "D. 只保留最新型號設備"], "ans": "B", "expl": "MTE管理：唯一識別標記、校正有效期標示（標籤/系統）、適當儲存（避免損傷/環境影響）、使用中防護（不落摔）。"},
{"n": 340, "q": "「偏差（Bias）」在量測系統中的意義，與哪個術語最接近？", "opts": ["A. 重複性（Repeatability）", "B. 系統性誤差（Systematic Error）/準確性（Accuracy）問題", "C. 隨機誤差", "D. 解析度"], "ans": "B", "expl": "Bias=量測均值與參考值（真值）的差=系統性誤差；重複性=隨機誤差；兩者都影響量測品質，需分別評估。"},
{"n": 341, "q": "「防震（Anti-vibration）基座」在精密量測實驗室中的目的是？", "opts": ["A. 增加設備穩定性，防止外部振動影響量測精度", "B. 保護設備免於地震破壞", "C. 減少噪音", "D. 增加樓板承重"], "ans": "A", "expl": "精密量測（CMM、干涉儀）對振動非常敏感（nm~μm級量測）；隔振基座/光學平台隔離地板振動，確保量測穩定。"},
{"n": 342, "q": "量具校正時，「環境條件」中最關鍵的因素通常是？", "opts": ["A. 照明強度", "B. 溫度（標準量測溫度=20°C/68°F）", "C. 濕度", "D. 噪音水準"], "ans": "B", "expl": "熱膨脹影響所有材料尺寸；ISO 1 規定標準量測溫度=20°C；鋼材α≈11.7×10⁻⁶/°C，1°C差異引起顯著誤差。"},
{"n": 343, "q": "「量規磨損（Gauge Wear）」對 GO gauge 的影響是？", "opts": ["A. GO 量規因磨損而縮小，可能允收不合格件", "B. GO 量規因磨損而縮小，應更嚴格（可能拒收合格件）", "C. GO 量規磨損後不影響量測", "D. GO 量規只有過盈磨損"], "ans": "B", "expl": "外徑GO量規（Ring Gauge）磨損→內徑增大→可能允收超差軸；孔GO量規磨損→外徑縮小→可能拒收合格孔。設計應考慮磨損公差。"},
{"n": 344, "q": "「環規（Ring Gauge）」用於量測什麼？", "opts": ["A. 孔徑", "B. 軸徑（外徑）", "C. 螺距", "D. 平面度"], "ans": "B", "expl": "Ring Gauge=量測外徑（軸）；Plug Gauge=量測孔徑（內徑）；Snap Gauge=快速GO/NO-GO量測外徑。"},
{"n": 345, "q": "「歸零（Zeroing）」量具的目的是？", "opts": ["A. 永久消除偏差", "B. 建立相對量測基準點，消除已知偏差（對照標準件後調零）", "C. 重設量具日期", "D. 清除量測記錄"], "ans": "B", "expl": "歸零=相對量測基準設定；對照量塊/標準件後調零→後續量測為相對偏差；不消除固有系統誤差（需校正）。"},
{"n": 346, "q": "稽核「客觀證據（Objective Evidence）」的定義是？", "opts": ["A. 稽核員的主觀評估", "B. 可驗證的事實、記錄、陳述或其他資訊（與稽核準則的符合性相關）", "C. 客戶投訴紀錄", "D. 管理層的口頭說明"], "ans": "B", "expl": "客觀證據=可核實的資訊：文件、記錄、量測數據、觀察事實；稽核結論必須以客觀證據為基礎。"},
{"n": 347, "q": "「稽核發現（Audit Finding）」分類中，「主要不符合（Major NC）」與「次要不符合（Minor NC）」的區別是？", "opts": ["A. 兩者相同", "B. 主要NC：系統性缺失或導致系統失效的重大問題；次要NC：單一偶發性不符合要求", "C. 主要NC只適用於製造業", "D. 次要NC由客戶決定"], "ans": "B", "expl": "Major NC：系統完全缺失、多次重複、有重大產品安全影響；Minor NC：偶發的局部不符合，系統仍有效。"},
{"n": 348, "q": "稽核「首次會議（Opening Meeting）」的主要目的是？", "opts": ["A. 開始討論不符合事項", "B. 介紹稽核範圍、目的、方法、行程，確認聯繫人，建立溝通基礎", "C. 簽署合約", "D. 確認不符合事項數量"], "ans": "B", "expl": "首次會議：稽核員自我介紹→確認稽核範圍/目的→說明方法→確認行程與受稽核窗口→機密性聲明。"},
{"n": 349, "q": "「稽核追蹤（Audit Trail）」是指？", "opts": ["A. 跟隨受稽核方員工的行動", "B. 沿著流程/文件的連結路徑，從一個證據追溯到另一個，驗證系統的完整性", "C. 稽核員的行程記錄", "D. 稽核費用的核銷追蹤"], "ans": "B", "expl": "Audit Trail：例如從不合格品記錄→追查矯正措施→追查根因分析→追查培訓記錄→確認系統連結是否完整。"},
{"n": 350, "q": "品質稽核中，「樣本選取」的建議方式是？", "opts": ["A. 固定查每個月的第一筆", "B. 依稽核員判斷+隨機抽樣，確保代表性，且針對高風險區域加強", "C. 只查最新的記錄", "D. 只查最舊的記錄"], "ans": "B", "expl": "稽核樣本：隨機抽樣確保代表性；判斷性抽樣針對高風險/過往問題領域；兩者結合最有效。"},
{"n": 351, "q": "「過程稽核（Process Audit）」的目標是？", "opts": ["A. 確認品質系統文件是否完整", "B. 評估特定製程的輸入、轉換、輸出及管制是否符合計畫要求", "C. 查核最終產品品質", "D. 評估員工個人績效"], "ans": "B", "expl": "過程稽核（如VDA 6.3）：進入製程→確認輸入（材料/設備/人員）→查製程管制（SOP/SPC）→查輸出品質。"},
{"n": 352, "q": "「產品稽核（Product Audit）」與「製程稽核」最主要的差異是？", "opts": ["A. 產品稽核不需要稽核員", "B. 產品稽核對已完成產品按規格逐項確認特性；製程稽核查製程控制方法", "C. 製程稽核只在客戶端進行", "D. 兩者無差異"], "ans": "B", "expl": "產品稽核：抽取成品，按設計規格/工程圖全面驗證；製程稽核：確認製程是否按計畫執行（方法/人員/設備）。"},
{"n": 353, "q": "稽核「末次會議（Closing Meeting）」中必須包含？", "opts": ["A. 只宣布稽核通過或不通過", "B. 感謝配合→摘要稽核發現→說明不符合事項→說明後續矯正措施程序→確認後續計畫", "C. 簽署新合約", "D. 討論薪資福利"], "ans": "B", "expl": "末次會議：感謝配合→說明稽核方法及限制→報告發現（含NC）→確認受稽核方理解→說明後續報告與CAR流程。"},
{"n": 354, "q": "「矯正措施（Corrective Action）」與「預防措施（Preventive Action）」的關係在 ISO 9001:2015 中是？", "opts": ["A. 兩者完全分開，各有獨立條款", "B. 2015版取消獨立的預防措施條款，改由「風險思維（6.1）」在系統層面主動預防", "C. 兩者合并為同一條款", "D. 預防措施已不重要"], "ans": "B", "expl": "2008版有8.5.3預防措施；2015版：預防概念融入風險管理（6.1），矯正措施（10.2）針對已發生的不符合。"},
{"n": 355, "q": "「CAPA（Corrective and Preventive Action）報告」中，「根本原因分析（RCA）」最常用的方法是？", "opts": ["A. 抽樣檢驗", "B. 5 Whys、魚骨圖（Ishikawa）、FTA、Is/Is Not 分析", "C. 管制圖", "D. 散佈圖"], "ans": "B", "expl": "RCA工具：5 Whys（最廣用）、魚骨圖（系統性）、FTA（系統安全）、Is/Is Not（問題定義）；目標=找真正根因。"},
{"n": 356, "q": "稽核計畫（Audit Programme）管理者的職責包含？", "opts": ["A. 只負責安排稽核日期", "B. 建立稽核計畫目標、管理稽核資源與能力、評估稽核員、維護稽核記錄", "C. 只負責出席每次稽核", "D. 代替稽核員執行稽核"], "ans": "B", "expl": "ISO 19011：Audit Programme Manager負責：目標設定、資源分配、稽核員能力評估、計畫監控改善。"},
{"n": 357, "q": "「稽核員資格（Auditor Qualification）」按 ISO 19011 建議，至少需要？", "opts": ["A. 只需要大學學歷", "B. 教育+工作經驗+稽核培訓+實際稽核經驗+評估合格", "C. 只需要稽核培訓課程", "D. 只需要主任稽核員推薦"], "ans": "B", "expl": "ISO 19011稽核員：教育背景+品質相關工作經驗+稽核培訓（至少X小時）+實際稽核觀察/執行+定期評鑑。"},
{"n": 358, "q": "供應商稽核（Second-Party Audit）的目的是？", "opts": ["A. 取得第三方認證", "B. 評估供應商的品質管理系統和能力是否符合買方要求", "C. 稽核內部流程", "D. 替代ISO認證"], "ans": "B", "expl": "二方稽核：買方/顧客稽核供應商；目的=確認供應商能力、品質系統合規、特殊製程管制；不取代三方認證。"},
{"n": 359, "q": "「稽核密度（Audit Frequency）」應根據哪些因素調整？", "opts": ["A. 固定每年一次，不需調整", "B. 風險程度、上次稽核結果、製程變化、客戶要求", "C. 只根據稽核成本", "D. 只根據客戶投訴次數"], "ans": "B", "expl": "稽核頻率動態調整：高風險/問題供應商增加頻率；表現穩定可降低頻率；這是「風險基礎稽核（Risk-Based Auditing）」原則。"},
{"n": 360, "q": "「稽核機密性（Confidentiality）」要求稽核員？", "opts": ["A. 可自由分享稽核資訊", "B. 對稽核中獲取的商業機密/敏感資訊保密，未經授權不得對第三方披露", "C. 只對稽核結果保密", "D. 只有外部稽核需要保密"], "ans": "B", "expl": "ISO 19011：稽核員需保護稽核中獲取的資訊；稽核報告只提供授權方；違反保密可能引發法律責任。"},
{"n": 361, "q": "「產品認證（Product Certification）」與「系統認證（System Certification）」的差異是？", "opts": ["A. 兩者完全相同", "B. 產品認證針對特定產品符合標準（如CE、UL）；系統認證針對管理系統運作（如ISO 9001）", "C. 只有產品認證需要稽核", "D. 系統認證包含產品認證"], "ans": "B", "expl": "Product Cert（如UL/CE/FDA）：特定產品符合安全/性能規範；System Cert（ISO 9001）：管理系統是否有效運作。"},
{"n": 362, "q": "「稽核發現通知（Audit Finding Report）」應在稽核後多久內發出？", "opts": ["A. 1年內", "B. 依稽核計畫或合約約定，通常在2~4週內（或更短）", "C. 只需口頭通知", "D. 沒有時間要求"], "ans": "B", "expl": "ISO 19011建議及時出具報告；IATF 16949要求CAR通常在10個工作天內；及時性是矯正有效性的關鍵。"},
{"n": 363, "q": "「過程稽核（VDA 6.3）」中，過程要素評估包含哪些層面？", "opts": ["A. 只評估最終產品", "B. 人員（Man）、機器（Machine）、物料（Material）、方法（Method）、量測（Measurement）、環境（Milieu）", "C. 只評估設備", "D. 只評估文件"], "ans": "B", "expl": "VDA 6.3製程稽核：6M（人機料法量環）系統評估每個製程要素；結果計分（%達成率），<80%需矯正。"},
{"n": 364, "q": "「稽核矩陣（Audit Matrix）」的用途是？", "opts": ["A. 計算稽核費用", "B. 將稽核要求/條款與組織流程/部門進行交叉對應，確保稽核全面覆蓋", "C. 排列稽核員職位", "D. 記錄稽核結果統計"], "ans": "B", "expl": "稽核矩陣（Coverage Matrix）：行=ISO條款/要求；列=部門/流程；交叉格=稽核頻率/計畫；確保無遺漏。"},
{"n": 365, "q": "「稽核準則（Audit Criteria）」是指？", "opts": ["A. 稽核員的個人標準", "B. 用於評估客觀證據的一組方針、程序或要求（如ISO標準、法規、顧客要求）", "C. 稽核費用標準", "D. 稽核員培訓標準"], "ans": "B", "expl": "Audit Criteria=稽核的判斷依據，可以是：ISO標準、法規、內部程序、合約要求；決定「不符合」的評判依據。"},
{"n": 366, "q": "「風險管理」中，「風險規避（Risk Avoidance）」是指？", "opts": ["A. 接受風險並監控", "B. 完全停止可能引發風險的活動", "C. 將風險轉移給第三方", "D. 降低風險的嚴重程度"], "ans": "B", "expl": "四大風險應對：Avoid（規避）=停止活動；Transfer（轉移）=保險/外包；Mitigate（降低）=控制措施；Accept（接受）。"},
{"n": 367, "q": "「ISO 31000 風險管理」框架的核心流程是？", "opts": ["A. PDCA", "B. 風險識別→風險分析→風險評估→風險應對→監控與審查", "C. DMAIC", "D. FMEA→FTA"], "ans": "B", "expl": "ISO 31000：背景設定→識別→分析（可能性+後果）→評估（優先級）→應對→監控→溝通；為通用框架。"},
{"n": 368, "q": "「設計 FMEA（DFMEA）」主要分析的是？", "opts": ["A. 製程中可能發生的失效", "B. 產品設計中的潛在失效模式及其對使用者/系統的影響", "C. 供應商的失效模式", "D. 現場服務過程的失效"], "ans": "B", "expl": "DFMEA：在設計階段分析每個設計特性的失效模式→影響→嚴重度；目的是在量產前識別並消除設計弱點。"},
{"n": 369, "q": "「製程 FMEA（PFMEA）」的「偵測度（D, Detection）」評分高（如9-10分）代表？", "opts": ["A. 很容易偵測到失效", "B. 現有管制手段幾乎無法在失效流出前偵測到", "C. 嚴重性高", "D. 發生頻率高"], "ans": "B", "expl": "Detection（D）：D=1=幾乎確定能偵測（自動100%檢測）；D=9~10=幾乎不可能偵測（無相關管制）；D越高越危險。"},
{"n": 370, "q": "「FMEA 邊界圖（Boundary Diagram）」與「P 圖（Parameter Diagram）」的用途是？", "opts": ["A. 繪製生產流程圖", "B. 邊界圖=定義分析範圍與系統界面；P圖=分析輸入/輸出/控制因子/雜訊因子", "C. 繪製品質成本圖", "D. 定義稽核範圍"], "ans": "B", "expl": "DFMEA前置工具：Boundary Diagram（範圍+界面）→Block Diagram（子系統）→P-Diagram（因子分析）→DFMEA。"},
{"n": 371, "q": "「失效模式（Failure Mode）」的描述應該是？", "opts": ["A. 失效的原因", "B. 特徵未達到設計/製程意圖的方式（如斷裂、洩漏、短路、尺寸過大）", "C. 失效的最終影響", "D. 失效的解決方案"], "ans": "B", "expl": "失效模式=失效的表現形式（how it fails）；失效原因=為何發生；失效影響=對客戶/系統的影響；三者分開分析。"},
{"n": 372, "q": "「特殊特性（Special Characteristics）」在 IATF 16949 中必須？", "opts": ["A. 放寬管制要求", "B. 在FMEA、管制計畫、作業指導書中標示，並套用強化管制（如SPC、防錯）", "C. 只需文件記錄", "D. 免除稽核"], "ans": "B", "expl": "CC（Critical Characteristics）/SC（Significant Characteristics）：必須在FMEA標示→管制計畫列管→SOP加強管制。"},
{"n": 373, "q": "「危害分析與重要管制點（HACCP）」主要應用於哪個領域？", "opts": ["A. 航太", "B. 食品安全與製造（確保食品從原料到終端消費者的安全）", "C. 汽車製造", "D. 核能"], "ans": "B", "expl": "HACCP：食品工業系統性風險管理；識別生物/化學/物理危害→設定CCP→管制措施→監控→驗證。"},
{"n": 374, "q": "「失效樹分析（FTA）」中，「AND 閘」的意義是？", "opts": ["A. 任一輸入事件發生即導致輸出事件", "B. 所有輸入事件必須同時發生，才會導致輸出事件", "C. 至少一個輸入導致輸出", "D. 輸入與輸出無關"], "ans": "B", "expl": "AND Gate：多個事件必須同時發生才導致頂部事件；使系統更可靠（需更多失效同時發生）；OR Gate=任一即失效。"},
{"n": 375, "q": "「事件樹分析（ETA, Event Tree Analysis）」相比 FTA 的特點是？", "opts": ["A. 分析過去的失效", "B. 從初始事件出發（前向歸納），分析事件展開路徑及後果的可能性", "C. 只用於安全評估", "D. 與FTA完全相同"], "ans": "B", "expl": "FTA=後向演繹（Top-Down）；ETA=前向歸納（Bottom-Up）：從起因事件出發，追蹤系統響應路徑到各種結果。"},
{"n": 376, "q": "「風險矩陣」中，落在「高風險（High Risk）」區的項目應優先採取哪種行動？", "opts": ["A. 接受風險，定期監控", "B. 立即採取控制措施，降低發生機率或嚴重性", "C. 轉移風險給保險公司", "D. 忽略，等問題發生再處理"], "ans": "B", "expl": "高風險（高嚴重度×高機率）=需立即行動；中風險=計畫性改善；低風險=可接受並監控。"},
{"n": 377, "q": "「HACCP 七大原則」中，「矯正措施（Corrective Action）」在第幾個原則？", "opts": ["A. 第2個", "B. 第5個", "C. 第3個", "D. 第7個"], "ans": "B", "expl": "HACCP七原則：1.危害分析→2.CCP識別→3.關鍵界限→4.監控→5.矯正措施→6.驗證→7.記錄保存。"},
{"n": 378, "q": "「FMEA 責任分配（Action Ownership）」的最佳實踐是？", "opts": ["A. 全部由品質工程師負責", "B. 每個改善行動指派具體的責任人員與完成日期", "C. 由委員會集體負責", "D. 只有高優先項目才需責任人"], "ans": "B", "expl": "FMEA行動欄位：每個RPN/AP高的項目必須指定負責人（Owner）+目標完成日期；否則行動無法落實。"},
