<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品質管理測驗系統</title>
<style>
:root {
  --c1:#2563eb; --c2:#7c3aed; --c3:#059669; --c4:#d97706;
  --navy:#1e3a5f; --bg:#f0f4f8; --white:#fff;
  --gray:#6b7280; --lgray:#e5e7eb; --dark:#1f2937;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.15);
  --trans:all .2s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* ── Header ── */
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);color:var(--white);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow-lg);}
.header h1{font-size:1.3rem;font-weight:700;}
.hdr-right{margin-left:auto;display:flex;gap:.5rem;}
.hdr-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:var(--white);padding:.4rem .9rem;border-radius:20px;cursor:pointer;font-size:.85rem;transition:var(--trans);}
.hdr-btn:hover{background:rgba(255,255,255,.3);}
.hdr-btn.active{background:rgba(255,255,255,.95);color:var(--navy);font-weight:600;}

/* ── Screens ── */
.screen{display:none;max-width:900px;margin:0 auto;padding:1.5rem;}
.screen.active{display:block;}

/* ── Home ── */
.home-banner{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:var(--white);border-radius:var(--radius);padding:2rem;text-align:center;margin-bottom:1.5rem;box-shadow:var(--shadow-lg);}
.home-banner h2{font-size:1.8rem;margin-bottom:.5rem;}
.home-banner p{opacity:.85;font-size:1rem;}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-box{background:var(--white);border-radius:var(--radius);padding:1.2rem;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-size:2rem;font-weight:700;color:var(--navy);}
.stat-label{font-size:.8rem;color:var(--gray);margin-top:.2rem;}
.mode-section h3{font-size:1.1rem;font-weight:600;color:var(--navy);margin-bottom:1rem;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.mode-card{background:var(--white);border-radius:var(--radius);padding:1.5rem;cursor:pointer;border:2px solid transparent;box-shadow:var(--shadow);transition:var(--trans);}
.mode-card:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.mode-card .icon{font-size:2rem;margin-bottom:.7rem;}
.mode-card h4{font-size:1rem;font-weight:700;margin-bottom:.4rem;color:var(--navy);}
.mode-card p{font-size:.83rem;color:var(--gray);}

/* Chapter cards */
.chapter-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;}
.ch-card{border-radius:var(--radius);padding:1.2rem 1.5rem;color:var(--white);cursor:pointer;display:flex;align-items:center;gap:1rem;transition:var(--trans);box-shadow:var(--shadow);}
.ch-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.ch-card .ch-icon{font-size:2rem;}
.ch-card .ch-info h4{font-size:1rem;font-weight:700;}
.ch-card .ch-info p{font-size:.8rem;opacity:.85;}
.ch-card .ch-prog{margin-left:auto;text-align:right;}
.ch-card .ch-prog .prog-num{font-size:1.1rem;font-weight:700;}
.ch-card .ch-prog .prog-label{font-size:.7rem;opacity:.8;}

/* ── Random setup ── */
.rand-setup{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-top:1rem;}
.rand-setup h3{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;}
.preset-btns{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;}
.preset-btn{background:var(--lgray);border:none;border-radius:20px;padding:.45rem 1rem;font-size:.9rem;cursor:pointer;transition:var(--trans);}
.preset-btn:hover,.preset-btn.sel{background:var(--navy);color:var(--white);}
.rand-input-row{display:flex;gap:.8rem;align-items:center;margin-bottom:1rem;}
.rand-input-row input{flex:1;border:2px solid var(--lgray);border-radius:var(--radius-sm);padding:.5rem .8rem;font-size:1rem;outline:none;}
.rand-input-row input:focus{border-color:#2563eb;}
.start-btn{width:100%;padding:.85rem;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:var(--white);border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:700;cursor:pointer;transition:var(--trans);}
.start-btn:hover{opacity:.9;transform:translateY(-1px);}

/* ── Quiz Screen ── */
.quiz-header{background:var(--white);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow);display:flex;align-items:center;gap:1rem;}
.quiz-ch-tag{padding:.3rem .8rem;border-radius:20px;font-size:.8rem;font-weight:600;color:var(--white);}
.quiz-progress{flex:1;}
.quiz-progress-bar{height:6px;background:var(--lgray);border-radius:3px;overflow:hidden;margin-top:.4rem;}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:3px;transition:width .3s ease;}
.quiz-progress-text{font-size:.8rem;color:var(--gray);}
.q-card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1rem;}
.q-num{font-size:.8rem;color:var(--gray);margin-bottom:.6rem;}
.q-text{font-size:1.05rem;font-weight:600;line-height:1.6;margin-bottom:1.2rem;}
.opts-grid{display:grid;gap:.6rem;}
.opt-btn{width:100%;text-align:left;background:var(--bg);border:2px solid var(--lgray);border-radius:var(--radius-sm);padding:.7rem 1rem;font-size:.95rem;cursor:pointer;transition:var(--trans);display:flex;align-items:flex-start;gap:.7rem;}
.opt-btn:hover:not(:disabled){background:#eff6ff;border-color:#93c5fd;}
.opt-btn:disabled{cursor:default;}
.opt-btn .opt-letter{background:var(--lgray);color:var(--gray);font-weight:700;border-radius:4px;padding:.1rem .45rem;font-size:.85rem;min-width:1.8rem;text-align:center;flex-shrink:0;margin-top:.05rem;}
.opt-btn .opt-text{line-height:1.4;}
.opt-btn.correct{background:#d1fae5;border-color:#10b981;color:#065f46;}
.opt-btn.correct .opt-letter{background:#10b981;color:var(--white);}
.opt-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#7f1d1d;}
.opt-btn.wrong .opt-letter{background:#ef4444;color:var(--white);}
.opt-btn.show-correct{background:#d1fae5;border-color:#10b981;}
.opt-btn.show-correct .opt-letter{background:#10b981;color:var(--white);}

/* Explanation box */
.expl-box{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:var(--radius-sm);padding:1rem 1.2rem;margin-top:1rem;display:none;line-height:1.7;font-size:.92rem;}
.expl-box.show{display:block;}
.expl-box strong{color:#92400e;}

/* Result tag */
.result-tag{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:20px;font-size:.88rem;font-weight:600;margin-top:.8rem;}
.result-tag.ok{background:#d1fae5;color:#065f46;}
.result-tag.ng{background:#fee2e2;color:#7f1d1d;}

/* Nav buttons */
.quiz-nav{display:flex;gap:.8rem;margin-top:.5rem;}
.nav-btn{flex:1;padding:.75rem;border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:600;cursor:pointer;transition:var(--trans);}
.nav-btn.prev{background:var(--lgray);color:var(--dark);}
.nav-btn.next{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:var(--white);}
.nav-btn:hover{opacity:.85;}
.nav-btn:disabled{opacity:.4;cursor:default;}

/* ── Result Screen ── */
.result-banner{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:var(--white);border-radius:var(--radius);padding:2rem;text-align:center;margin-bottom:1.5rem;box-shadow:var(--shadow-lg);}
.result-score{font-size:3rem;font-weight:800;}
.result-label{font-size:1rem;opacity:.85;margin-top:.3rem;}
.result-grade{font-size:1.2rem;font-weight:700;margin-top:.8rem;}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
.res-stat{background:var(--white);border-radius:var(--radius);padding:1rem;text-align:center;box-shadow:var(--shadow);}
.res-stat-num{font-size:1.8rem;font-weight:700;}
.res-stat.correct .res-stat-num{color:#10b981;}
.res-stat.wrong .res-stat-num{color:#ef4444;}
.res-stat.skip .res-stat-num{color:#f59e0b;}
.res-stat-label{font-size:.78rem;color:var(--gray);}
.review-list{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);}
.review-list h3{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;}
.review-item{border-bottom:1px solid var(--lgray);padding:.8rem 0;}
.review-item:last-child{border:none;}
.review-q{font-size:.9rem;font-weight:600;margin-bottom:.4rem;}
.review-detail{font-size:.82rem;color:var(--gray);}
.review-detail .ok{color:#065f46;font-weight:600;}
.review-detail .ng{color:#7f1d1d;font-weight:600;}
.result-btns{display:flex;gap:1rem;margin-bottom:1.5rem;}
.result-btn{flex:1;padding:.85rem;border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:700;cursor:pointer;transition:var(--trans);}
.result-btn.primary{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:var(--white);}
.result-btn.secondary{background:var(--lgray);color:var(--dark);}
.result-btn:hover{opacity:.85;}

/* Progress ring */
.progress-ring-wrap{width:120px;height:120px;margin:0 auto 1rem;}
svg.ring{transform:rotate(-90deg);}
circle.ring-track{fill:none;stroke:rgba(255,255,255,.2);stroke-width:10;}
circle.ring-fill{fill:none;stroke:var(--white);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s ease;}

/* Responsive */
@media(max-width:640px){
  .mode-cards,.chapter-cards,.home-stats,.result-stats{grid-template-columns:1fr;}
  .header h1{font-size:1.1rem;}
  .quiz-nav{flex-wrap:wrap;}
}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:1.5rem">📋</span>
  <h1>品質管理測驗系統</h1>
  <div class="hdr-right">
    <button class="hdr-btn active" id="hdr-home" onclick="goHome()">首頁</button>
  </div>
</div>

<!-- ── HOME ── -->
<div class="screen active" id="screen-home">
  <div class="home-banner">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🎓</div>
    <h2>品質管理測驗系統</h2>
    <p>共 200 題・4 個章節・老師提供考題</p>
  </div>

  <div class="home-stats">
    <div class="stat-box">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">已作答題數</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-correct">0</div>
      <div class="stat-label">答對題數</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-acc">–</div>
      <div class="stat-label">正確率</div>
    </div>
  </div>

  <div class="mode-section">
    <h3>選擇模式</h3>
    <div class="mode-cards">
      <div class="mode-card" onclick="showPracticeSetup()">
        <div class="icon">📚</div>
        <h4>章節練習</h4>
        <p>按章節練習，每題作答後立即顯示解答與詳解</p>
      </div>
      <div class="mode-card" onclick="showRandSetup()">
        <div class="icon">🎲</div>
        <h4>隨機測驗</h4>
        <p>自選題數，從全部題目中隨機抽取挑戰</p>
      </div>
    </div>

    <!-- Practice Chapter Select -->
    <div id="practice-setup" style="display:none">
      <h3>選擇章節</h3>
      <div class="chapter-cards" id="ch-cards"></div>
    </div>

    <!-- Random Setup -->
    <div id="rand-setup" style="display:none">
      <div class="rand-setup">
        <h3>🎲 隨機測驗設定</h3>
        <p style="font-size:.88rem;color:var(--gray);margin-bottom:1rem">共200題可隨機抽取</p>
        <div class="preset-btns">
          <button class="preset-btn" onclick="setRandN(10,this)">10題</button>
          <button class="preset-btn" onclick="setRandN(20,this)">20題</button>
          <button class="preset-btn" onclick="setRandN(30,this)">30題</button>
          <button class="preset-btn" onclick="setRandN(50,this)">50題</button>
          <button class="preset-btn" onclick="setRandN(100,this)">100題</button>
          <button class="preset-btn" onclick="setRandN(200,this)">全部200題</button>
        </div>
        <div class="rand-input-row">
          <input type="number" id="rand-n-input" placeholder="或輸入任意題數 (1-200)" min="1" max="200">
        </div>
        <button class="start-btn" onclick="startRandom()">開始隨機測驗 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ── QUIZ ── -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <span class="quiz-ch-tag" id="quiz-ch-tag">Ch1</span>
    <div class="quiz-progress">
      <div class="quiz-progress-text" id="quiz-prog-text">第 1 / 50 題</div>
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-prog-fill" style="width:2%"></div></div>
    </div>
    <button onclick="goHome()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--gray);" title="返回首頁">✕</button>
  </div>

  <div class="q-card">
    <div class="q-num" id="q-num-display">第 1 題</div>
    <div class="q-text" id="q-text-display"></div>
    <div class="opts-grid" id="opts-display"></div>
    <div class="expl-box" id="expl-box">
      <strong>💡 解析：</strong><span id="expl-text"></span>
    </div>
    <div id="result-display"></div>
  </div>

  <div class="quiz-nav">
    <button class="nav-btn prev" id="btn-prev" onclick="prevQ()">← 上一題</button>
    <button class="nav-btn next" id="btn-next" onclick="nextQ()">下一題 →</button>
  </div>
</div>

<!-- ── RESULT ── -->
<div class="screen" id="screen-result">
  <div class="result-banner">
    <div class="progress-ring-wrap">
      <svg class="ring" width="120" height="120" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="50"/>
        <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="50"
          stroke-dasharray="314" stroke-dashoffset="314"/>
      </svg>
    </div>
    <div class="result-score" id="result-score">0 / 0</div>
    <div class="result-label">答題成績</div>
    <div class="result-grade" id="result-grade"></div>
  </div>

  <div class="result-stats">
    <div class="res-stat correct"><div class="res-stat-num" id="rs-correct">0</div><div class="res-stat-label">答對</div></div>
    <div class="res-stat wrong"><div class="res-stat-num" id="rs-wrong">0</div><div class="res-stat-label">答錯</div></div>
    <div class="res-stat skip"><div class="res-stat-num" id="rs-skip">0</div><div class="res-stat-label">未作答</div></div>
  </div>

  <div class="result-btns">
    <button class="result-btn secondary" onclick="goHome()">返回首頁</button>
    <button class="result-btn primary" onclick="reviewWrong()">複習錯題</button>
  </div>

  <div class="review-list" id="review-list">
    <h3>📝 答題回顧</h3>
    <div id="review-items"></div>
  </div>
</div>

<script>
const QUESTIONS = [
{"ch":1,"num":1,"q":"下列何者不屬於品質管理八大原則？","opts":["A. 以顧客為中心", "B. 領導統御", "C. 全員參與", "D. 過程方法", "E. QC七大手法"],"ans":"E","expl":"品質管理八大原則（ISO 9000）為：以顧客為中心、領導統御、全員參與、過程方法、系統化管理方法、持續改善、以事實為基礎的決策、互利供應商關係。QC七大手法是品質工具，並非管理原則之一。"},
{"ch":1,"num":2,"q":"品質保證發展的年代為：","opts":["A. 1940 年代", "B. 1950 年代", "C. 1960 年代", "D. 1970 年代", "E. 1980 年代"],"ans":"B","expl":"品質保證（Quality Assurance）發展於1950年代，強調系統化的預防措施與品質計畫，代表人物為費根堡（Feigenbaum）。品質管制發展於1940年代，全面品質管理則在1980年代之後。"},
{"ch":1,"num":3,"q":"品管圈的活動主題應由：","opts":["A. 圈員共同決定", "B. 公司高層指定", "C. 顧問公司建議", "D. 生產線主管決定", "E. 品管部門決定"],"ans":"A","expl":"品管圈（QCC）精神在於自主性、自發性，活動主題應由圈員共同決定，體現民主參與和問題解決的自主意識，而非由上而下指派。"},
{"ch":1,"num":4,"q":"在PDCA循環的執行(D)階段，應注意什麼？","opts":["A. 數據收集", "B. 績效確認", "C. 按標準執行", "D. 問題確認", "E. 以上皆非"],"ans":"C","expl":"PDCA循環中，執行（Do）階段的重點是「按計畫標準執行」，確實落實已訂定的改善對策，而非重新收集數據或確認問題（那是P階段）。"},
{"ch":1,"num":5,"q":"不合格品的處理方式包括:","opts":["A. 退貨", "B. 重工", "C. 報廢", "D. 特採", "E. 以上皆是"],"ans":"E","expl":"不合格品的處理方式有多種選擇：退貨（返還供應商）、重工（修改至合格）、報廢（銷毀）、特採（讓步接受），視情況可以採用以上任一方式，故答案為「以上皆是」。"},
{"ch":1,"num":6,"q":"提案改善活動中，主管的角色應為？","opts":["A. 提出所有提案", "B. 評審所有提案", "C. 否決所有提案", "D. 支持鼓勵、提供資源", "E. 漠不關心、推卸責任"],"ans":"D","expl":"在提案改善活動中，主管的正確角色是「支持鼓勵、提供資源」，創造良好的改善氛圍，而非主導或否決員工提案。"},
{"ch":1,"num":7,"q":"我國國家標準的英文代碼為：","opts":["A. ANSI", "B. JIS", "C. CNS", "D. DIN", "E. 以上皆非"],"ans":"C","expl":"我國國家標準的英文代碼為CNS（Chinese National Standard），由經濟部標準檢驗局制定。ANSI=美國、JIS=日本、DIN=德國。"},
{"ch":1,"num":8,"q":"品管圈活動中，成員間的腦力激盪應盡量避免：","opts":["A. 支持他人的構想", "B. 一開始就否定不切實際的想法", "C. 提出天馬行空的點子", "D. 詳加討論每項構想的可行性", "E. 鼓勵成員踴躍發言"],"ans":"B","expl":"腦力激盪（Brainstorming）的基本原則之一是「延遲判斷」，禁止在討論過程中批評或否定任何想法，應先發散再收斂，因此「一開始就否定不切實際的想法」是應避免的行為。"},
{"ch":1,"num":9,"q":"PDCA循環是一種動態的循環，意指什麼？","opts":["A. 循環一次即可解決問題", "B. 循環結束後不再進行", "C. 循環過程是固定不變的", "D. 循環會根據實際情況不斷調整", "E. 以上皆非"],"ans":"D","expl":"PDCA是動態、持續的循環，代表品質改善是一個不斷進行的過程，完成一個循環後再進入下一個更高層次的循環，持續精進。"},
{"ch":1,"num":10,"q":"企業應如何建立產品安全文化？","opts":["A. 忽視產品安全問題", "B. 懲罰提出安全問題的員工", "C. 將產品安全融入企業文化中", "D. 降低產品安全標準", "E. 以上皆非"],"ans":"C","expl":"建立產品安全文化的正確方式是「將產品安全融入企業文化中」，讓安全意識成為日常工作的一部分，而非懲罰提出問題的員工。"},
{"ch":1,"num":11,"q":"標準化活動的目的在於：","opts":["A. 限制設計的自由", "B. 降低生產效率", "C. 簡化作業程序", "D. 提高產品成本", "E. 減少產品種類"],"ans":"C","expl":"標準化活動的主要目的是「簡化作業程序」，透過統一規格和方法，減少不必要的差異，提高效率和品質一致性。"},
{"ch":1,"num":12,"q":"通常用來作為選擇合格供應商的重要參考依據？","opts":["A. 供應商之公司登記", "B. 供應商之資本額", "C. 供應商之品質系統", "D. 供應商之員工素質", "E. 供應商之產品價格"],"ans":"C","expl":"選擇合格供應商最重要的參考依據是「供應商之品質系統」，包括ISO 9001認證、製程能力、品質管理成熟度等，而非僅憑登記或資本額。"},
{"ch":1,"num":13,"q":"稽核的追蹤稽核 (Follow-up Audit) 是指？","opts":["A. 對相同受稽單位進行的第二次稽核", "B. 在第一次稽核後立即進行的稽核", "C. 由不同稽核員進行的稽核", "D. 針對先前稽核發現的不符合事項進行的稽核", "E. 針對新版標準進行的稽核"],"ans":"D","expl":"追蹤稽核（Follow-up Audit）專指針對先前稽核所發現的不符合事項（NCR）進行後續確認，檢查改善措施是否已確實執行。"},
{"ch":1,"num":14,"q":"檢驗報告應包含哪些內容?","opts":["A. 樣品資訊", "B. 測試方法", "C. 測試結果", "D. 測試人員簽名", "E. 以上皆是"],"ans":"E","expl":"檢驗報告應包含完整的樣品資訊、測試方法、測試結果和測試人員簽名等，以確保報告的完整性、可追溯性和有效性，故答案為「以上皆是」。"},
{"ch":1,"num":15,"q":"品管圈活動中，最能凝聚圈員向心力的因素是：","opts":["A. 獎金的吸引", "B. 解決問題的成就感", "C. 榮譽感的滿足", "D. 主管的壓力", "E. 公司的規定"],"ans":"B","expl":"品管圈活動最能凝聚圈員向心力的因素是「解決問題的成就感」，當成員親眼看到自己的努力帶來實際改善，產生強烈的成就感和歸屬感。"},
{"ch":1,"num":16,"q":"下列何者不屬於品管圈的特性？","opts":["A. 自主性", "B. 自發性", "C. 團隊性", "D. 持續性", "E. 封閉性"],"ans":"E","expl":"品管圈的特性包括：自主性、自發性、團隊性、持續性等開放特質。「封閉性」不屬於品管圈精神，品管圈應鼓勵開放分享和跨部門學習。"},
{"ch":1,"num":17,"q":"稽核員在稽核過程中發現缺失時，應？","opts":["A. 以客觀、具體的方式描述", "B. 指責受稽單位", "C. 立即要求改善", "D. 將問題隱瞞", "E. 延後處理"],"ans":"A","expl":"稽核員發現缺失時，應以「客觀、具體的方式描述」，提供事實依據，避免主觀判斷或情緒化，以幫助受稽單位了解並改善問題。"},
{"ch":1,"num":18,"q":"實驗室應如何確保檢驗人員的能力？","opts":["A. 只雇用高學歷的檢驗人員", "B. 降低檢驗人員的薪資", "C. 對檢驗人員進行培訓和考核", "D. 取消檢驗人員的休假", "E. 以上皆非"],"ans":"C","expl":"確保檢驗人員能力的方法是「對檢驗人員進行培訓和考核」，包括定期教育訓練、技能評估、資格認證等，確保人員具備必要的知識和技能。"},
{"ch":1,"num":19,"q":"何謂批退回品質水準(LTPD)？","opts":["A. 指買方可接受的最大不良率", "B. 指賣方可接受的最大不良率", "C. 指買賣雙方可接受的最大不良率", "D. 指買賣雙方不可接受的最小不良率", "E. 以上皆非"],"ans":"D","expl":"批退回品質水準（LTPD, Lot Tolerance Percent Defective）是消費者（買方）不可接受的品質水準，即消費者風險β所對應的不良率。答案選「以上皆非」，因LTPD代表消費者「不能接受的最大不良率」而非可接受。"},
{"ch":1,"num":20,"q":"提案改善活動的推行應注重？","opts":["A. 形式主義、追求數量", "B. 強制參與、設定指標", "C. 自願參與、鼓勵創新", "D. 僅限於基層員工", "E. 由管理階層主導"],"ans":"C","expl":"提案改善活動應注重「自願參與、鼓勵創新」，讓員工自發性地提出改善方案，形式上不應過於強制，才能激發真正的創造力。"},
{"ch":1,"num":21,"q":"何謂生產者風險？","opts":["A. 指品質好的「批」被判定為不合格的機率", "B. 指品質不好的「批」被判定為合格的機率", "C. 指品質好的「批」被判定為合格的機率", "D. 指品質不好的「批」被判定為不合格的機率", "E. 以上皆非"],"ans":"A","expl":"生產者風險（α風險）是指品質好的「批」被判定為不合格的機率，即型一錯誤（Type I Error），通常設為5%。與消費者風險（β風險，好批被判為合格）相對。"},
{"ch":1,"num":22,"q":"下列何者非供應商評估的常用指標?","opts":["A. 品質水準", "B. 交貨績效", "C. 供應商國籍", "D. 價格競爭力", "E. 市場佔有率"],"ans":"C","expl":"供應商評估的常用指標包括品質水準、交貨績效、價格競爭力等，「供應商國籍」不是客觀的評估指標，不應作為供應商評選依據。"},
{"ch":1,"num":23,"q":"企業導入 ISO 9000 的目的不包含：","opts":["A. 建立文件化品質系統", "B. 降低人事成本", "C. 持續改善", "D. 滿足客戶需求", "E. 提升企業形象"],"ans":"B","expl":"企業導入ISO 9000的目的包括建立品質系統、持續改善、滿足客戶需求、提升企業形象等，但不包括「降低人事成本」，ISO主要提升品質而非直接降低人事費用。"},
{"ch":1,"num":24,"q":"PDCA循環中，哪個階段旨在評估改善措施的成效？","opts":["A. 計畫 (Plan)", "B. 執行 (Do)", "C. 檢查 (Check)", "D. 行動 (Action)", "E. 以上皆非"],"ans":"C","expl":"PDCA循環中，「檢查（Check）」階段旨在評估改善措施的成效，比較實際結果與計畫目標，確認對策是否有效。"},
{"ch":1,"num":25,"q":"檢驗結果的判定應根據：","opts":["A. 檢驗員的個人喜好", "B. 客戶的要求", "C. 預先定義的標準", "D. 市場趨勢", "E. 以上皆非"],"ans":"C","expl":"檢驗結果的判定應根據「預先定義的標準」（規格、標準、合約要求等），確保判定的客觀性和一致性，不受個人主觀影響。"},
{"ch":1,"num":26,"q":"進料檢驗的目的是:","opts":["A. 確認來料品質是否符合要求", "B. 協助供應商改善品質", "C. 降低進料成本", "D. 加速生產流程", "E. 以上皆非"],"ans":"A","expl":"進料檢驗（IQC）的主要目的是「確認來料品質是否符合要求」，防止不合格材料流入生產，保障後續製程品質。"},
{"ch":1,"num":27,"q":"稽核計劃的內容應包括？","opts":["A. 稽核目的", "B. 稽核範圍", "C. 稽核方法", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"稽核計劃應包含稽核目的（Why）、稽核範圍（What/Where）、稽核方法（How）等完整內容，故答案為「以上皆是」。"},
{"ch":1,"num":28,"q":"稽核的範圍應？","opts":["A. 由受稽單位決定", "B. 明確且與稽核目的相關", "C. 盡可能廣泛", "D. 避開敏感部門", "E. 由稽核員自行決定"],"ans":"B","expl":"稽核範圍應「明確且與稽核目的相關」，避免範圍過大或不聚焦，確保稽核活動有效率且針對重點。"},
{"ch":1,"num":29,"q":"下列何者屬於人因工程的範疇？","opts":["A. 工作環境設計", "B. 人機介面設計", "C. 生產流程規劃", "D. 作業安全評估", "E. 以上皆是"],"ans":"E","expl":"人因工程（Ergonomics）的範疇包含工作環境設計、人機介面設計、生產流程規劃、作業安全評估等，是以「人」為核心的設計科學，故答案為「以上皆是」。"},
{"ch":1,"num":30,"q":"通常品管部門應負責下列何種工作？","opts":["A. 生產計劃", "B. 生產管制", "C. 生產方法", "D. 品質改善", "E. 以上皆非"],"ans":"D","expl":"品管部門的主要職責是「品質改善」，包括制定品質標準、執行檢驗、分析品質數據、推動改善活動等，生產計畫和生產管制是生產部門的責任。"},
{"ch":1,"num":31,"q":"量測系統分析 (MSA) 的結果主要可以用來做什麼？","opts":["A. 判斷量測系統是否適用", "B. 訓練操作員", "C. 校正量測設備", "D. 調整產品規格", "E. 以上皆是"],"ans":"A","expl":"MSA（量測系統分析）的結果主要用來「判斷量測系統是否適用」，評估量具的重複性、再現性、偏差等，確認量測數據的可靠性，以決定是否可用於製程管制。"},
{"ch":1,"num":32,"q":"風險管理的步驟包括？","opts":["A. 風險辨識", "B. 風險評估", "C. 風險控制", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"風險管理的步驟包括風險辨識（識別潛在風險）、風險評估（分析影響與機率）、風險控制（採取對策降低風險）等，故答案為「以上皆是」。"},
{"ch":1,"num":33,"q":"ISO 9000品質管理系統的條文中，何者不屬於管理責任的項目？","opts":["A. 品質方針", "B. 品質目標", "C. 管理審查", "D. 專注客戶", "E. 矯正措施"],"ans":"E","expl":"ISO 9001管理責任的項目包括品質方針、品質目標、管理審查、專注客戶等。「矯正措施」屬於品質管理系統「量測、分析與改善」的條文，不屬於管理責任項目。"},
{"ch":1,"num":34,"q":"下列何者屬於ISO 9001規範之條文？","opts":["A. 品質管理系統", "B. 管理階層責任", "C. 資源管理", "D. 產品實現", "E. 以上皆是"],"ans":"E","expl":"ISO 9001規範的條文結構包含：品質管理系統、管理階層責任、資源管理、產品實現、量測分析與改善，故以上皆是ISO 9001的規範條文。"},
{"ch":1,"num":35,"q":"若實驗室需要外包部分檢驗項目，應如何選擇合作夥伴?","opts":["A. 選擇價格最低的實驗室", "B. 選擇距離最近的實驗室", "C. 選擇具備相應能力和資格的實驗室", "D. 選擇規模最大的實驗室", "E. 以上皆非"],"ans":"C","expl":"選擇外包檢驗合作夥伴時，應選擇「具備相應能力和資格的實驗室」，如通過ISO 17025認證的實驗室，確保外包結果的準確性和可靠性。"},
{"ch":1,"num":36,"q":"產品安全之警告標示應如何設計？","opts":["A. 盡可能簡短", "B. 使用專業術語", "C. 清楚易懂且醒目", "D. 使用多種語言", "E. 以上皆非"],"ans":"C","expl":"產品安全警告標示應設計成「清楚易懂且醒目」，使用簡單的圖示和文字，確保消費者能快速理解潛在危險，而非使用專業術語。"},
{"ch":1,"num":37,"q":"稽核發現應？","opts":["A. 僅列出不符合事項", "B. 採用專業術語撰寫", "C. 由受稽單位確認", "D. 延遲提交", "E. 客觀且具體的描述"],"ans":"E","expl":"稽核發現的撰寫方式應「客觀且具體的描述」事實，提供具體的不符合證據，也應由受稽單位確認（選項C和E都正確，但E是更完整的答案）。"},
{"ch":1,"num":38,"q":"下列哪些因素會影響檢驗結果的準確性？","opts":["A. 檢驗設備", "B. 檢驗方法", "C. 檢驗環境", "D. 檢驗人員", "E. 以上皆是"],"ans":"E","expl":"影響檢驗結果準確性的因素包括：檢驗設備（精度、校正）、檢驗方法（標準、程序）、檢驗環境（溫度、濕度）、檢驗人員（技能、經驗），故答案為「以上皆是」。"},
{"ch":1,"num":39,"q":"下列何者非產品檢驗的目的?","opts":["A. 確保產品品質", "B. 符合規格", "C. 降低成本", "D. 提高顧客滿意度", "E. 產品開發"],"ans":"E","expl":"產品檢驗的目的包括確保品質、符合規格、提高顧客滿意度，但「產品開發」不是檢驗的目的，產品開發屬於設計和研發的範疇。"},
{"ch":1,"num":40,"q":"以下何者為外部稽核的主要目的？","opts":["A. 取得內部認證", "B. 提升組織形象", "C. 取得外部認證或滿足顧客需求", "D. 降低營運成本", "E. 提升員工士氣"],"ans":"C","expl":"外部稽核的主要目的是「取得外部認證或滿足顧客需求」，例如ISO認證稽核或顧客審核，確認組織符合外部標準要求。"},
{"ch":1,"num":41,"q":"下列何者不屬於品質管理系統文件化的目的？","opts":["A. 確保品質管理系統的一致性", "B. 提供品質管理系統的運作依據", "C. 避免員工了解品質管理系統", "D. 確保品質管理系統的持續改進", "E. 以上皆非"],"ans":"C","expl":"品質管理系統文件化的目的是確保一致性、提供運作依據、支持持續改進，而「避免員工了解品質管理系統」與文件化精神完全相反，應是讓員工了解。"},
{"ch":1,"num":42,"q":"現今世界各國使用之國際標準計量單位為：","opts":["A. 英制", "B. 美制", "C. 日制", "D. 台制", "E. 國際單位制(SI)"],"ans":"E","expl":"現今世界各國使用的國際標準計量單位為「國際單位制（SI, Système International d\'Unités）」，包括公尺、公斤、秒等七個基本單位。"},
{"ch":1,"num":43,"q":"為了降低人為錯誤，設計人機介面時應注意哪些原則？","opts":["A. 簡單易懂、清楚明瞭", "B. 功能複雜、操作困難", "C. 資訊overload、視覺混亂", "D. 缺乏回饋、難以判斷", "E. 以上皆是"],"ans":"A","expl":"設計人機介面以降低人為錯誤，應遵循「簡單易懂、清楚明瞭」原則，降低操作複雜性，提供清楚的回饋和指示。"},
{"ch":1,"num":44,"q":"下列哪一項不是稽核報告的內容？","opts":["A. 稽核目的", "B. 稽核範圍", "C. 稽核發現", "D. 結論與建議", "E. 受稽單位的財務報表"],"ans":"E","expl":"稽核報告的內容包括稽核目的、稽核範圍、稽核發現、結論與建議等。「受稽單位的財務報表」不屬於稽核報告內容，財務數據屬於財務稽核範疇。"},
{"ch":1,"num":45,"q":"品管圈活動中，圈員應具備：","opts":["A. 統計分析能力", "B. 基本統計知識", "C. 豐富實務經驗", "D. 良好溝通技巧", "E. 以上皆是"],"ans":"E","expl":"品管圈圈員應具備：基本統計知識、豐富實務經驗、良好溝通技巧等，並非一定需要「高度統計分析能力」（那是工程師層級），故答案為「以上皆是」（基本知識足夠）。"},
{"ch":1,"num":46,"q":"外部稽核通常由誰執行？","opts":["A. 公司內部員工", "B. 政府單位", "C. 獨立的認證機構", "D. 顧客代表", "E. 以上皆是"],"ans":"C","expl":"外部稽核通常由「獨立的認證機構」執行（第三方稽核），如BSI、SGS等認證機構，確保稽核的客觀性和公正性。也可由顧客代表執行（第二方稽核）。"},
{"ch":1,"num":47,"q":"公司內的實驗室的環境條件應如何？","opts":["A. 適宜檢驗工作進行", "B. 盡可能美觀", "C. 符合國家安全法規", "D. 與其他實驗室相同", "E. 以上皆非"],"ans":"A","expl":"公司內的實驗室環境條件應「適宜檢驗工作進行」，包括適當的溫度、濕度、照明、潔淨度等，以確保檢驗結果的準確性。"},
{"ch":1,"num":48,"q":"何謂人因工程？","opts":["A. 由工程師設計的自動化生產方式", "B. 由電腦控制的生產方式", "C. 以人為中心的設計與生產方式", "D. 以上皆是", "E. 以上皆非"],"ans":"C","expl":"人因工程（Ergonomics/Human Factors Engineering）是「以人為中心的設計與生產方式」，研究人類與系統的互動，優化工作環境和工具設計以提高效率和安全性。"},
{"ch":1,"num":49,"q":"下列何者為稽核的主要目的？","opts":["A. 確認受稽單位是否符合特定標準或要求", "B. 找出受稽單位的缺失並予以懲罰", "C. 協助受稽單位改善其營運績效", "D. 降低受稽單位的營運成本", "E. 建立受稽單位與稽核單位之間的良好關係"],"ans":"A","expl":"稽核的主要目的是「確認受稽單位是否符合特定標準或要求」，通過系統性的審查，提供客觀的符合性評估，協助組織識別改善機會。"},
{"ch":1,"num":50,"q":"全面品質管理發展的年代為：","opts":["A. 1940 年代", "B. 1950 年代", "C. 1960 年代", "D. 1970 年代", "E. 1980 年代"],"ans":"D","expl":"全面品質管理（TQM, Total Quality Management）發展於1980年代，以戴明（Deming）、朱蘭（Juran）的哲學為基礎，強調全員參與和持續改善。"},
{"ch":2,"num":1,"q":"下列關於照明度的敘述，何者正確？","opts":["A. 照度單位為Lux，代表每平方公尺所接受的光通量", "B. 在同一空間內，不同位置的照度均相同", "C. 照度不會隨著距離光源的遠近而改變", "D. 照明度越高，工作效率一定越好", "E. 以上皆非"],"ans":"A","expl":"照度（Illuminance）的單位為Lux（勒克斯），代表每平方公尺所接受的光通量（1 lux = 1 lm/m²）。照度會隨距離光源增加而降低（遵循平方反比定律），且同一空間不同位置照度不同。"},
{"ch":2,"num":2,"q":"直方圖是用來：","opts":["A. 顯示數據分配的形狀", "B. 找出問題發生的原因", "C. 顯示兩個變數之間的關係", "D. 控制製程的穩定性", "E. 以上皆非"],"ans":"A","expl":"直方圖（Histogram）是QC七大手法之一，用來顯示數據的分配形狀（次數分配），可以觀察數據的集中趨勢、散佈情形和分配形狀（如常態、偏態等）。"},
{"ch":2,"num":3,"q":"檢驗報告應如何保存？","opts":["A. 隨意放置", "B. 丟棄", "C. 焚燒", "D. 依照實驗室的程序妥善保存", "E. 以上皆非"],"ans":"D","expl":"檢驗報告應依照實驗室的程序妥善保存，以便日後追溯、客訴處理和稽核查驗。保存方式應符合ISO 17025的要求，包括保存期限和安全性。"},
{"ch":2,"num":4,"q":"下列何者不屬於品質紀錄的管理項目？","opts":["A. 識別", "B. 儲存", "C. 保護", "D. 檢索", "E. 以上皆非"],"ans":"D","expl":"品質紀錄的管理項目包括識別、儲存、保護、檢索、保留時間和處置等。「以上皆非」是指選項E代表沒有不符合的，但實際上識別、儲存、保護、檢索都是管理項目，故選E代表「以上皆非」是指題目問的不屬於管理項目的，答案應為E（以上皆非=這道題問的是哪一項不屬於）。實際上(A)至(D)都是管理項目，故選E（以上皆非有缺少的項目）不對，應選(E)表示(A)~(D)均屬管理項目，答案為E=以上皆是的意思應重新理解。"},
{"ch":2,"num":5,"q":"以下哪一項不是稽核的類型？","opts":["A. 內部稽核", "B. 外部稽核", "C. 第三方稽核", "D. 系統稽核", "E. 隨機稽核"],"ans":"E","expl":"稽核的類型包括：內部稽核（第一方）、外部稽核（第二方，顧客稽核）、第三方稽核（認證機構）和系統稽核。「隨機稽核」不是標準的稽核分類，故選E（隨機稽核）為不屬於稽核類型的項目。"},
{"ch":2,"num":6,"q":"稽核報告應？","opts":["A. 僅列出缺失事項", "B. 採用專業術語撰寫", "C. 清晰易懂", "D. 由受稽單位撰寫", "E. 延遲提交"],"ans":"C","expl":"稽核報告應「清晰易懂」，讓受稽單位和相關人員都能理解稽核發現和建議，而非使用艱深術語或延遲提交。"},
{"ch":2,"num":7,"q":"在 QC 七大手法中，下列何者 最能有效掌握問題重點？","opts":["A. 直方圖", "B. 管制圖", "C. 柏拉圖", "D. 散佈圖", "E. 層別法"],"ans":"C","expl":"柏拉圖（Pareto Chart）是QC七大手法中最能有效掌握問題重點的工具，依照「80/20法則」識別造成大多數問題的少數關鍵因素（重要的少數）。"},
{"ch":2,"num":8,"q":"PDCA循環中，哪個階段旨在確認問題對策的有效性？","opts":["A. 計畫 (Plan)", "B. 執行 (Do)", "C. 檢查 (Check)", "D. 行動 (Action)", "E. 以上皆非"],"ans":"C","expl":"PDCA循環中，「檢查（Check）」階段旨在確認問題對策的有效性，比較執行結果與目標，評估改善措施是否達到預期效果。"},
{"ch":2,"num":9,"q":"以下何者不是減少人為錯誤的有效方法？","opts":["A. 標準化作業流程", "B. 降低員工薪資", "C. 提供完善的訓練", "D. 改善工作環境", "E. 設計友善的人機介面"],"ans":"B","expl":"散佈圖（Scatter Diagram）用於顯示兩個變數之間的相關性，觀察X與Y之間是否存在正相關、負相關或無相關。"},
{"ch":2,"num":10,"q":"下列哪一項不是稽核報告的內容？","opts":["A. 稽核目的", "B. 稽核範圍", "C. 稽核發現", "D. 結論與建議", "E. 受稽單位的財務報表"],"ans":"E","expl":"DPMO（Defects Per Million Opportunities）的計算：不良率5% = 50,000 DPMO（0.05 × 1,000,000 = 50,000）。這是品質水準約3.1個標準差的水準。"},
{"ch":2,"num":11,"q":"下列何者不屬於品質系統文件中，與顧客有關的規定？","opts":["A. 顧客財產的管制", "B. 顧客溝通", "C. 顧客滿意度調查", "D. 品質稽核", "E. 以上皆是"],"ans":"D","expl":"製程能力指數（Process Capability Index）可用來衡量製程是否能持續生產符合規格的產品。Cp和Cpk是最常用的製程能力指數。"},
{"ch":2,"num":12,"q":"以下何者為外部稽核的主要目的？","opts":["A. 取得內部認證", "B. 提升組織形象", "C. 取得外部認證或滿足顧客需求", "D. 降低營運成本", "E. 提升員工士氣"],"ans":"C","expl":"散佈圖（Scatter Diagram）是用來顯示兩個連續變數之間相關性的圖表，通過點的分佈趨勢判斷變數間的關係強弱和方向。"},
{"ch":2,"num":13,"q":"實驗室進行檢驗或測試時，應使用：","opts":["A. 經過校正的設備", "B. 任何可用的設備", "C. 最便宜的設備", "D. 最先進的設備", "E. 以上皆非"],"ans":"A","expl":"進料檢驗（IQC）的主要目的是「確保進貨品質符合規格」，在材料進入生產線前進行篩選，防止不合格材料流入製程。"},
{"ch":2,"num":14,"q":"品質保證一詞的英文縮寫為:","opts":["A. QA", "B. QC", "C. QI", "D. QM", "E. TQM"],"ans":"A","expl":"預防成本（Prevention Cost）是指在品質問題發生之前，為預防不良品而投入的成本，如教育訓練、製程設計、預防性維護等。"},
{"ch":2,"num":15,"q":"根據ISO 9001標準，產品實現的過程應包含哪些活動？","opts":["A. 設計開發", "B. 採購", "C. 生產及服務提供", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"品管圈（QCC）活動的推行責任由「圈長」負責日常帶領，輔導員提供技術指導，高層給予支持，全員共同參與，而非單由圈員自行決定一切。"},
{"ch":2,"num":16,"q":"下列何種措施最能確保進料品質?","opts":["A. 降低進料價格", "B. 縮短交貨時間", "C. 選擇合格供應商", "D. 減少進料數量", "E. 以上皆非"],"ans":"C","expl":"稽核計畫（Audit Programme）是指一段時間內排定的稽核活動集合；稽核計畫（Audit Plan）則是單次稽核的詳細安排。前者應「由稽核單位制定」。"},
{"ch":2,"num":17,"q":"企業應如何處理產品召回事件？","opts":["A. 誠實面對問題並積極處理", "B. 逃避責任", "C. 隱瞞事實", "D. 推卸責任", "E. 以上皆非"],"ans":"A","expl":"稽核的書面程序應包含稽核的規劃、執行、報告和追蹤等各個階段的要求，確保稽核活動的系統性和一致性。"},
{"ch":2,"num":18,"q":"下列何者不屬於內部品質成本？","opts":["A. 廢品損失", "B. 重工損失", "C. 客訴處理費用", "D. 停工損失", "E. 以上皆是"],"ans":"E","expl":"DPMO=缺點數/機會數×10⁶；不良率5%時，DPMO=50,000。對應Sigma水準約3.1σ（含1.5σ漂移後）。"},
{"ch":2,"num":19,"q":"品管圈活動中，下列何者最能提升圈員解決問題能力？","opts":["A. 統計軟體的運用", "B. 專業知識的學習", "C. 顧問公司的指導", "D. 主管的經驗分享", "E. 實際問題的分析與討論"],"ans":"E","expl":"外部品質成本（External Failure Cost）是指產品售出後因品質問題所引起的損失，包括客訴處理、退貨、保固維修、產品召回等費用。"},
{"ch":2,"num":20,"q":"以下哪一項不是有效的稽核證據？","opts":["A. 文件記錄", "B. 現場觀察", "C. 個人臆測", "D. 訪談記錄", "E. 測試結果"],"ans":"C","expl":"標準化作業最主要的目的是「使品質均一化」，透過統一的作業標準確保每次操作的品質一致，減少變異。"},
{"ch":2,"num":21,"q":"稽核的證據應？","opts":["A. 只包含文件記錄", "B. 僅限於現場觀察", "C. 由受稽單位提供", "D. 充分且適當", "E. 符合稽核員的預期"],"ans":"D","expl":"實驗室應定期接受第三方評鑑（如TAF、ILAC認可），確認其技術能力符合ISO 17025等國際標準，維持量測結果的可靠性和公信力。"},
{"ch":2,"num":22,"q":"人為可靠度是指？","opts":["A. 機械設備的可靠性", "B. 軟體程式的可靠性", "C. 人在特定環境下正確完成任務的機率", "D. 產品的耐用程度", "E. 服務的滿意度"],"ans":"C","expl":"管理階層的職責包括建立品質政策、提供資源、進行管理審查等，「監督產品生產流程」屬於生產管理人員的日常職責，不是管理階層的特定品質職責。"},
{"ch":2,"num":23,"q":"何謂消費者風險？","opts":["A. 指品質好的「批」被判定為不合格的機率", "B. 指品質不好的「批」被判定為合格的機率", "C. 指品質好的「批」被判定為合格的機率", "D. 指品質不好的「批」被判定為不合格的機率", "E. 以上皆非"],"ans":"B","expl":"保存檢驗紀錄的目的是「追溯結果和證明其有效性」，當客戶投訴或需要審核時，完整的紀錄能夠提供有效的佐證資料。"},
{"ch":2,"num":24,"q":"通常品管部門應具備下列何項職權？","opts":["A. 生產", "B. 設計", "C. 檢驗", "D. 採購", "E. 銷售"],"ans":"C","expl":"實驗室在建立品質系統時，應考慮「顧客需求、法律法規要求」等外部要求，確保品質系統能滿足相關利益方的期望。"},
{"ch":2,"num":25,"q":"下列何者不屬於推動品管圈可能遭遇的困難？","opts":["A. 缺乏高層支持", "B. 成員缺乏相關知識", "C. 時間與資源不足", "D. 活動主題設定不當", "E. 外部顧問過於積極"],"ans":"E","expl":"數據點超出UCL或LCL時，表示製程存在「特殊原因變異」，製程失控，需要調查原因並採取矯正措施，而非代表製程穩定。"},
{"ch":2,"num":26,"q":"PDCA循環強調的是哪一種精神？","opts":["A. 持續改善", "B. 追求完美", "C. 一次到位", "D. 降低成本", "E. 以上皆是"],"ans":"A","expl":"PDCA循環強調「持續改善」的精神，每完成一個循環就提升至更高層次，形成螺旋式上升的持續進步模式。"},
{"ch":2,"num":27,"q":"PDCA循環中，哪個階段旨在制定改善措施？","opts":["A. 計畫 (Plan)", "B. 執行 (Do)", "C. 檢查 (Check)", "D. 行動 (Action)", "E. 以上皆非"],"ans":"A","expl":"PDCA循環中，「計畫（Plan）」階段旨在制定改善措施，包括問題分析、目標設定和解決方案的規劃，是PDCA循環的起點。"},
{"ch":2,"num":28,"q":"稽核報告應具備哪些特性？","opts":["A. 清晰易懂", "B. 客觀公正", "C. 準確完整", "D. 及時提交", "E. 以上皆是"],"ans":"E","expl":"稽核報告應具備清晰易懂、客觀公正、準確完整、及時提交等特性，確保相關人員能正確理解和有效利用稽核結果，故答案為「以上皆是」。"},
{"ch":2,"num":29,"q":"下列何者最能代表品質保證的意義？","opts":["A. 產品檢驗", "B. 品質管制", "C. 預防勝於治療", "D. 事後補救", "E. 以上皆非"],"ans":"C","expl":"品質保證的核心精神是「預防勝於治療」，在問題發生前採取系統性措施，而非事後補救，強調預防性品質管理而非單純的產品檢驗。"},
{"ch":2,"num":30,"q":"企業應如何降低產品責任風險？","opts":["A. 隱瞞產品瑕疵", "B. 投保產品責任險", "C. 避免產品召回", "D. 推卸責任", "E. 以上皆非"],"ans":"B","expl":"降低產品責任風險的正確方式是「投保產品責任險」作為風險轉移手段，同時應持續提升產品品質和安全性，而非隱瞞瑕疵。"},
{"ch":2,"num":31,"q":"外部稽核通常由誰執行？","opts":["A. 公司內部員工", "B. 政府單位", "C. 獨立的認證機構", "D. 顧客代表", "E. 以上皆是"],"ans":"C","expl":"外部稽核可由獨立認證機構（第三方稽核）或顧客代表（第二方稽核）執行，均屬外部稽核範疇，故選「以上皆是」。"},
{"ch":2,"num":32,"q":"內部稽核的主要目的是？","opts":["A. 取得認證", "B. 改善管理系統", "C. 滿足顧客要求", "D. 規避法律責任", "E. 提升企業形象"],"ans":"B","expl":"內部稽核的主要目的是「改善管理系統」，通過自我評估找出不符合事項和改善機會，而非主要用於取得認證（那是外部稽核的目的）。"},
{"ch":2,"num":33,"q":"關於品質管理中的持續改進原則，下列何者最不符合其精神？","opts":["A. 持續優化產品、服務與流程", "B. 所有流程都應完全標準化，避免任何變動", "C. 以顧客需求為導向進行改善", "D. 鼓勵員工參與改善活動", "E. 透過數據分析來監控與提升績效"],"ans":"B","expl":"持續改進原則不包括「所有流程都應完全標準化，避免任何變動」，因為持續改進需要不斷調整和優化流程，完全不允許變動與改進精神相悖。"},
{"ch":2,"num":34,"q":"認知負荷過高會導致：","opts":["A. 提升工作效率", "B. 降低錯誤率", "C. 增進學習效果", "D. 增加人為錯誤的風險", "E. 以上皆非"],"ans":"D","expl":"認知負荷（Cognitive Load）過高會超過人類認知處理能力的限制，導致判斷失誤、遺漏重要資訊，增加人為錯誤的風險，降低工作表現。"},
{"ch":2,"num":35,"q":"系統安全的理念強調：","opts":["A. 從整體系統的角度來思考安全問題", "B. 只關注個別組件的安全性", "C. 將安全責任完全歸咎於個人", "D. 認為安全事故無法避免", "E. 以上皆非"],"ans":"A","expl":"系統安全（System Safety）的理念強調「從整體系統的角度來思考安全問題」，考量人員、設備、環境、軟體等所有要素的交互作用，而非僅針對個別組件。"},
{"ch":2,"num":36,"q":"符合 ISO 17025 標準的實驗室表示其具有：","opts":["A. 技術能力和管理能力", "B. 生產能力和銷售能力", "C. 研發能力和設計能力", "D. 財務能力和行銷能力", "E. 以上皆非"],"ans":"A","expl":"符合ISO 17025標準的實驗室表示其同時具備「技術能力」（量測能力、設備、人員）和「管理能力」（品質系統、程序、記錄）。"},
{"ch":2,"num":37,"q":"以下哪種方法有助於提升團隊合作的效率並減少人為錯誤？","opts":["A. 各行其是、缺乏溝通", "B. 資訊封閉、隱瞞問題", "C. 權責不清、互相推諉", "D. 領導無方、決策失誤", "E. 建立明確的溝通管道、培養團隊合作精神"],"ans":"E","expl":"提升團隊合作效率、減少人為錯誤的有效方法是「建立明確的溝通管道、培養團隊合作精神」，確保資訊流通順暢，責任分工明確。"},
{"ch":2,"num":38,"q":"某公司之A產品每月平均不良率為5%，則其每百萬個機會的缺點數(DPMO)為何？","opts":["A. 500", "B. 50000", "C. 500000", "D. 5000", "E. 以上皆非"],"ans":"B","expl":"某公司A產品每月平均不良率5%，DPMO = 5% × 1,000,000 = 50,000。即每百萬個機會中有50,000個缺點，對應約3.1個Sigma水準。"},
{"ch":2,"num":39,"q":"何謂外部品質成本？","opts":["A. 指生產過程中，為預防不良品發生所支付的成本", "B. 指產品售出後，因品質問題所引起的損失", "C. 指生產過程中，為檢查產品品質所支付的成本", "D. 以上皆是", "E. 以上皆非"],"ans":"B","expl":"外部品質成本是指產品售出後因品質問題引起的損失，包括客訴、退貨、保固費用、產品召回等，是品質成本中最難控制且損失最大的類別。"},
{"ch":2,"num":40,"q":"標準化作業最主要的目的為：","opts":["A. 使品質均一化", "B. 提高員工士氣", "C. 降低生產成本", "D. 加速產品開發", "E. 減少產品種類"],"ans":"A","expl":"標準化作業最主要的目的是「使品質均一化」，確保不同人員、不同時間執行相同作業時能得到一致的結果，是品質管理的基礎。"},
{"ch":2,"num":41,"q":"實驗室應定期接受：","opts":["A. 政府補助", "B. 第三方評鑑", "C. 員工旅遊", "D. 媒體採訪", "E. 以上皆非"],"ans":"B","expl":"實驗室應定期接受「第三方評鑑」（如TAF認可），確認其技術能力持續符合ISO 17025標準，維持量測結果的可信度和客戶信任。"},
{"ch":2,"num":42,"q":"品質管理系統之建立過程中，何者不屬於管理階層的職責？","opts":["A. 建立品質政策", "B. 提供品質系統運作所需資源", "C. 監督產品生產流程", "D. 進行管理審查", "E. 以上皆是"],"ans":"C","expl":"管理階層在品質管理系統中的職責是建立政策、提供資源、進行管理審查等戰略層面工作，「監督產品生產流程」是操作層面的日常管理工作。"},
{"ch":2,"num":43,"q":"實驗室應保存檢驗或測試的紀錄，以便：","opts":["A. 銷毀證據", "B. 避免客戶投訴", "C. 追溯結果和證明其有效性", "D. 減少儲存空間", "E. 以上皆非"],"ans":"C","expl":"保存檢驗紀錄是為了「追溯結果和證明其有效性」，提供量測活動的完整書面證明，支持品質保證和客訴處理。"},
{"ch":2,"num":44,"q":"實驗室在建立品質系統時，應考慮哪些因素？","opts":["A. 顧客需求、法律法規要求", "B. 實驗室規模大小", "C. 實驗室盈利能力", "D. 實驗室所在城市", "E. 以上皆非"],"ans":"A","expl":"實驗室建立品質系統時最重要的考量是「顧客需求和法律法規要求」，確保品質活動符合外部強制性和期望性要求。"},
{"ch":2,"num":45,"q":"使用管制圖時，當數據點位於上管制限（UCL）和下管制限（LCL）之外，表示什麼情況？","opts":["A. 製程在穩定狀態", "B. 製程需要改進或處理", "C. 產品品質達到最佳狀態", "D. 製程運行過快", "E. 需增加樣本數量"],"ans":"B","expl":"管制圖數據點超出管制界限表示「製程需要改進或處理」，存在特殊原因變異，需要調查並採取矯正行動，使製程恢復穩定狀態。"},
{"ch":2,"num":46,"q":"稽核計劃的內容應包括？","opts":["A. 稽核目的", "B. 稽核範圍", "C. 稽核方法", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"稽核計劃的內容應包括稽核目的（Why）、稽核範圍（What）、稽核方法（How）等，是執行稽核的完整指引，故答案為「以上皆是」。"},
{"ch":2,"num":47,"q":"QC 七大手法中，不適合用於計數值資料的是：","opts":["A. 柏拉圖", "B. 魚骨圖", "C. 查檢表", "D. 散佈圖", "E. 層別法"],"ans":"B","expl":"散佈圖（Scatter Diagram）使用計量值（連續數值）資料，顯示兩個量化變數間的關係。它「不適合」處理計數值（離散）資料。其他工具如柏拉圖、查檢表等可用於計數值。"},
{"ch":2,"num":48,"q":"下列關於品管圈的敘述，何者正確？","opts":["A. 成員需具備高度專業知識", "B. 活動必須由主管主導", "C. 需使用複雜統計手法", "D. 適用於高階管理決策", "E. 強調全員參與，共同解決問題"],"ans":"E","expl":"品管圈的核心精神是「強調全員參與，共同解決問題」，圈員不需要具備高度專業知識或複雜統計能力，透過基本品管工具和集體智慧解決問題。"},
{"ch":2,"num":49,"q":"品質保證（QA）與品質控制（QC）最大的區別是?","opts":["A. QA 是以製程控制為主，QC 是以產品檢查為主", "B. QA 只關注產品，而 QC 只關注過程", "C. QA 集中於規劃和預防，而 QC 更注重檢查和修正", "D. QA 由顧客決定，而 QC 由內部設計", "E. QA 和 QC 是完全相同的概念"],"ans":"C","expl":"QA（品質保證）集中於系統層面的規劃和預防，確保品質管理系統的有效運作；QC（品質管制）更注重產品的檢查和測試及缺陷的發現與修正，兩者相輔相成。"},
{"ch":2,"num":50,"q":"工作環境中，以下哪個因素最容易導致人為錯誤？","opts":["A. 適當的照明", "B. 舒適的溫度", "C. 充足的空間", "D. 過大的噪音", "E. 清潔的環境"],"ans":"D","expl":"工作環境中最容易導致人為錯誤的因素是「過大的噪音」，噪音會干擾注意力、溝通和判斷，增加操作失誤的機率，是重要的人因工程問題。"},
{"ch":3,"num":1,"q":"稽核的類型包括？","opts":["A. 內部稽核和自我評估", "B. 外部稽核和顧客稽核", "C. 內部稽核、外部稽核和第三方稽核", "D. 財務稽核和營運稽核", "E. 以上皆非"],"ans":"C","expl":"稽核的類型包括內部稽核（第一方，組織自行稽核）、外部稽核（第二方，顧客稽核）和第三方稽核（認證機構稽核）三種主要類型，涵蓋所有層面的品質稽核。"},
{"ch":3,"num":2,"q":"採用國際標準的優點為：","opts":["A. 降低產品價格", "B. 消除國際貿易障礙", "C. 降低關稅", "D. 增加產品種類", "E. 以上皆非"],"ans":"B","expl":"採用國際標準的優點是「消除國際貿易障礙」，使不同國家的產品和服務能夠基於共同標準進行比較和交流，促進全球貿易自由化。"},
{"ch":3,"num":3,"q":"品質管理發展過程中，下列何者最先被提出？","opts":["A. 品質保證", "B. 全面品質管理", "C. 統計品質管制", "D. 品管圈", "E. 以上皆非"],"ans":"C","expl":"品質管理發展順序：統計品質管制（SQC, 1940-50s）→ 品質保證（QA, 1960s）→ 全面品質管理（TQM, 1980s）→ 品管圈（1960s日本起源）。統計品質管制最先被提出。"},
{"ch":3,"num":4,"q":"風險管理是指:","opts":["A. 完全消除所有風險", "B. 將所有風險轉嫁給供應商", "C. 系統化地識別、分析和控制風險", "D. 以上皆是", "E. 以上皆非"],"ans":"C","expl":"風險管理是「系統化地識別、分析和控制風險」的過程，包括風險辨識→評估→回應→監控，目標不是完全消除風險（通常不可能），而是將風險降至可接受水準。"},
{"ch":3,"num":5,"q":"稽核的後續追蹤有何重要性？","opts":["A. 確保受稽單位獲得懲罰", "B. 提升稽核員績效", "C. 確認不符合事項已得到有效改善", "D. 維持稽核單位的權威性", "E. 以上皆非"],"ans":"C","expl":"稽核後續追蹤的重要性在於「確認不符合事項已得到有效改善」，閉環管理確保問題得到解決，而非僅停留在發現問題的階段。"},
{"ch":3,"num":6,"q":"以下何者不是評估提案的重要指標？","opts":["A. 可行性", "B. 效益", "C. 創意性", "D. 安全性", "E. 提案人的職位"],"ans":"E","expl":"評估改善提案的重要指標包括可行性、效益、創意性、安全性等與提案本身相關的因素，「提案人的職位」不應作為評估依據，應著重提案內容而非提案者的地位。"},
{"ch":3,"num":7,"q":"以下哪一項不是有效的稽核證據？","opts":["A. 文件記錄", "B. 現場觀察", "C. 個人臆測", "D. 訪談記錄", "E. 測試結果"],"ans":"C","expl":"有效的稽核證據包括文件記錄、現場觀察、訪談記錄、測試結果等可驗證的客觀事實。「個人臆測」是主觀推測，不能作為有效的稽核證據。"},
{"ch":3,"num":8,"q":"下列何者非標準化的優點？","opts":["A. 降低成本", "B. 提高效率", "C. 確保品質", "D. 提高互換性", "E. 增加設計的自由"],"ans":"E","expl":"標準化的優點包括降低成本、提高效率、確保品質、提高互換性等，但「增加設計的自由」不是標準化的優點，標準化反而限制了某些設計自由度。"},
{"ch":3,"num":9,"q":"檢驗與測試的結果可以用來：","opts":["A. 驗證產品設計", "B. 控制產品品質", "C. 評估產品可靠度", "D. 做為產品改進的依據", "E. 以上皆是"],"ans":"E","expl":"檢驗與測試的結果可以用來判斷產品是否符合規格、識別品質問題、為持續改善提供數據依據，以及支持品質保證和客戶要求。"},
{"ch":3,"num":10,"q":"下列哪一項不是稽核的原則？","opts":["A. 獨立性", "B. 客觀性", "C. 系統性", "D. 證據導向", "E. 懲罰性"],"ans":"E","expl":"品質保證（QA）最重要的精神是「預防品質問題」，在問題發生之前採取系統性措施，而非事後補救。這體現了品質管理「預防大於矯正」的核心理念。"},
{"ch":3,"num":11,"q":"PDCA循環的核心概念為何？","opts":["A. 循環改善", "B. 問題分析", "C. 數據收集", "D. 標準制定", "E. 以上皆非"],"ans":"A","expl":"人員配置的原則包括合適的技能匹配、清楚的職責分工、充足的人員數量等。「配置過多人員」會造成資源浪費，不符合效率原則。"},
{"ch":3,"num":12,"q":"下列何者不屬於生產及服務提供\"過程\"的管制項目？","opts":["A. 工作環境管制", "B. 設備管制", "C. 顧客抱怨處理", "D. 製程管制", "E. 以上皆是"],"ans":"C","expl":"散佈圖（Scatter Diagram）顯示兩個量化變數之間的相關性。當所有數據點呈現出從左下到右上的趨勢時，表示兩變數存在正相關關係。"},
{"ch":3,"num":13,"q":"下列哪一位學者被稱為「品質管制圖（Control Chart）之父」？","opts":["A. W. Edwards Deming", "B. Joseph M. Juran", "C. Kaoru Ishikawa", "D. Walter A. Shewhart", "E. Philip B. Crosby"],"ans":"D","expl":"量測設備的校正週期應由「設備的穩定性和使用狀況」決定，依據設備漂移特性、使用頻率和環境條件等因素確定，不應一律使用固定週期。"},
{"ch":3,"num":14,"q":"標準的種類，可區分為下列三種：","opts":["A. 材料標準、產品標準、方法標準", "B. 國家標準、國際標準、團體標準", "C. 強制標準、任意標準、建議標準", "D. 設計標準、製造標準、檢驗標準", "E. 以上皆非"],"ans":"B","expl":"品管圈的推行成功關鍵因素包括管理層的支持、圈員的自發參與、持續的教育訓練等。其中「管理層的支持」提供資源和激勵是最基本的前提條件。"},
{"ch":3,"num":15,"q":"產品安全與下列何者息息相關？","opts":["A. 消費者權益", "B. 企業商譽", "C. 法律責任", "D. 社會責任", "E. 以上皆是"],"ans":"E","expl":"QC七大手法包括：查檢表、柏拉圖、特性要因圖（魚骨圖）、直方圖、散佈圖、管制圖、層別法，故答案為「以上皆是」。"},
{"ch":3,"num":16,"q":"下列何者為稽核的主要目的？","opts":["A. 確認受稽單位是否符合特定標準或要求", "B. 找出受稽單位的缺失並予以懲罰", "C. 協助受稽單位改善其營運績效", "D. 降低受稽單位的營運成本", "E. 建立受稽單位與稽核單位之間的良好關係"],"ans":"A","expl":"提案改善的主要目的是「激發員工的創意和解決問題的能力」，透過全員參與發現改善機會，而非單純追求降低成本。"},
{"ch":3,"num":17,"q":"量測系統分析 (MSA) 的結果應該如何解釋？","opts":["A. 只需關注最終的合格率", "B. 忽略任何統計數據", "C. 根據數據分析結果判斷量測系統是否符合要求", "D. 由操作員自行決定是否接受結果", "E. 以上皆非"],"ans":"C","expl":"稽核結束後應發布「稽核報告」，提供完整的稽核結果紀錄，包括稽核發現、不符合事項和改善建議，作為後續追蹤的依據。"},
{"ch":3,"num":18,"q":"稽核過程中，稽核員應？","opts":["A. 完全依照稽核計畫執行", "B. 避免與受稽單位溝通", "C. 保持客觀公正的態度", "D. 只記錄負面發現", "E. 忽略輕微缺失"],"ans":"C","expl":"量測設備校正的目的是「確保量測結果的準確性和可追溯性」，通過與國家標準或國際標準的比較，確認量測設備的偏差在允許範圍內。"},
{"ch":3,"num":19,"q":"下列何者屬於產品安全防護措施？","opts":["A. 安全設計", "B. 警告標示", "C. 使用說明書", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"FMEA（失效模式與效應分析）是一種預防性品質工具，用於「識別可能的失效模式，評估其影響並制定預防措施」，在設計和製程開發階段使用。"},
{"ch":3,"num":20,"q":"下列何者不屬於PDCA循環的優點？","opts":["A. 易於理解", "B. 操作簡便", "C. 需要多人執行", "D. 促進團隊合作", "E. 提升品質意識"],"ans":"C","expl":"品管圈活動成功的關鍵是「圈員的積極參與和主動投入」，自主解決問題的精神比外部激勵更重要，體現品管圈自發性的核心精神。"},
{"ch":3,"num":21,"q":"下列哪一項不是稽核的原則？","opts":["A. 獨立性", "B. 客觀性", "C. 系統性", "D. 證據導向", "E. 懲罰性"],"ans":"E","expl":"品質水準（Quality Level）通常用不良率（PPM或%）、Cpk、Sigma水準等指標來衡量，反映製程產生符合規格產品的能力，故以上皆是品質水準的衡量方式。"},
{"ch":3,"num":22,"q":"檢驗過程中若發現異常，應如何處理?","opts":["A. 隱瞞事實", "B. 立即停止檢驗並報告主管", "C. 繼續檢驗並修改結果", "D. 忽略異常並提交報告", "E. 以上皆非"],"ans":"B","expl":"柏拉圖（Pareto Chart）是以棒狀圖和折線累積百分比組合而成的圖表，按照問題發生頻率由高至低排列，體現「80/20法則」，找出最重要的問題。"},
{"ch":3,"num":23,"q":"在PDCA循環中，「C」代表什麼？","opts":["A. Check", "B. Control", "C. Correct", "D. Confirm", "E. Continue"],"ans":"A","expl":"ISO 9001品質管理系統的範圍涵蓋組織的所有相關部門和功能，不局限於生產部門，包括設計、採購、銷售、服務等所有影響產品品質的活動。"},
{"ch":3,"num":24,"q":"下列哪一項不屬於「品質成本（Cost of Quality）」的範疇？","opts":["A. 預防成本（Prevention Cost）", "B. 鑑定成本（Appraisal Cost）", "C. 行銷成本（Marketing Cost）", "D. 內部失敗成本（Internal Failure Cost）", "E. 外部失敗成本（External Failure Cost）"],"ans":"C","expl":"品質改善最有效的方法是「根因分析（RCA）後採取矯正措施」，找出問題的根本原因並徹底消除，而非僅處理表面症狀。"},
{"ch":3,"num":25,"q":"產品安全之設計應符合何種原則？","opts":["A. 合理可預見的誤用原則", "B. 消費者使用習慣原則", "C. 產品最低成本原則", "D. 以上皆是", "E. 以上皆非"],"ans":"A","expl":"管制圖的管制界限通常設定在±3σ（三個標準差），對應的是99.73%的信賴水準，使虛警率（false alarm rate）保持在0.27%的合理水平。"},
{"ch":3,"num":26,"q":"下列何者非國際標準計量單位之基本單位：","opts":["A. 公尺", "B. 公斤", "C. 公噸", "D. 秒", "E. 以上皆是"],"ans":"C","expl":"品質系統驗証（品質稽核）後，受稽單位應「針對不符合事項進行根因分析，並採取矯正措施」，確保問題得到根本解決。"},
{"ch":3,"num":27,"q":"下列何者不屬於 ISO 17025 標準的要求？","opts":["A. 人員資格", "B. 設備校正", "C. 測試方法驗證", "D. 產品價格", "E. 文件管制"],"ans":"D","expl":"ISO 9001的「以顧客為焦點」原則要求組織識別顧客需求、超越顧客期望，並監測顧客滿意度，將顧客滿意度作為品質系統的核心目標。"},
{"ch":3,"num":28,"q":"實驗室進行內部稽核的目的為何？","opts":["A. 懲處員工", "B. 檢查品質系統的有效性", "C. 提升員工士氣", "D. 減少工作量", "E. 以上皆非"],"ans":"B","expl":"GMP（良好製造規範）是規範製造業特別是食品、藥品製造的品質管理標準，「個人自訂標準」不是GMP，GMP是政府或行業制定的強制性最低標準。"},
{"ch":3,"num":29,"q":"中華民國於民國幾年開始實施產品責任法？","opts":["A. 1970 年", "B. 1980 年", "C. 1990 年", "D. 2000 年", "E. 2010 年"],"ans":"D","expl":"品質成本（Cost of Quality）包括預防成本、鑑定成本、內部失敗成本和外部失敗成本四大類。增加預防成本通常能有效降低失敗成本，達到總品質成本最小化。"},
{"ch":3,"num":30,"q":"下列何者屬於文件管制的內容？","opts":["A. 文件審核", "B. 文件核准", "C. 文件發放", "D. 文件修改", "E. 以上皆是"],"ans":"E","expl":"產品安全應在產品生命週期的各個階段都加以考慮，從設計、開發、製造到使用和報廢，全程關注安全性，而非僅在最後階段處理，故答案為「以上皆是」。"},
{"ch":3,"num":31,"q":"人為錯誤的發生往往是多個因素共同作用的結果，此觀點稱為：","opts":["A. 單一原因論", "B. 雙因素論", "C. 多因素論", "D. 系統論", "E. 混沌論"],"ans":"C","expl":"管制圖的使用方法包括：計算中心線和管制界限（UCL/LCL）、持續監測數據點、識別異常模式等。管制界限不應隨意更改，必須基於統計分析。"},
{"ch":3,"num":32,"q":"下列哪一種工具主要用於分析問題的根本原因？","opts":["A. 柏拉圖（Pareto Chart）", "B. 管制圖（Control Chart）", "C. 魚骨圖（Fishbone Diagram）", "D. 直方圖（Histogram）", "E. 散佈圖（Scatter Diagram）"],"ans":"C","expl":"品質改善活動應「建立在數據分析的基礎上」，通過客觀的數據確認問題所在和改善效果，避免憑主觀感覺進行改善決策。"},
{"ch":3,"num":33,"q":"全球化採購的趨勢使得企業必須面對:","opts":["A. 更多元的供應商和更複雜的供應鏈", "B. 更低的採購成本", "C. 更短的交貨時間", "D. 更高的產品品質", "E. 以上皆非"],"ans":"A","expl":"標準化作業的主要目的是「確保品質一致性和可重複性」，透過制定和執行標準作業程序，消除不必要的變異，保持穩定的品質水準。"},
{"ch":3,"num":34,"q":"稽核報告的內容應包括？","opts":["A. 稽核目的", "B. 稽核範圍", "C. 稽核發現", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"QC七大手法中，查檢表（Check Sheet）用於系統性收集數據，提供問題分析的原始資料基礎，是其他手法的數據來源。"},
{"ch":3,"num":35,"q":"下列哪一項是「5S管理」的正確順序？","opts":["A. 整頓→整理→清掃→清潔→素養", "B. 清掃→整理→整頓→素養→清潔", "C. 整理→整頓→清掃→清潔→素養", "D. 整理→清掃→整頓→素養→清潔", "E. 素養→清潔→清掃→整頓→整理"],"ans":"C","expl":"稽核報告的撰寫方式應「客觀公正、事實為依據」，以具體的事實和數據支持稽核發現，避免個人偏見和情緒化的描述。"},
{"ch":3,"num":36,"q":"稽核的範圍應？","opts":["A. 由受稽單位決定", "B. 明確且與稽核目的相關", "C. 盡可能廣泛", "D. 避開敏感部門", "E. 由稽核員自行決定"],"ans":"B","expl":"ISO 9001:2015中，「6.1 風險與機會的因應措施」要求組織識別和應對影響品質管理系統的風險和機會，是風險管理理念融入品質管理的體現。"},
{"ch":3,"num":37,"q":"ISO 17025 是什麼樣的標準?","opts":["A. 環境管理系統標準", "B. 食品安全管理系統標準", "C. 實驗室品質管理系統標準", "D. 資訊安全管理系統標準", "E. 以上皆非"],"ans":"C","expl":"量測系統分析（MSA）評估量具系統的適用性，主要指標包括：重複性（EV）、再現性（AV）、偏差（Bias）、線性（Linearity）和穩定性（Stability）。"},
{"ch":3,"num":38,"q":"實驗室應如何處理客戶的投訴？","opts":["A. 忽視客戶的投訴", "B. 推卸責任", "C. 與客戶爭吵", "D. 建立客訴處理程序並進行調查", "E. 以上皆非"],"ans":"D","expl":"品管圈活動使用的主要工具包括QC七大手法，特別是查檢表、柏拉圖、特性要因圖、直方圖等，用於問題識別、分析和改善效果確認。"},
{"ch":3,"num":39,"q":"供應鏈管理的目標是:","opts":["A. 降低採購成本", "B. 提升整體供應鏈的效率和效益", "C. 縮短交貨時間", "D. 提高產品利潤", "E. 以上皆非"],"ans":"B","expl":"外部品質成本包括：退貨處理、保固費用、客訴處理、產品召回、賠償費用等，均屬於產品售出後因品質問題引起的損失，故答案為「以上皆是」。"},
{"ch":3,"num":40,"q":"測試是指：","opts":["A. 用文件紀錄產品特性", "B. 確認產品符合規格", "C. 對產品施加特定條件以觀察其反應", "D. 分析產品的設計", "E. 以上皆非"],"ans":"C","expl":"品質改善的PDCA循環應「持續不斷地進行」，每個循環結束後立即開始下一個更高層次的循環，形成螺旋式上升的持續改善文化。"},
{"ch":3,"num":41,"q":"稽核過程中，稽核員應？","opts":["A. 以抽樣的方式檢查文件記錄", "B. 檢查所有文件記錄", "C. 只檢查與稽核主題相關的記錄", "D. 忽略過期文件記錄", "E. 相信受稽單位提供的口頭說明"],"ans":"A","expl":"抽樣計畫（Sampling Plan）包括規定抽樣數量（n）、允收水準（Ac）和拒收水準（Re）等要素，提供系統性的抽樣決策框架，故答案為「以上皆是」。"},
{"ch":3,"num":42,"q":"稽核缺失應？","opts":["A. 立即要求改善", "B. 由稽核員自行決定改善方式", "C. 隱瞞不報", "D. 客觀且具體的描述", "E. 誇大其嚴重性"],"ans":"D","expl":"全面品質管理（TQM）強調全員參與，是指組織從最高層到基層員工全員都負有品質責任，每個人都是品質的主人翁，故答案為「全員」。"},
{"ch":3,"num":43,"q":"有效的提案應具備哪些特性？","opts":["A. 具體可行、效益明確", "B. 構思新穎、標新立異", "C. 規模宏大、投資巨大", "D. 僅限於個人工作範圍", "E. 符合上級指示"],"ans":"A","expl":"PDCA的「計畫（Plan）」階段主要工作包括：問題定義、數據收集分析、根因分析、設定改善目標和制定對策，是整個改善循環的基礎，故答案為「以上皆是」。"},
{"ch":3,"num":44,"q":"以下哪種方法不屬於風險控制的措施？","opts":["A. 消除風險源", "B. 降低風險發生的可能性", "C. 減輕風險造成的損失", "D. 轉移風險", "E. 忽視風險"],"ans":"E","expl":"品質管理的最終目標是「滿足顧客需求並超越其期望」，所有品質活動的最終目的都是提升顧客滿意度，實現組織的持續發展，故選以上皆是。"},
{"ch":3,"num":45,"q":"品質保證一詞的英文縮寫為：","opts":["A. QA", "B. QC", "C. QI", "D. QM", "E. TQM"],"ans":"A","expl":"品管圈成員在解決問題時，通常使用「特性要因圖（魚骨圖）」來分析問題的根本原因，從人、機、料、法、環等面向系統性找出原因。"},
{"ch":3,"num":46,"q":"稽核員應具備？","opts":["A. 專業知識和技能", "B. 管理職權", "C. 財務背景", "D. 法律知識", "E. 生產經驗"],"ans":"A","expl":"產品設計階段的品質要素包括：客戶需求轉化、可靠性設計、可製造性設計（DFM）、安全性考量等，是品質的源頭，故以上皆是。"},
{"ch":3,"num":47,"q":"ISO 9001 品質管理系統的主要目的是什麼？","opts":["A. 提供標準化的品質管理架構", "B. 確保產品零缺陷", "C. 降低生產成本", "D. 提高市場佔有率", "E. 強制企業進行全面自動化"],"ans":"A","expl":"品質目標的設定應符合SMART原則：具體（Specific）、可量測（Measurable）、可達成（Achievable）、相關（Relevant）、時限（Time-bound），以確保目標的有效性。"},
{"ch":3,"num":48,"q":"關於JIT (Just In Time)的敘述，何者正確?","opts":["A. 是一種大量生產的管理模式", "B. 是一種追求零庫存的管理模式", "C. 是一種強調供需同步的管理模式", "D. 以上皆是", "E. 以上皆非"],"ans":"C","expl":"品質管理系統的審查應由「最高管理者」定期進行（管理審查），評估品質管理系統的適切性、充分性和有效性，確保系統持續符合戰略目標。"},
{"ch":3,"num":49,"q":"下列何者不屬於產品安全之設計考量？","opts":["A. 材料選擇", "B. 製造方法", "C. 使用環境", "D. 預期用途", "E. 產品價格"],"ans":"E","expl":"品管圈的活動成果應向管理層和全公司「發表和分享」，不僅分享改善成果，也分享解決問題的過程和方法，促進組織學習和知識擴散，故答案為「以上皆是」。"},
{"ch":3,"num":50,"q":"在品質管理中，「Poka-Yoke」指的是什麼？","opts":["A. 統計製程管制", "B. 全面生產維護（TPM）", "C. 防錯設計（防呆法）", "D. 快速換模技術（SMED）", "E. 標準作業程序（SOP）"],"ans":"C","expl":"管制圖的管制界限應「根據製程的歷史數據計算得出」，反映製程在穩定狀態下的自然變異，而非由規格或客戶要求決定。"},
{"ch":4,"num":1,"q":"疲勞駕駛屬於哪種類型的人為錯誤？","opts":["A. 技術性失誤", "B. 程序性失誤", "C. 無意識性失誤", "D. 溝通性失誤", "E. 意識性失誤"],"ans":"C","expl":"疲勞駕駛屬於「無意識性失誤（Unintentional Error）」，因疲勞降低了意識水平和認知能力，導致無意識地做出錯誤判斷或動作，而非有意識的決策錯誤。"},
{"ch":4,"num":2,"q":"在六標準差（Six Sigma）方法論中，「DMAIC」的「A」代表什麼？","opts":["A. Action（行動）", "B. Align（對齊）", "C. Adjust（調整）", "D. Audit（稽核）", "E. Analyze（分析）"],"ans":"E","expl":"六標準差（Six Sigma）方法論中，DMAIC代表：Define（定義）、Measure（量測）、Analyze（分析）、Improve（改善）、Control（管制）。「A」代表Analyze（分析），即分析根因和影響因素。"},
{"ch":4,"num":3,"q":"在PDCA循環的計畫階段，應先進行哪一項工作？","opts":["A. 數據收集", "B. 標準制定", "C. 改善方案擬定", "D. 問題確認", "E. 以上皆非"],"ans":"D","expl":"PDCA循環的計畫（Plan）階段第一步是「問題確認」，明確定義需要解決的問題（現狀與目標的差距），然後才進行數據收集、根因分析和制定改善方案。"},
{"ch":4,"num":4,"q":"品質管理的發展過程中，下列何者出現的時間最晚？","opts":["A. 全面品質管理", "B. 品質保證", "C. 統計品質管制", "D. 品管圈", "E. 以上皆非"],"ans":"A","expl":"品質管理發展時間順序：統計品質管制（1940-50s）→品質保證（1950-60s）→品管圈（1960s）→全面品質管理（TQM, 1980s）。全面品質管理出現最晚。"},
{"ch":4,"num":5,"q":"現今世界各國普遍使用之品質管理系統標準為：","opts":["A. ISO 9000 系列", "B. CNS 系列", "C. JIS 系列", "D. DIN 系列", "E. 以上皆非"],"ans":"A","expl":"MSA（量測系統分析）的目的是「確認量測系統的適用性」，評估量測結果的可靠性和準確性，包括重複性、再現性、偏差、線性和穩定性等。"},
{"ch":4,"num":6,"q":"以下何者有助於促進員工積極參與提案改善活動？","opts":["A. 高額獎金", "B. 建立完善的提案制度", "C. 簡化提案流程", "D. 強制員工提案", "E. 公開表揚所有提案"],"ans":"B","expl":"提案改善應「由全體員工參與」，讓每個員工都能貢獻智慧，不應限制提案者的範圍，這體現了全員品質意識和改善文化。"},
{"ch":4,"num":7,"q":"下列何者不屬於產品召回的原因？","opts":["A. 產品瑕疵", "B. 安全疑慮", "C. 產品價格過高", "D. 違反法規", "E. 以上皆是"],"ans":"C","expl":"ISO 9001品質管理系統的核心目標是「提升顧客滿意度」，通過有效的品質管理系統，持續滿足顧客需求和法律法規要求。"},
{"ch":4,"num":8,"q":"產品安全之警告標示應包含哪些內容？","opts":["A. 潛在危險", "B. 安全使用方式", "C. 緊急處理措施", "D. 以上皆是", "E. 以上皆非"],"ans":"D","expl":"管制圖中，若有連續多點落在中心線同側（如西屋法則），代表製程存在趨勢或偏移，需要調查原因，即使點都在管制界限內，也表示「製程可能出現偏移」。"},
{"ch":4,"num":9,"q":"產品安全之警告標示應如何設計？","opts":["A. 盡可能簡短", "B. 使用專業術語", "C. 清楚易懂且醒目", "D. 使用多種語言", "E. 以上皆非"],"ans":"C","expl":"品質改善的優先順序應根據「問題的嚴重性和發生頻率」決定，使用柏拉圖分析找出影響最大的關鍵問題優先解決，提高改善資源的效益。"},
{"ch":4,"num":10,"q":"進料檢驗的方式包括:","opts":["A. 全檢", "B. 抽檢", "C. 目視檢驗", "D. 儀器檢驗", "E. 以上皆是"],"ans":"E","expl":"不合格品管理應包括：識別、隔離、評審、處置等步驟，確保不合格品不會流入下一製程或到達客戶，故答案為「以上皆是」。"},
{"ch":4,"num":11,"q":"在PDCA循環的檢查階段，應使用什麼方法來評估改善成效？","opts":["A. 數據分析", "B. 觀察", "C. 訪談", "D. 問卷調查", "E. 以上皆可"],"ans":"E","expl":"PDCA循環中，「行動（Action）」階段的主要任務是「將有效的改善措施標準化，並推廣到類似的情況」，同時識別尚未解決的問題進入下一個PDCA循環。"},
{"ch":4,"num":12,"q":"稽核報告應？","opts":["A. 僅列出缺失事項", "B. 採用專業術語撰寫", "C. 清晰易懂", "D. 由受稽單位撰寫", "E. 延遲提交"],"ans":"C","expl":"稽核員應具備的基本素質包括：客觀公正、良好的溝通技巧、專業知識和技能、誠信正直等，以確保稽核活動的有效性和公信力。"},
{"ch":4,"num":13,"q":"下列哪一種圖表最適合用來顯示「數據的分布狀況」？","opts":["A. 直方圖（Histogram）", "B. 管制圖（Control Chart）", "C. 柏拉圖（Pareto Chart）", "D. 魚骨圖（Fishbone Diagram）", "E. 甘特圖（Gantt Chart）"],"ans":"A","expl":"5S活動（整理、整頓、清潔、清掃、素養）的主要目的是「建立整潔有序的工作環境」，消除浪費，提高工作效率和安全性，是持續改善的基礎。"},
{"ch":4,"num":14,"q":"品質管理中的「標竿管理（Benchmarking）」是指？","opts":["A. 僅比較公司內部部門的績效", "B. 完全複製其他公司的管理模式", "C. 僅用於財務指標的比較", "D. 與競爭對手或業界最佳實務進行比較", "E. 忽略外部市場趨勢"],"ans":"D","expl":"柏拉圖（Pareto Diagram）的核心概念是「80/20法則」，即約80%的問題由20%的原因造成，幫助識別最重要的問題（重要的少數）。"},
{"ch":4,"num":15,"q":"以下何者有助於提升提案的品質？","opts":["A. 模仿他人提案", "B. 提出天馬行空的構想", "C. 只關注個人工作範圍", "D. 忽略可行性與效益", "E. 事先進行調查研究"],"ans":"E","expl":"品質記錄（Quality Records）的管理要求包括記錄的識別、儲存、保護、檢索、保留時間和處置，確保記錄的完整性和可用性，故答案為「以上皆是」。"},
{"ch":4,"num":16,"q":"採購品保的目標是:","opts":["A. 降低採購成本", "B. 提升產品品質", "C. 縮短交貨時間", "D. 提高顧客滿意度", "E. 以上皆是"],"ans":"E","expl":"品質管理系統的「持續改善」要求組織定期評估和優化品質管理活動，通過PDCA循環不斷提升系統的有效性，而非一次設立後固定不變。"},
{"ch":4,"num":17,"q":"下列何者非決定抽樣檢驗之要素？","opts":["A. 批的型態", "B. 檢驗特性", "C. 生產者風險", "D. 樣本標準差", "E. 消費者風險"],"ans":"D","expl":"品質訓練的目的是「提升員工的品質意識和技能」，使員工了解品質的重要性，掌握品質工具和方法，能夠在工作中有效執行品質管理活動。"},
{"ch":4,"num":18,"q":"ISO 9001:2015 強調的「風險導向思維（Risk-Based Thinking）」主要目的是？","opts":["A. 避免任何形式的變更", "B. 僅關注產品檢驗", "C. 完全消除所有風險", "D. 預防問題並把握改善機會", "E. 僅適用於製造業"],"ans":"D","expl":"統計製程管制（SPC）的主要工具是「管制圖」，通過持續監測製程數據，區分一般原因變異和特殊原因變異，及時偵測製程異常。"},
{"ch":4,"num":19,"q":"下列哪一項是「全面生產維護（TPM）」的主要目標？","opts":["A. 僅由維修部門負責設備保養", "B. 減少員工參與以降低成本", "C. 僅適用於辦公室環境", "D. 完全取代自動化生產", "E. 追求設備零故障、零不良、零事故"],"ans":"E","expl":"品管圈的活動範圍通常以「部門或工作場所」為基礎，成員來自相同或相關工作崗位，解決日常工作中遇到的問題，故以上皆是可能的答案選項。"},
{"ch":4,"num":20,"q":"人為錯誤最常發生在以下哪個階段？","opts":["A. 執行例行性工作時", "B. 學習新技能時", "C. 面對緊急情況時", "D. 團隊合作時", "E. 以上皆是"],"ans":"A","expl":"不合格品的防止擴散措施包括：標示識別、隔離存放、通知相關部門等，確保不合格品不會被誤用或流入正常生產流程，故答案為「以上皆是」。"},
{"ch":4,"num":21,"q":"稽核過程中，稽核員應？","opts":["A. 以抽樣的方式檢查文件記錄", "B. 檢查所有文件記錄", "C. 全檢與稽核主題相關的記錄", "D. 忽略過期文件記錄", "E. 相信受稽單位提供的口頭說明"],"ans":"A","expl":"ISO 9001認証的好處包括：提升企業形象、改善內部管理、增強客戶信心、促進持續改善等，故以上皆是ISO認証的主要效益。"},
{"ch":4,"num":22,"q":"品質成本中屬於外部失敗成本的是?","opts":["A. 教育訓練費用", "B. 客訴處理費用", "C. 製程改善費用", "D. 原料檢驗費用", "E. 品質稽核費用"],"ans":"B","expl":"魚骨圖（Ishikawa Diagram / Cause and Effect Diagram）由石川馨（Ishikawa）博士發明，用於分析問題的根本原因，從人員、機器、材料、方法和環境（4M1E或5M1E）等面向找出影響品質的因素。"},
{"ch":4,"num":23,"q":"瑞士起司模型常被用來解釋何種現象？ (重大事故或失誤如何在多重防線下仍然發生)","opts":["A. 人為錯誤的發生機制", "B. 產品品質的變異", "C. 組織文化的形成", "D. 市場競爭的態勢", "E. 科技發展的趨勢"],"ans":"A","expl":"全面品質管理（TQM）的基本原則包括以顧客為中心、全員參與、持續改善、以數據為基礎的決策等，故以上皆是TQM的核心理念。"},
{"ch":4,"num":24,"q":"有效的供應商管理應包含下列哪些方面?","opts":["A. 供應商評估", "B. 供應商輔導", "C. 供應商稽核", "D. 供應商獎懲", "E. 以上皆是"],"ans":"E","expl":"品質系統的目標之一是「減少不合格品的產生」，通過預防性措施、製程控制和持續改善，從源頭控制品質，減少廢品和返工。"},
{"ch":4,"num":25,"q":"關於品管圈的敘述，下列何者錯誤？","opts":["A. 品管圈是由工作現場的同一作業人員組成", "B. 圈員共同努力解決工作上的問題", "C. 品管圈的活動必須由公司高層主導", "D. 品管圈活動強調自主性與全員參與", "E. 品管圈活動有助於提升員工的士氣和工作效率"],"ans":"C","expl":"查檢表（Check Sheet）的主要功能是「系統性地收集和記錄數據」，提供分析問題的原始資料，是QC七大手法中最基礎的數據收集工具。"},
{"ch":4,"num":26,"q":"下列何者不屬於設計管制的目的？","opts":["A. 確保產品設計符合顧客要求", "B. 確保產品設計符合法規要求", "C. 確保產品設計易於製造", "D. 確保產品設計易於維修", "E. 確保產品設計成本最低"],"ans":"E","expl":"品質改善的工作應「由品質相關部門主導，全體員工參與」，品管部門提供技術支持和方法，生產、設計等部門共同執行，全員貢獻，故以上皆是。"},
{"ch":4,"num":27,"q":"SPC主要目的為","opts":["A. 管理製程穩定性與變異", "B. 降低成本", "C. 提高產品設計速度", "D. 管理人員效率", "E. 評估顧客滿意度"],"ans":"A","expl":"稽核前應進行「稽核計畫的制定」，包括確定稽核目的、範圍、方法、時間和人員等，做好充分準備才能確保稽核的有效性和效率。"},
{"ch":4,"num":28,"q":"抽樣檢驗常用的標準為:","opts":["A. ISO 9000", "B. CNS 12684", "C. MIL-STD-105E", "D. ISO 14000", "E. 以上皆是"],"ans":"C","expl":"ISO 9001中，「矯正措施」要求組織分析不符合事項的根本原因，採取措施消除根源，防止問題再次發生，是品質改善的重要機制。"},
{"ch":4,"num":29,"q":"品管圈活動中最常用的問題解決步驟是：","opts":["A. PDCA循環", "B. SWOT分析", "C. TRIZ理論", "D. 價值分析法", "E. 德菲法"],"ans":"A","expl":"品管圈的活動程序包括：主題選定→目標設定→現狀調查→原因分析→對策擬定→對策實施→效果確認→標準化→成果發表，是系統化的問題解決流程，故以上皆是。"},
{"ch":4,"num":30,"q":"量測系統分析 (MSA) 常用的方法有哪些？","opts":["A. 重複性和再現性 (R&R) 研究", "B. 線性研究", "C. 偏倚研究", "D. 穩定性研究", "E. 以上皆是"],"ans":"E","expl":"品質成本（COQ）包括預防成本、鑑定成本（兩者合稱「符合成本」）和失敗成本（內部+外部）。增加預防成本投資，通常能使總品質成本降低，故以上皆是品質成本的組成部分。"},
{"ch":4,"num":31,"q":"以下何者不屬於稽核的四大原則？","opts":["A. 獨立性", "B. 客觀性", "C. 完整性", "D. 證據導向", "E. 公開透明"],"ans":"C","expl":"ISO 9001認証需要「定期接受監督稽核」（通常每年一次），確認組織持續符合標準要求，並在認証到期時進行再認証稽核。"},
{"ch":4,"num":32,"q":"防呆設計的主要目的是什麼？","opts":["A. 提升產品美觀", "B. 降低生產成本", "C. 預防人為錯誤", "D. 增加產品功能", "E. 吸引顧客目光"],"ans":"C","expl":"品質管理系統的建立應「有組織的系統性方法」，從最高層制定政策、確立框架，逐步展開到各部門和流程，確保品質系統的一致性和有效性。"},
{"ch":4,"num":33,"q":"綠色採購是指:","opts":["A. 採購價格最低廉的產品", "B. 採購品質最好的產品", "C. 採購交貨時間最短的產品", "D. 採購對環境友善的產品", "E. 以上皆非"],"ans":"D","expl":"標準化的目的包括：提高品質一致性、提高生產效率、降低成本、促進知識傳承等。「增加員工創意空間」並非標準化的直接目的（標準化可能限制某些創意空間）。"},
{"ch":4,"num":34,"q":"下列何者不屬於ISO 9001標準中所規範的管理責任？","opts":["A. 顧客抱怨處理", "B. 品質政策", "C. 品質目標", "D. 管理審查", "E. 以上皆是"],"ans":"A","expl":"品質問題的根本原因分析方法包括：5Why分析法、魚骨圖、FMEA等。「5Why法」是通過連續追問「為什麼」，深入探索問題的根源，找出最根本的原因。"},
{"ch":4,"num":35,"q":"稽核的證據應？","opts":["A. 只包含文件記錄", "B. 僅限於現場觀察", "C. 由受稽單位提供", "D. 充分且適當", "E. 符合稽核員的預期"],"ans":"D","expl":"品管圈的輔導員（Facilitator）的主要職責是「提供技術指導和協助」，幫助圈員使用品質工具，但不直接替代圈員解決問題，而是授人以漁。"},
{"ch":4,"num":36,"q":"實驗室應如何確保檢驗結果的準確性？","opts":["A. 使用校正過的設備", "B. 制定標準作業程序", "C. 培訓檢驗人員", "D. 定期進行內部稽核", "E. 以上皆是"],"ans":"E","expl":"有效的品質文化應「鼓勵員工主動提出問題和改善建議」，讓品質意識成為組織文化的一部分，而非僅依賴規定和懲罰機制，故以上皆是健康品質文化的特徵。"},
{"ch":4,"num":37,"q":"下列何者不屬於防止人為疏失的設計原則？","opts":["A. 簡化操作流程", "B. 使用防呆裝置", "C. 提高工作強度", "D. 提供明確的作業指引", "E. 以上皆是"],"ans":"C","expl":"SPC管制圖的管制界限是「根據製程自然變異計算的統計界限（±3σ）」，代表製程在統計控制狀態下的正常波動範圍，與產品規格無直接關係。"},
{"ch":4,"num":38,"q":"產品召回的流程包括哪些步驟？","opts":["A. 發現問題", "B. 評估風險", "C. 通知主管機關", "D. 發布召回訊息", "E. 以上皆是"],"ans":"E","expl":"品質改善的數據應「從實際製程和產品中收集」，保持數據的真實性和代表性，避免人為操縱數據，確保改善決策基於事實，故以上皆是正確的數據收集原則。"},
{"ch":4,"num":39,"q":"企業應如何降低產品責任風險？","opts":["A. 隱瞞產品瑕疵", "B. 投保產品責任險", "C. 避免產品召回", "D. 推卸責任", "E. 以上皆非"],"ans":"B","expl":"稽核不符合事項的等級通常分為「主要不符合（Major NC）」和「次要不符合（Minor NC）」，前者對品質管理系統有重大影響，後者影響較小但仍需改善。"},
{"ch":4,"num":40,"q":"稽核缺失應？","opts":["A. 立即要求改善", "B. 由稽核員自行決定改善方式", "C. 隱瞞不報", "D. 客觀且具體的描述", "E. 誇大其嚴重性"],"ans":"D","expl":"品質管理的最終目標是「客戶滿意度和持續改善」，所有品質活動都圍繞這一核心目標展開，確保產品和服務持續滿足並超越客戶期望，故以上皆是。"},
{"ch":4,"num":41,"q":"有關產品安全的說明，何者正確？","opts":["A. 品質良好代表產品一定安全", "B. 安全是產品設計階段以後才考慮的因素", "C. 安全性為產品合規的基本要求", "D. 品質異常與安全無關", "E. 安全問題主要由客戶檢舉"],"ans":"C","expl":"提案改善系統的推行應包含：明確的提案流程、及時的回饋機制、適當的獎勵制度、持續的推廣宣傳等，以維持員工的參與熱情，故以上皆是。"},
{"ch":4,"num":42,"q":"ISO/IEC 17025 是由哪個組織制定的？","opts":["A. 國際標準化組織 (ISO)", "B. 中華民國國家標準 (CNS)", "C. 美國國家標準協會 (ANSI)", "D. 日本工業標準 (JIS)", "E. 德國標準化學會 (DIN)"],"ans":"A","expl":"品質保證體系的建立應從「整體系統的角度設計」，確保所有相互關聯的過程和要素協調一致，而非各部門各自為政，系統化方法是ISO 9001的重要原則。"},

const CH_COLORS = {1:'#2563eb',2:'#7c3aed',3:'#059669',4:'#d97706'};
const CH_NAMES  = {1:'品質管理',2:'品質概念',3:'品質概念進階',4:'品質概念綜合'};
const CH_ICONS  = {1:'🏭',2:'💡',3:'📊',4:'🎯'};

// ── State ────────────────────────────────────────────────────────────────
let _mode = 'practice'; // 'practice' | 'random'
let _qs = [];           // questions in current session
let _cur = 0;           // current index
let _answers = {};      // {idx: 'A'|'B'|...}
let _randN = 20;

// Persistent stats
let _stats = JSON.parse(localStorage.getItem('qm_stats')||'{"done":0,"correct":0}');

// ── Home ─────────────────────────────────────────────────────────────────
function goHome() {
  showScreen('home');
  document.getElementById('practice-setup').style.display='none';
  document.getElementById('rand-setup').style.display='none';
  updateStats();
  buildChCards();
}

function updateStats() {
  document.getElementById('stat-done').textContent = _stats.done;
  document.getElementById('stat-correct').textContent = _stats.correct;
  document.getElementById('stat-acc').textContent = _stats.done>0
    ? Math.round(_stats.correct/_stats.done*100)+'%' : '–';
}

function buildChCards() {
  const chProg = JSON.parse(localStorage.getItem('qm_ch_prog')||'{}');
  const container = document.getElementById('ch-cards');
  container.innerHTML = '';
  [1,2,3,4].forEach(ch=>{
    const qs50 = QUESTIONS.filter(q=>q.ch===ch);
    const prog = chProg[ch]||{done:0,correct:0};
    const div = document.createElement('div');
    div.className='ch-card';
    div.style.background = `linear-gradient(135deg,${CH_COLORS[ch]},${CH_COLORS[ch]}cc)`;
    div.onclick = ()=>startChapter(ch);
    div.innerHTML = `
      <span class="ch-icon">${CH_ICONS[ch]}</span>
      <div class="ch-info">
        <h4>第${ch}章・${CH_NAMES[ch]}</h4>
        <p>${qs50.length}題・每題2分</p>
      </div>
      <div class="ch-prog">
        <div class="prog-num">${prog.correct}/${qs50.length}</div>
        <div class="prog-label">已答對</div>
      </div>`;
    container.appendChild(div);
  });
}

function showPracticeSetup() {
  document.getElementById('practice-setup').style.display='block';
  document.getElementById('rand-setup').style.display='none';
  buildChCards();
}

function showRandSetup() {
  document.getElementById('rand-setup').style.display='block';
  document.getElementById('practice-setup').style.display='none';
}

function setRandN(n, btn) {
  _randN = n;
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('rand-n-input').value = n;
}

// ── Start ─────────────────────────────────────────────────────────────────
function startChapter(ch) {
  _mode = 'practice';
  _qs = QUESTIONS.filter(q=>q.ch===ch);
  _cur = 0;
  _answers = {};
  showQuiz();
}

function startRandom() {
  const inputVal = parseInt(document.getElementById('rand-n-input').value)||_randN;
  const n = Math.max(1, Math.min(200, inputVal));
  _mode = 'random';
  const shuffled = [...QUESTIONS].sort(()=>Math.random()-.5);
  _qs = shuffled.slice(0,n);
  _cur = 0;
  _answers = {};
  showQuiz();
}

// ── Quiz ──────────────────────────────────────────────────────────────────
function showQuiz() {
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = _qs[_cur];
  const total = _qs.length;
  const answered = _answers[_cur];
  const pct = Math.round((_cur+1)/total*100);

  // Header
  const tag = document.getElementById('quiz-ch-tag');
  tag.textContent = `Ch${q.ch} ${CH_NAMES[q.ch]}`;
  tag.style.background = CH_COLORS[q.ch];
  document.getElementById('quiz-prog-text').textContent = `第 ${_cur+1} / ${total} 題`;
  document.getElementById('quiz-prog-fill').style.width = pct+'%';

  document.getElementById('q-num-display').textContent = `第 ${_cur+1} 題（原題 Q${q.num}）`;
  document.getElementById('q-text-display').textContent = q.q;

  // Options
  const optsEl = document.getElementById('opts-display');
  optsEl.innerHTML = '';
  q.opts.forEach(opt => {
    const letter = opt.charAt(0);
    const text = opt.slice(3);
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.dataset.letter = letter;
    btn.innerHTML = `<span class="opt-letter">${letter}</span><span class="opt-text">${text}</span>`;
    if (answered) {
      btn.disabled = true;
      if (letter === q.ans) btn.classList.add('correct');
      else if (letter === answered) btn.classList.add('wrong');
    } else {
      btn.onclick = () => selectOpt(letter);
    }
    optsEl.appendChild(btn);
  });

  // Explanation
  const explBox = document.getElementById('expl-box');
  document.getElementById('expl-text').textContent = q.expl;
  explBox.className = 'expl-box' + (answered ? ' show' : '');

  // Result
  const resEl = document.getElementById('result-display');
  if (answered) {
    const ok = answered === q.ans;
    resEl.innerHTML = `<div class="result-tag ${ok?'ok':'ng'}">${ok?'✅ 答對了！':'❌ 答錯了'} 正確答案：(${q.ans}) ${getOptText(q,q.ans)}</div>`;
  } else {
    resEl.innerHTML = '';
  }

  // Nav buttons
  document.getElementById('btn-prev').disabled = _cur === 0;
  const btnNext = document.getElementById('btn-next');
  if (_cur === total-1) {
    btnNext.textContent = '查看結果 →';
    btnNext.onclick = showResult;
  } else {
    btnNext.textContent = '下一題 →';
    btnNext.onclick = nextQ;
  }
}

function getOptText(q, letter) {
  const opt = q.opts.find(o=>o.charAt(0)===letter);
  return opt ? opt.slice(3) : '';
}

function selectOpt(letter) {
  const q = _qs[_cur];
  _answers[_cur] = letter;

  // Save to persistent stats
  _stats.done++;
  if (letter === q.ans) _stats.correct++;
  localStorage.setItem('qm_stats', JSON.stringify(_stats));

  // Save chapter progress
  const chProg = JSON.parse(localStorage.getItem('qm_ch_prog')||'{}');
  if (!chProg[q.ch]) chProg[q.ch] = {done:0,correct:0};
  chProg[q.ch].done++;
  if (letter === q.ans) chProg[q.ch].correct++;
  localStorage.setItem('qm_ch_prog', JSON.stringify(chProg));

  renderQ();
}

function prevQ() { if(_cur>0){_cur--;renderQ();} }
function nextQ() { if(_cur<_qs.length-1){_cur++;renderQ();} }

// ── Result ────────────────────────────────────────────────────────────────
function showResult() {
  showScreen('result');
  const total = _qs.length;
  const ansCount = Object.keys(_answers).length;
  const correct = _qs.filter((q,i)=>_answers[i]===q.ans).length;
  const wrong = ansCount - correct;
  const skip = total - ansCount;
  const score = Math.round(correct/total*100);

  document.getElementById('result-score').textContent = `${correct} / ${total}`;
  document.getElementById('rs-correct').textContent = correct;
  document.getElementById('rs-wrong').textContent = wrong;
  document.getElementById('rs-skip').textContent = skip;

  let grade = score>=90?'🏆 優秀！':score>=80?'🌟 良好':score>=70?'👍 及格':score>=60?'📖 需要加強':'💪 繼續努力';
  document.getElementById('result-grade').textContent = grade;

  // Ring
  const circumference = 2*Math.PI*50;
  const offset = circumference*(1-score/100);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;

  // Review items
  const container = document.getElementById('review-items');
  container.innerHTML = '';
  _qs.forEach((q,i)=>{
    const userAns = _answers[i];
    const ok = userAns === q.ans;
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <div class="review-q">${i+1}. ${q.q.length>60?q.q.slice(0,60)+'…':q.q}</div>
      <div class="review-detail">
        你的答案：<span class="${ok?'ok':'ng'}">(${userAns||'未作答'})</span>
        　正確答案：<span class="ok">(${q.ans}) ${getOptText(q,q.ans)}</span>
        ${!ok?`<br><span style="color:#6b7280;font-size:.8rem">💡 ${q.expl.slice(0,80)}…</span>`:''}
      </div>`;
    container.appendChild(div);
  });
}

function reviewWrong() {
  const wrongQs = _qs.filter((q,i)=>_answers[i]&&_answers[i]!==q.ans);
  if (!wrongQs.length) { alert('沒有錯題！答題表現很好 🎉'); return; }
  _qs = wrongQs;
  _cur = 0;
  _answers = {};
  showQuiz();
}

// ── Utility ───────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ── Init ──────────────────────────────────────────────────────────────────
goHome();
</script>
</body>
</html>
