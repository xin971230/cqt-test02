const CALC = [{"n": 71, "ch": "品質成本 PAF 分析", "q": "某公司月產量 10,000 件，品質成本：預防 NT$45,000、鑑定 NT$72,000、內部失敗 NT$105,000、外部失敗 NT$78,000。試計算：(1) 總品質成本 (2) 失敗成本占比 (3) 每件品質成本。", "given": "預防$45K, 鑑定$72K, 內部失敗$105K, 外部失敗$78K, 月產量10,000件", "steps": ["總品質成本 = 45,000 + 72,000 + 105,000 + 78,000 = NT$300,000", "失敗成本 = 105,000 + 78,000 = NT$183,000", "失敗成本占比 = 183,000 / 300,000 × 100% = 61.0%", "每件品質成本 = 300,000 / 10,000 = NT$30 / 件"], "ans": "總品質成本 NT$300,000；失敗成本占 61.0%；每件品質成本 NT$30"}, {"n": 72, "ch": "田口品質損失函數", "q": "田口損失函數 L(y)=k(y−m)²，修理費用 A=NT$800，功能界限 Δ=0.4mm，目標值 m=50.0mm，量測值 y=50.3mm。試計算：(1) k (2) L(y)。", "given": "A=NT$800, Δ=0.4mm, m=50.0mm, y=50.3mm", "steps": ["k = A / Δ² = 800 / (0.4)² = 800 / 0.16 = 5,000 NT$/mm²", "偏差量：y − m = 50.3 − 50.0 = 0.3 mm", "L(y) = k × (y−m)² = 5,000 × (0.3)² = 5,000 × 0.09 = NT$450"], "ans": "k = 5,000 NT$/mm²；L(y) = NT$450"}, {"n": 73, "ch": "品質改善 ROI", "q": "改善前月失敗成本 NT$240,000，投入預防成本 NT$50,000 後，失敗成本降至 NT$90,000。試計算：(1) 每月節省金額 (2) ROI（%）。", "given": "改善前失敗=$240K, 投入預防=$50K, 改善後失敗=$90K", "steps": ["每月節省 = 240,000 − 90,000 = NT$150,000", "淨效益 = 節省額 − 投入 = 150,000 − 50,000 = NT$100,000", "ROI = 100,000 / 50,000 × 100% = 200%"], "ans": "每月節省 NT$150,000；ROI = 200%"}, {"n": 74, "ch": "FMEA RPN 計算", "q": "三種失效模式：A(S=7,O=5,D=6)、B(S=9,O=4,D=7)、C(S=6,O=8,D=5)。計算各RPN、找出優先改善項，及B的D改善至3後的新RPN。", "given": "A: S=7,O=5,D=6；B: S=9,O=4,D=7；C: S=6,O=8,D=5", "steps": ["RPN_A = 7 × 5 × 6 = 210", "RPN_B = 9 × 4 × 7 = 252（最高，優先改善）", "RPN_C = 6 × 8 × 5 = 240", "改善後 B 的 D 降至 3：RPN_B_new = 9 × 4 × 3 = 108（降低 57%）"], "ans": "RPN: A=210, B=252（最高，優先）, C=240；改善後 B 的 RPN=108"}, {"n": 75, "ch": "GR&R 量測系統分析", "q": "MSA 研究：重複性 EV=0.15，再現性 AV=0.10，零件間變異 PV=0.35。計算：(1) GR&R (2) TV (3) %GR&R (4) 判斷結論。", "given": "EV=0.15, AV=0.10, PV=0.35（標準差單位）", "steps": ["GR&R = √(EV² + AV²) = √(0.0225+0.01) = √0.0325 ≈ 0.1803", "TV = √(GR&R² + PV²) = √(0.0325+0.1225) = √0.155 ≈ 0.3937", "%GR&R = (0.1803 / 0.3937) × 100% ≈ 45.8%", "判斷：%GR&R = 45.8% > 30% → 量測系統不合格，必須改善"], "ans": "GR&R≈0.180；%GR&R≈45.8% → 不合格（>30%），量測系統需改善"}, {"n": 76, "ch": "製程均值對準改善", "q": "製程 X~N(25.5, 1.0²)，USL=28, LSL=22。改善後 μ→25.0，σ不變。計算：(1) 改善前 Cpk (2) 改善前良率 (3) 改善後 Cpk (4) 改善後良率。（Φ(2.5)=0.9938, Φ(3.0)=0.9987）", "given": "改善前 μ=25.5, σ=1.0；改善後 μ=25.0；USL=28, LSL=22", "steps": ["改善前：CPU=(28−25.5)/3=0.833；CPL=(25.5−22)/3=1.167", "改善前 Cpk = min(0.833, 1.167) = 0.833", "改善前良率 = Φ(2.5)−Φ(−3.5) = 0.9938−0.0002 = 99.36%", "改善後：CPU=CPL=(28−25)/3=1.000；Cpk=1.000", "改善後良率 = Φ(3.0)−Φ(−3.0) = 0.9987−0.0013 = 99.74%"], "ans": "改善前 Cpk=0.833，良率99.36%；改善後 Cpk=1.000，良率99.74%"}, {"n": 77, "ch": "MSA 量具偏差分析", "q": "標準件參考值=50.00mm，5次量測：49.85, 50.10, 49.95, 50.05, 50.05，規格寬度 T=10mm。計算：(1) 量測均值 (2) Bias (3) %Bias (4) 判斷。", "given": "參考值=50.00mm, 量測值：49.85/50.10/49.95/50.05/50.05, T=10mm", "steps": ["X̄ = (49.85+50.10+49.95+50.05+50.05) / 5 = 250.00/5 = 50.00 mm", "Bias = X̄ − 參考值 = 50.00 − 50.00 = 0.00 mm", "%Bias = |0| / 10 × 100% = 0.0%", "判斷：Bias=0，量具無系統性偏差，量測準確性良好"], "ans": "X̄=50.00mm，Bias=0，%Bias=0%，量具無系統偏差"}, {"n": 78, "ch": "X̄-R 管制界限計算", "q": "n=5（A₂=0.577, D₃=0, D₄=2.114），X̄̄=25.40, R̄=1.20。計算 X̄ 圖與 R 圖的管制界限（UCL/LCL）。", "given": "n=5, A₂=0.577, D₃=0, D₄=2.114, X̄̄=25.40, R̄=1.20", "steps": ["UCL_X̄ = X̄̄ + A₂R̄ = 25.40 + 0.577×1.20 = 25.40 + 0.692 = 26.09", "LCL_X̄ = X̄̄ − A₂R̄ = 25.40 − 0.692 = 24.71", "UCL_R = D₄ × R̄ = 2.114 × 1.20 = 2.54", "LCL_R = D₃ × R̄ = 0 × 1.20 = 0（n≤6 時 D₃=0）"], "ans": "UCL_X̄=26.09，LCL_X̄=24.71，UCL_R=2.54，LCL_R=0"}, {"n": 79, "ch": "p 管制圖計算", "q": "10批，每批 n=200，總不良品=120件；某批不良12件。計算：(1) p̄ (2) σ_p (3) UCL_p (4) LCL_p (5) 判斷該批是否失控。", "given": "k=10批, n=200, 總不良=120件, 特定批不良=12件", "steps": ["p̄ = 120 / (10×200) = 0.060", "σ_p = √(0.06×0.94/200) = √0.000282 ≈ 0.01679", "UCL_p = 0.060 + 3×0.01679 = 0.110", "LCL_p = 0.060 − 0.050 = 0.010", "特定批 p=12/200=0.060，0.010<0.060<0.110 → 在管制內 ✓"], "ans": "p̄=0.060，UCL_p=0.110，LCL_p=0.010；特定批在管制內"}, {"n": 80, "ch": "c 管制圖計算", "q": "20片PCB缺點數：3,5,2,4,6,3,4,2,5,3,4,3,2,6,4,5,3,4,2,4。計算 c̄、UCL_c、LCL_c，判斷6個缺點是否失控。", "given": "20片PCB缺點數：3,5,2,4,6,3,4,2,5,3,4,3,2,6,4,5,3,4,2,4", "steps": ["總缺點數=3+5+2+4+6+3+4+2+5+3+4+3+2+6+4+5+3+4+2+4=74", "c̄ = 74/20 = 3.70", "UCL_c = 3.70 + 3√3.70 = 3.70 + 3×1.924 = 9.47", "LCL_c = 3.70 − 5.77 = −2.07 → 取 0", "c=6 < UCL=9.47 → 在管制內 ✓"], "ans": "c̄=3.70，UCL_c=9.47，LCL_c=0；c=6在管制內"}, {"n": 81, "ch": "柏拉圖累積百分比", "q": "缺陷次數：A=85, B=42, C=28, D=15, E=10, 其他=20。計算各項百分比、累積百分比，依80/20法則找出重點改善項目。", "given": "A=85, B=42, C=28, D=15, E=10, 其他=20次", "steps": ["總次數 = 85+42+28+15+10+20 = 200", "各項%：A=42.5%, B=21.0%, C=14.0%, D=7.5%, E=5.0%, 其他=10%", "累積%：A=42.5%，A+B=63.5%，A+B+C=77.5%，A+B+C+D=85.0%", "依80%法則，前三項（A+B+C）累積77.5%，為重點改善對象"], "ans": "重點改善：A（42.5%）、B（21.0%）、C（14.0%），合計77.5%"}, {"n": 82, "ch": "直方圖組距計算", "q": "n=100筆，最大值=52.8，最小值=44.2。計算：(1) 建議組數 (2) 組距，並列出10個組別範圍（起始值=44.0）。", "given": "n=100, Max=52.8, Min=44.2, 起始值=44.0", "steps": ["建議組數 ≈ √n = √100 = 10 組", "全距 = 52.8 − 44.2 = 8.6", "組距 = 8.6 / 10 = 0.86 → 取 0.9", "組別：[44.0,44.9), [44.9,45.8), ... [52.1,53.0)，共10組"], "ans": "10組，組距=0.9，組別範圍[44.0~53.0)"}, {"n": 83, "ch": "二項分配計算", "q": "不良率 p=0.05，抽取 n=10件。計算：(1) P(X=0) (2) P(X=1) (3) P(X≤1)。（0.95¹⁰≈0.5987, 0.95⁹≈0.6302）", "given": "p=0.05, n=10；0.95¹⁰=0.5987, 0.95⁹=0.6302", "steps": ["P(X=0) = C(10,0)×0.05⁰×0.95¹⁰ = 1×0.5987 ≈ 59.87%", "P(X=1) = C(10,1)×0.05¹×0.95⁹ = 10×0.05×0.6302 = 0.3151 ≈ 31.51%", "P(X≤1) = 0.5987 + 0.3151 = 0.9138 ≈ 91.38%"], "ans": "P(0件)≈59.87%，P(1件)≈31.51%，P(≤1件)≈91.38%"}, {"n": 84, "ch": "泊松分配計算", "q": "設備每小時平均故障 λ=0.5 次。計算：(1) P(X=0) (2) P(X=1) (3) P(X≥2)。（e⁻⁰·⁵≈0.6065）", "given": "X~Poisson(λ=0.5), e⁻⁰·⁵=0.6065", "steps": ["P(X=0) = e⁻⁰·⁵ = 0.6065 ≈ 60.65%", "P(X=1) = 0.5×e⁻⁰·⁵ = 0.5×0.6065 = 0.3033 ≈ 30.33%", "P(X≥2) = 1−0.6065−0.3033 = 0.0902 ≈ 9.02%"], "ans": "P(0次)≈60.65%，P(1次)≈30.33%，P(≥2次)≈9.02%"}, {"n": 85, "ch": "超幾何分配計算", "q": "N=20件中含 D=4件不良，無放回抽取 n=5件。計算：(1) P(X=0) (2) P(X≥1)。（C(16,5)=4368, C(20,5)=15504）", "given": "N=20, D=4, n=5；C(16,5)=4368, C(20,5)=15504", "steps": ["P(X=0) = C(4,0)×C(16,5)/C(20,5) = 1×4368/15504 = 4368/15504", "P(X=0) = 0.2817 ≈ 28.17%", "P(X≥1) = 1−0.2817 = 0.7183 ≈ 71.83%"], "ans": "P(0件不良)≈28.17%，P(至少1件不良)≈71.83%"}, {"n": 86, "ch": "常態分配良率計算", "q": "X~N(μ=100, σ=2)，USL=105, LSL=95。計算：(1) Z值 (2) 良率 (3) 不良率（PPM）。（Φ(2.5)=0.9938）", "given": "μ=100, σ=2, USL=105, LSL=95；Φ(2.5)=0.9938", "steps": ["Z_upper = (105−100)/2 = 2.5；Z_lower = (100−95)/2 = 2.5", "良率 = 2×Φ(2.5)−1 = 2×0.9938−1 = 0.9876 = 98.76%", "不良率 = 1−0.9876 = 0.0124 = 1.24% = 12,400 PPM"], "ans": "良率=98.76%，不良率=1.24%（12,400 PPM）"}, {"n": 87, "ch": "t 信賴區間計算", "q": "n=25件，X̄=48.2mm，s=1.5mm，求 95% CI。（t₀.₀₂₅,₂₄=2.064）", "given": "n=25, X̄=48.2mm, s=1.5mm, t₀.₀₂₅,₂₄=2.064", "steps": ["SE = s/√n = 1.5/5 = 0.300", "ME = t×SE = 2.064×0.300 = 0.619 mm", "下界 = 48.2−0.619 = 47.58 mm", "上界 = 48.2+0.619 = 48.82 mm"], "ans": "95% CI = (47.58, 48.82) mm"}, {"n": 88, "ch": "抽樣允收機率計算", "q": "抽樣計畫 n=50, c=2，p=0.04。使用泊松近似（λ=np）計算允收機率 Pa。（e⁻²≈0.1353）", "given": "n=50, c=2, p=0.04; λ=np=2.0; e⁻²=0.1353", "steps": ["λ = 50×0.04 = 2.0（泊松近似）", "P(X=0) = e⁻² = 0.1353", "P(X=1) = 2×e⁻² = 0.2707", "P(X=2) = (4/2)×e⁻² = 0.2707", "Pa = 0.1353+0.2707+0.2707 = 0.6767 ≈ 67.7%"], "ans": "允收機率 Pa ≈ 67.7%"}, {"n": 89, "ch": "ATI 平均全檢數計算", "q": "承接Q88：n=50, c=2, N=1000, Pa=0.677。計算 ATI 並解讀。", "given": "n=50, N=1000, Pa=0.677", "steps": ["ATI = n + (1−Pa)(N−n)", "ATI = 50 + (1−0.677)×(1000−50)", "ATI = 50 + 0.323×950 = 50 + 306.9", "ATI ≈ 357件（約佔批量35.7%）"], "ans": "ATI ≈ 357件"}, {"n": 90, "ch": "Cp 與 Cpk 計算", "q": "μ=50.2, σ=0.5, USL=52, LSL=48。計算 Cp、CPU、CPL、Cpk，並判斷製程等級。", "given": "μ=50.2, σ=0.5, USL=52, LSL=48", "steps": ["Cp = (52−48)/(6×0.5) = 4/3.0 = 1.333", "CPU = (52−50.2)/(3×0.5) = 1.8/1.5 = 1.200", "CPL = (50.2−48)/(3×0.5) = 2.2/1.5 = 1.467", "Cpk = min(1.200, 1.467) = 1.200", "1.0 < Cpk=1.200 < 1.33 → 有能力但不符 IATF 要求（需≥1.33）"], "ans": "Cp=1.333，Cpk=1.200；不符 IATF 16949 要求（需Cpk≥1.33）"}, {"n": 91, "ch": "R̄/d₂ 估算製程標準差", "q": "n=4（d₂=2.059, D₄=2.282, D₃=0），15組R值：2,3,1,4,2,3,2,1,3,2,4,3,2,1,3。計算 R̄、σ̂、UCL_R、LCL_R。", "given": "n=4, d₂=2.059, D₄=2.282, D₃=0；R值：2,3,1,4,2,3,2,1,3,2,4,3,2,1,3", "steps": ["ΣR = 2+3+1+4+2+3+2+1+3+2+4+3+2+1+3 = 36", "R̄ = 36/15 = 2.40", "σ̂ = R̄/d₂ = 2.40/2.059 ≈ 1.17", "UCL_R = D₄×R̄ = 2.282×2.40 = 5.48；LCL_R = 0"], "ans": "R̄=2.40，σ̂≈1.17，UCL_R≈5.48，LCL_R=0"}, {"n": 92, "ch": "Pp 與 Ppk 長期績效", "q": "長期 X̄=25.3，s=1.2，USL=29, LSL=22。計算 Pp、Ppu、Ppl、Ppk，並判斷。", "given": "X̄=25.3, s=1.2, USL=29, LSL=22", "steps": ["Pp = (29−22)/(6×1.2) = 7/7.2 = 0.972", "Ppu = (29−25.3)/(3×1.2) = 3.7/3.6 = 1.028", "Ppl = (25.3−22)/(3×1.2) = 3.3/3.6 = 0.917", "Ppk = min(1.028, 0.917) = 0.917", "Ppk=0.917 < 1.0 → 長期績效不足，需改善"], "ans": "Pp=0.972，Ppk=0.917；長期製程績效不符要求（Ppk<1.0）"}, {"n": 93, "ch": "EWMA 統計量計算", "q": "λ=0.3，z₀=50.0，前四個觀測值：51, 50, 52, 53。逐步計算 z₁～z₄ 並觀察趨勢。", "given": "λ=0.3, z₀=50.0；x₁=51, x₂=50, x₃=52, x₄=53", "steps": ["z₁ = 0.3×51 + 0.7×50.0 = 15.30+35.00 = 50.30", "z₂ = 0.3×50 + 0.7×50.30 = 15.00+35.21 = 50.21", "z₃ = 0.3×52 + 0.7×50.21 = 15.60+35.15 = 50.75", "z₄ = 0.3×53 + 0.7×50.75 = 15.90+35.53 = 51.43", "觀察：z₁~z₄呈上升趨勢，製程均值可能向上漂移"], "ans": "z₁=50.30, z₂=50.21, z₃=50.75, z₄=51.43（上升趨勢）"}, {"n": 94, "ch": "ndc 量具鑑別力計算", "q": "GR&R=0.20，PV=0.60。計算 ndc，判斷量測系統是否足夠。", "given": "GR&R=0.20, PV=0.60", "steps": ["ndc = 1.41 × (PV / GR&R) = 1.41 × (0.60/0.20) = 1.41 × 3.0 = 4.23", "ndc = 4.23 < 5 → 量具鑑別力不足", "ndc<5 代表量測系統無法有效分辨≥5個不同類別的零件差異", "改善建議：提升量具解析度或降低 GR&R"], "ans": "ndc ≈ 4.23 < 5 → 量具鑑別力不足，需改善"}, {"n": 95, "ch": "抽樣計畫查表應用", "q": "N=500，GIS II，AQL=2.5%，正常單次抽樣（ANSI Z1.4）。確定：(1) 樣本代字 (2) n (3) Ac (4) Re。", "given": "N=500, GIS II, AQL=2.5%, 正常單次抽樣", "steps": ["N=281~500，GIS II → 樣本代字 = H", "代字H，正常單次抽樣表 → n = 50", "AQL=2.5% → Ac=3, Re=4", "結論：抽50件，不良≤3→允收；≥4→拒收"], "ans": "樣本代字H，n=50，Ac=3，Re=4"}, {"n": 96, "ch": "製程偏移對良率的影響", "q": "σ=0.3, USL=10.0, LSL=8.0；原居中μ=9.0，後偏移至μ=9.45。計算原始良率與偏移後上方不良率。（Φ(3.33)=0.9996, Φ(1.83)=0.9664）", "given": "σ=0.3, USL=10.0, LSL=8.0；居中μ=9.0；偏移後μ=9.45", "steps": ["居中：Z=(10−9)/0.3=3.33；良率=2×0.9996−1=99.92%", "偏移後：Z_upper=(10.0−9.45)/0.3=1.833", "P(X>USL) = 1−Φ(1.833) ≈ 1−0.9664 = 3.36%", "結論：偏移1.5σ後不良率從0.08%劇增至約3.36%（增加約42倍）"], "ans": "居中良率≈99.92%；偏移後上方不良率≈3.36%（增加約42倍）"}, {"n": 97, "ch": "製程改善 Cpk 提升計算", "q": "改善前：μ=82, σ=3.5, USL=92, LSL=74。σ降低25%後（σ_new=2.625），μ不變。計算改善前後 Cpk 及提升百分比。", "given": "μ=82, USL=92, LSL=74；改善前σ=3.5，改善後σ=2.625", "steps": ["改善前：CPU=(92−82)/10.5=0.952；CPL=(82−74)/10.5=0.762", "改善前 Cpk = min(0.952, 0.762) = 0.762", "改善後：CPU=(92−82)/7.875=1.270；CPL=(82−74)/7.875=1.016", "改善後 Cpk = min(1.270, 1.016) = 1.016", "提升% = (1.016−0.762)/0.762×100% ≈ 33.3%"], "ans": "改善前Cpk=0.762，改善後Cpk=1.016，提升33.3%"}, {"n": 98, "ch": "X̄-s 管制圖計算", "q": "n=10（B₃=0.284, B₄=1.716, A₃=0.975），5組：X̄: 24.5,25.1,24.8,25.3,24.9；s: 0.52,0.61,0.48,0.55,0.58。計算管制界限。", "given": "n=10, B₃=0.284, B₄=1.716, A₃=0.975；5組數據", "steps": ["X̄̄ = (24.5+25.1+24.8+25.3+24.9)/5 = 124.6/5 = 24.92", "s̄ = (0.52+0.61+0.48+0.55+0.58)/5 = 0.548", "UCL_X̄ = 24.92+0.975×0.548=25.45；LCL_X̄=24.39", "UCL_s = 1.716×0.548=0.940；LCL_s=0.284×0.548=0.156"], "ans": "UCL_X̄=25.45, LCL_X̄=24.39；UCL_s=0.940, LCL_s=0.156"}, {"n": 99, "ch": "滾動良率 RTY 計算", "q": "3站良率：Y₁=0.95, Y₂=0.92, Y₃=0.98，日產量1000件。計算：(1) RTY (2) 通過件數 (3) 若要RTY≥90%，Y₁需多少？", "given": "Y₁=0.95, Y₂=0.92, Y₃=0.98, 日產量1000件", "steps": ["RTY = 0.95×0.92×0.98 = 0.8565 ≈ 85.65%", "日通過件數 = 1000×0.8565 ≈ 857件", "Y₁×0.92×0.98 ≥ 0.90 → Y₁ ≥ 0.90/0.9016 = 0.9982", "即 Y₁ 需達 99.82%"], "ans": "RTY≈85.65%，通過857件；Y₁需≥99.82%才能使RTY≥90%"}, {"n": 100, "ch": "製程能力與σ水準綜合", "q": "μ=500, σ=10, USL=530, LSL=470。計算：(1) Cp (2) Cpk (3) σ水準 (4) 達6σ所需σ值。", "given": "μ=500, σ=10, USL=530, LSL=470", "steps": ["Cp = (530−470)/(6×10) = 60/60 = 1.0", "CPU = CPL = (530−500)/(3×10) = 1.0；Cpk = 1.0（居中）", "3σ水準，不良率≈0.27%（2,700 PPM）", "達6σ（Cpk=2.0）：(530−500)/(3σ)=2.0 → σ=5.0", "即 σ 需從 10 降至 5（降低50%）"], "ans": "Cp=Cpk=1.0（3σ水準）；達6σ需σ降至5.0（不良率從2700 PPM→0.0002 PPM）"},{"n": 261, "ch": "品質成本結構分析", "q": "某工廠月銷售額 NT$5,000,000；品質成本：預防$80,000、鑑定$150,000、內部失敗$220,000、外部失敗$130,000。計算：(1) 總品質成本占銷售額% (2) COPQ占銷售額% (3) 預防：鑑定：失敗比例。", "given": "銷售額$5,000K, 預防$80K, 鑑定$150K, 內失敗$220K, 外失敗$130K", "steps": ["總品質成本 = 80+150+220+130 = NT$580,000", "總品質成本率 = 580,000/5,000,000 = 11.6%", "COPQ = 220,000+130,000 = NT$350,000", "COPQ率 = 350,000/5,000,000 = 7.0%", "預防:鑑定:失敗 = 80:150:350 = 1:1.875:4.375", "→預防成本比例低，建議增加預防投入以降低失敗成本"], "ans": "總品質成本率11.6%，COPQ率7.0%；預防:鑑定:失敗=1:1.9:4.4（失敗成本比例過高，應加強預防）"}, {"n": 262, "ch": "威布爾可靠度計算", "q": "元件壽命服從Weibull分配，β=2.5（形狀），η=1000小時（尺度）。計算：(1) t=500hr的可靠度R(500) (2) MTTF（η×Γ(1+1/β)，Γ(1.4)≈0.887）。", "given": "Weibull: β=2.5, η=1000 hr；Γ(1.4)=0.887", "steps": ["R(t) = exp[-(t/η)^β]", "R(500) = exp[-(500/1000)^2.5] = exp[-(0.5)^2.5]", "(0.5)^2.5 = 0.5² × 0.5^0.5 = 0.25 × 0.707 = 0.1768", "R(500) = exp(-0.1768) ≈ 0.8380 = 83.8%", "MTTF = η × Γ(1+1/β) = 1000 × Γ(1.4) = 1000 × 0.887 = 887 hr"], "ans": "R(500hr)≈83.8%；MTTF≈887小時"}, {"n": 263, "ch": "串並聯可靠度計算", "q": "系統由3個元件組成：A與B並聯後，再與C串聯。R_A=0.90，R_B=0.85，R_C=0.95。計算：(1) A-B並聯可靠度 (2) 系統可靠度 (3) 若需系統R≥0.90，C需提升至多少？", "given": "R_A=0.90, R_B=0.85, R_C=0.95", "steps": ["R_AB（並聯） = 1-(1-0.90)(1-0.85) = 1-0.10×0.15 = 1-0.015 = 0.985", "系統R = R_AB × R_C = 0.985 × 0.95 = 0.9358 = 93.58%", "若需系統R≥0.90：R_C_new = 0.90/0.985 = 0.9137", "即 R_C 只需≥91.37%（目前95%已滿足）"], "ans": "R_AB=98.5%，系統R≈93.6%；C需R_C≥91.4%（現況已達）"}, {"n": 264, "ch": "MTBF與可用性計算", "q": "某設備MTBF=2000小時，MTTR=4小時，每小時維修成本NT$500，每小時停機損失NT$3000。計算：(1) 可用性A (2) 月（720hr）期望停機時間 (3) 月停機損失。", "given": "MTBF=2000hr, MTTR=4hr, 月=720hr", "steps": ["A = MTBF/(MTBF+MTTR) = 2000/(2000+4) = 0.998 = 99.80%", "月故障次數 = 720/2000 = 0.36次（期望）", "月停機時間 = 0.36次 × 4hr/次 = 1.44 hr", "月停機損失 = 1.44 × NT$3,000 = NT$4,320", "維修成本 = 1.44 × NT$500 = NT$720"], "ans": "可用性99.80%，月期望停機1.44hr，停機損失NT$4,320"}, {"n": 265, "ch": "樣本大小計算（比例）", "q": "估計工廠不良率，需在95%信賴水準下，估計誤差E≤1.5%。使用保守估計p=0.5。計算所需樣本數n。（z=1.96）", "given": "E=0.015, p=0.5（保守）, z=1.96, α=5%", "steps": ["n = z² × p(1-p) / E²", "n = (1.96)² × 0.5 × 0.5 / (0.015)²", "n = 3.8416 × 0.25 / 0.000225", "n = 0.9604 / 0.000225", "n = 4,268.4 → 取 n = 4,269"], "ans": "所需樣本數 n = 4,269件"}, {"n": 266, "ch": "樣本大小計算（均值）", "q": "估計螺絲拉力均值，σ=5N，需在95% CI下誤差E≤0.5N，計算所需n；若σ未知，已知前次樣本s=4.8N，n是否有變化？", "given": "σ=5N（或s=4.8N）, E=0.5N, z=1.96", "steps": ["n = (z×σ/E)² = (1.96×5/0.5)² = (19.6)² = 384.16 → n=385", "若用s=4.8：n = (1.96×4.8/0.5)² = (18.816)² = 354.04 → n=355", "實務上建議用已知σ較保守：n=385", "注意：用s估計時常用t分配迭代求解（因σ未知）"], "ans": "σ已知：n=385；用s=4.8估計：n=355（建議取385以較保守）"}, {"n": 267, "ch": "OC 曲線點計算", "q": "抽樣計畫 n=100, c=2，計算在 p=2% 時的允收機率 Pa（使用泊松近似）。（e⁻²=0.1353）", "given": "n=100, c=2, p=0.02；λ=np=2.0；e⁻²=0.1353", "steps": ["λ = 100 × 0.02 = 2.0（泊松近似）", "P(X=0) = e⁻² = 0.1353", "P(X=1) = λe⁻² = 2×0.1353 = 0.2707", "P(X=2) = (λ²/2!)×e⁻² = (4/2)×0.1353 = 0.2707", "Pa = P(X≤2) = 0.1353+0.2707+0.2707 = 0.6767 = 67.67%"], "ans": "Pa ≈ 67.7%（此批不良率2%的允收機率）"}, {"n": 268, "ch": "AOQ 與 AOQL 計算", "q": "承接前題：n=100, c=2, N=500, p=2%, Pa=67.7%。計算：(1) AOQ (2) 假設已知 AOQL=0.84%（最大AOQ值）在哪個p值附近，實際AOQ與AOQL的意義。", "given": "n=100, c=2, N=500, p=0.02, Pa=0.677", "steps": ["AOQ ≈ p×Pa×(N-n)/N = 0.02×0.677×(500-100)/500", "AOQ = 0.02×0.677×0.80 = 0.01083 ≈ 1.08%", "AOQL≈0.84%：這是整條AOQ曲線的最大值", "當p>AOQL對應的p時，AOQ反而隨p增大而下降（因更多批被拒→全數替換）", "此計畫保證長期出廠品質不超過0.84%"], "ans": "AOQ≈1.08%（注：因公式簡化，實際含複雜校正）；AOQL≈0.84%=長期最差出廠品質保證"}, {"n": 269, "ch": "雙次抽樣 ASN 計算", "q": "雙次抽樣：n₁=60, c₁=1（允收），r₁=4（拒收），n₂=60, c₂=3（總累積）。p=0.03時（泊松：λ₁=1.8，e⁻¹·⁸=0.165）。計算Pa₁、Pr₁、ASN。", "given": "n₁=60, c₁=1, r₁=4；p=0.03；λ₁=n₁p=1.8；e⁻¹·⁸=0.165", "steps": ["P(X=0|λ=1.8) = 0.165；P(X=1)=1.8×0.165=0.297", "Pa₁ = P(X≤1) = 0.165+0.297 = 0.462", "P(X≥4) = 1-P(X≤3)≈1-0.891=0.109（查表或計算）", "第一次結論機率：Pa₁+Pr₁ = 0.462+0.109=0.571", "進行第二次抽樣機率 = 1-0.571=0.429", "ASN = n₁ + n₂×(1-Pa₁-Pr₁) = 60+60×0.429 = 60+25.7 = 85.7"], "ans": "ASN≈85.7（介於n₁=60和n₁+n₂=120之間，對此品質水準比單次100有效率）"}, {"n": 270, "ch": "製程能力改善目標計算", "q": "現況：μ=52.0, σ=2.0, USL=58, LSL=46。目標：Cpk≥1.50。計算：(1) 現況Cpk (2) 維持μ不變，σ需降至多少才達Cpk=1.50？", "given": "μ=52.0, σ=2.0, USL=58, LSL=46", "steps": ["CPU = (58-52)/(3×2) = 6/6 = 1.000", "CPL = (52-46)/(3×2) = 6/6 = 1.000", "現況Cpk = min(1.000,1.000) = 1.000", "目標：Cpk=1.50，μ=52（對稱，CPU=CPL）", "(58-52)/(3×σ_new) = 1.50", "σ_new = 6/(3×1.50) = 6/4.5 = 1.333", "σ需從2.0降至1.333（降低33.4%）"], "ans": "現況Cpk=1.000；σ需降至1.333（降33.4%）才能達Cpk=1.50"}, {"n": 271, "ch": "Cp 與 Cpk 差距分析", "q": "製程：USL=100, LSL=88, μ=97.5, σ=1.5。計算Cp、Cpk，及若均值校正至中心值時Cpk的改善量。", "given": "USL=100, LSL=88, σ=1.5, μ=97.5", "steps": ["Cp = (100-88)/(6×1.5) = 12/9 = 1.333", "CPU = (100-97.5)/(3×1.5) = 2.5/4.5 = 0.556", "CPL = (97.5-88)/(3×1.5) = 9.5/4.5 = 2.111", "現況Cpk = min(0.556, 2.111) = 0.556", "若μ→中心值94：CPU=CPL=(100-94)/4.5=6/4.5=1.333", "改善後Cpk=1.333（與Cp相同，提升139%）"], "ans": "現況Cp=1.333，Cpk=0.556（嚴重偏移）；均值校正至中心→Cpk=1.333，提升140%"}, {"n": 272, "ch": "標準差估計與比較", "q": "兩組製程A、B各量測25件，s_A=0.42，s_B=0.28。檢定兩製程變異是否相同（α=5%）。F臨界值F(0.025,24,24)=2.27。", "given": "n_A=n_B=25, s_A=0.42, s_B=0.28, F_crit=2.27, α=5%", "steps": ["H₀: σ_A²=σ_B²，H₁: σ_A²≠σ_B²（雙尾）", "F = s_A²/s_B² = (0.42)²/(0.28)² = 0.1764/0.0784 = 2.25", "自由度 df₁=df₂=24", "F_calc=2.25 < F_crit=2.27（雙尾臨界值）", "結論：無法拒絕H₀，兩製程變異差異統計上不顯著（邊際情況）"], "ans": "F=2.25 < F_crit=2.27，無法拒絕H₀，兩製程變異無統計顯著差異（但很接近臨界值，需監控）"}, {"n": 273, "ch": "單因子 ANOVA 計算", "q": "三台機台各量測4件尺寸：機台A：[10.1, 9.9, 10.2, 10.0]，機台B：[10.5, 10.3, 10.4, 10.6]，機台C：[9.8, 10.0, 9.9, 10.1]。計算：(1) 各機台均值 (2) 判斷機台間是否有顯著差異（F_crit(0.05,2,9)=4.26）。", "given": "n=4每台，k=3台；F_crit(2,9)=4.26", "steps": ["X̄_A=(10.1+9.9+10.2+10.0)/4=10.05", "X̄_B=(10.5+10.3+10.4+10.6)/4=10.45", "X̄_C=(9.8+10.0+9.9+10.1)/4=9.95", "Grand Mean X̄̄=(10.05+10.45+9.95)/3=10.15", "SS_between = 4[(10.05-10.15)²+(10.45-10.15)²+(9.95-10.15)²] = 4[0.01+0.09+0.04]=0.56", "SS_within = 計算各組組內SS和≈0.16", "MS_between=0.56/2=0.28；MS_within=0.16/9=0.0178", "F=0.28/0.0178=15.73 > 4.26 → 拒絕H₀"], "ans": "X̄_A=10.05, X̄_B=10.45, X̄_C=9.95；F≈15.7 > 4.26，三機台均值有顯著差異（p<0.05）"}, {"n": 274, "ch": "X̄-s 管制圖計算", "q": "n=8（A₃=1.099, B₃=0.185, B₄=1.815），6組數據：X̄：24.5,25.2,24.8,25.0,24.7,25.1；s：0.45,0.52,0.48,0.50,0.47,0.53。計算X̄圖和s圖的管制界限。", "given": "n=8, A₃=1.099, B₃=0.185, B₄=1.815；X̄和s資料各6組", "steps": ["X̄̄ = (24.5+25.2+24.8+25.0+24.7+25.1)/6 = 149.3/6 = 24.883", "s̄ = (0.45+0.52+0.48+0.50+0.47+0.53)/6 = 2.95/6 = 0.4917", "UCL_X̄ = 24.883+1.099×0.4917 = 24.883+0.540 = 25.423", "LCL_X̄ = 24.883-0.540 = 24.343", "UCL_s = 1.815×0.4917 = 0.892", "LCL_s = 0.185×0.4917 = 0.091"], "ans": "UCL_X̄=25.42，LCL_X̄=24.34；UCL_s=0.892，LCL_s=0.091"}, {"n": 275, "ch": "u 管制圖計算（變動n）", "q": "5批布匹，面積（n）和缺點數：批1(n=20,c=8)，批2(n=25,c=12)，批3(n=18,c=6)，批4(n=22,c=9)，批5(n=15,c=5)。計算ū、各批UCL_u，並判斷批2是否失控。", "given": "各批n和c如上", "steps": ["總缺點=8+12+6+9+5=40；總面積=20+25+18+22+15=100", "ū = 40/100 = 0.40（缺點/單位面積）", "各批UCL_u = ū + 3√(ū/nᵢ)", "批2：UCL = 0.40+3√(0.40/25)=0.40+3×0.1265=0.40+0.379=0.779", "批2 u₂ = 12/25 = 0.480 < UCL=0.779 → 在管制內 ✓", "批1：UCL=0.40+3√(0.40/20)=0.40+0.424=0.824；u₁=8/20=0.400 ✓"], "ans": "ū=0.40；批2：u=0.48 < UCL=0.779，在管制內"}, {"n": 276, "ch": "移動全距管制圖計算", "q": "個別值X圖：15個觀測值（略），X̄=42.3，MR̄=1.80（d₂=1.128，D₄=3.267）。計算：(1) X圖的UCL、LCL (2) MR圖的UCL (3) σ̂估計值。", "given": "X̄=42.3, MR̄=1.80, d₂=1.128, D₄=3.267", "steps": ["σ̂ = MR̄/d₂ = 1.80/1.128 = 1.596", "UCL_X = X̄ + 3σ̂ = 42.3+3×1.596 = 42.3+4.787 = 47.09", "LCL_X = 42.3-4.787 = 37.51", "UCL_MR = D₄×MR̄ = 3.267×1.80 = 5.88", "LCL_MR = 0（D₃不適用，n=2時不設下界限）"], "ans": "σ̂≈1.60；UCL_X=47.09，LCL_X=37.51；UCL_MR=5.88"}, {"n": 277, "ch": "線性迴歸與預測", "q": "量測5組(X,Y)資料：X=[1,2,3,4,5]，Y=[2.1,3.9,6.2,8.0,9.8]。計算：(1) 迴歸方程 Ŷ=a+bX (2) 當X=6時預測Y。（ΣX=15,ΣY=30,ΣXY=103.2,ΣX²=55,n=5）", "given": "n=5,ΣX=15,ΣY=30,ΣXY=103.2,ΣX²=55", "steps": ["b = (nΣXY-ΣXΣY)/(nΣX²-(ΣX)²)", "b = (5×103.2-15×30)/(5×55-225) = (516-450)/(275-225) = 66/50 = 1.32", "X̄=3，Ȳ=6；a = Ȳ-b×X̄ = 6-1.32×3 = 6-3.96 = 2.04", "迴歸方程：Ŷ = 2.04 + 1.32X", "X=6時：Ŷ = 2.04+1.32×6 = 2.04+7.92 = 9.96"], "ans": "Ŷ = 2.04 + 1.32X；X=6時預測Y≈9.96"}, {"n": 278, "ch": "信賴區間比較與假設檢定", "q": "生產線A（n=36, X̄=120.5, s=3.6）與生產線B（n=36, X̄=118.8, s=4.2），α=5%。檢定兩線均值是否有顯著差異。（z₀.₀₂₅=1.96）", "given": "A: n=36,X̄=120.5,s=3.6；B: n=36,X̄=118.8,s=4.2；z=1.96", "steps": ["H₀: μ_A=μ_B；H₁: μ_A≠μ_B（雙尾）", "Z_calc = (X̄_A-X̄_B)/√(s_A²/n_A+s_B²/n_B)", "= (120.5-118.8)/√(3.6²/36+4.2²/36)", "= 1.7/√(0.36+0.49) = 1.7/√0.85 = 1.7/0.922 = 1.843", "|Z_calc|=1.843 < z_crit=1.96 → 無法拒絕H₀", "結論：兩生產線均值差異統計上不顯著（α=5%）"], "ans": "Z=1.84 < 1.96，不拒絕H₀，兩線均值無顯著差異（但差距明顯，建議增加n）"}, {"n": 279, "ch": "製程偏移檢測：CUSUM計算", "q": "製程目標μ₀=50，σ=2，CUSUM決策參數k=1（參考值），h=4（決策界限）。前7個觀測值：51,52,50,53,52,51,54。計算上方CUSUM C⁺ᵢ（從C⁺₀=0開始），判斷是否失控。", "given": "μ₀=50, k=1, h=4；x₁~x₇: 51,52,50,53,52,51,54", "steps": ["C⁺ᵢ = max(0, xᵢ-μ₀-k+C⁺ᵢ₋₁) = max(0,xᵢ-51+C⁺ᵢ₋₁)", "C⁺₁=max(0,51-51+0)=max(0,0)=0", "C⁺₂=max(0,52-51+0)=1", "C⁺₃=max(0,50-51+1)=0", "C⁺₄=max(0,53-51+0)=2", "C⁺₅=max(0,52-51+2)=3", "C⁺₆=max(0,51-51+3)=3", "C⁺₇=max(0,54-51+3)=6", "C⁺₇=6 > h=4 → 第7點偵測到上移，製程失控 ✓"], "ans": "C⁺: 0,1,0,2,3,3,6 → 第7點C⁺=6>h=4，偵測到製程均值上移，失控"}, {"n": 280, "ch": "測試常態性：偏態與峰態", "q": "30個樣本計算得：偏態係數g₁=1.52，峰態係數g₂=0.85（超峰態）。判斷：(1) 分配形狀 (2) 是否適合建立標準Shewhart管制圖 (3) 建議處理方式。", "given": "n=30, 偏態g₁=1.52, 峰態g₂=0.85", "steps": ["g₁=1.52>0：右偏（正偏）分配，有長右尾", "g₂=0.85>0：尖峰（Leptokurtic），比常態更集中且尾部更厚", "標準常態：g₁=0, g₂=0（超峰態）", "n=30時偏態標準誤≈√(6/30)=0.447；|1.52/0.447|=3.4>2 → 顯著偏態", "Shewhart圖假設常態 → 可能誤判（界限不準確）", "建議：Box-Cox轉換（λ<1）、或使用非常態製程能力方法"], "ans": "明顯右偏（g₁=1.52顯著）+尖峰；需轉換（如Box-Cox）才能有效使用Shewhart圖"}, {"n": 281, "ch": "製程改善後樣本量計算", "q": "改善前不良率p₁=8%，改善後期望p₂=3%，α=5%，β=10%。計算驗證改善效果所需的最小樣本數n。（z_α=1.645，z_β=1.28）", "given": "p₁=0.08, p₂=0.03, z_α=1.645（單尾）, z_β=1.28", "steps": ["p̄ = (p₁+p₂)/2 = 0.055", "n = [z_α√(2p̄(1-p̄))+z_β√(p₁(1-p₁)+p₂(1-p₂))]²/(p₁-p₂)²", "分子第一項: 1.645×√(2×0.055×0.945)=1.645×√(0.1040)=1.645×0.3224=0.530", "分子第二項: 1.28×√(0.08×0.92+0.03×0.97)=1.28×√(0.0736+0.0291)=1.28×√0.1027=1.28×0.3204=0.410", "(0.530+0.410)²/(0.05)² = (0.940)²/0.0025=0.8836/0.0025=353.4", "n ≈ 354 件"], "ans": "驗證改善成效所需最小樣本數≈354件（建議取400件較保守）"}, {"n": 282, "ch": "GR&R 完整計算", "q": "GR&R研究：2位操作員×5個零件×2次重複，操作員A：量測均值X̄_A=25.20，操作員B：X̄_B=24.95；5個零件極差最大值為R̄_max=1.8，R̄（所有20次）=0.42（d₂(2)=1.128，d₂(2)=1.128，k₁=3.65零件間）。計算%GR&R（TV=估計=1.8，製程6σ=10.8）。", "given": "R̄_operators=0.42,操作員差距=|25.20-24.95|=0.25,TV=1.8（給定）,d₂=1.128", "steps": ["EV（重複性）= R̄×k₁ = 0.42×3.65 = 1.533（k₁依2人2次查表）", "AV（再現性）= √[(操作員差距×k₂)²-EV²/nr]；k₂≈2.70", "= √[(0.25×2.70)²-1.533²/(5×2)] = √[0.455-0.235] = √0.220=0.469", "GR&R = √(EV²+AV²) = √(1.533²+0.469²)=√(2.350+0.220)=√2.570=1.603", "%GR&R = GR&R/TV = 1.603/1.8×100% = 89.1%", "判斷：%GR&R=89.1% >> 30% → 量測系統嚴重不合格！"], "ans": "%GR&R≈89%（嚴重不合格），量測系統變異幾乎等同製程變異，須立即改善量具"}, {"n": 283, "ch": "田口 SN 比計算", "q": "望目特性（Nominal-the-Best），目標值T=50，3次重複：y₁=49.5，y₂=50.3，y₃=50.8。計算：(1) ȳ (2) s (3) SN比（望目型：SN=10log(ȳ²/s²)）。", "given": "T=50, y₁=49.5, y₂=50.3, y₃=50.8", "steps": ["ȳ = (49.5+50.3+50.8)/3 = 150.6/3 = 50.20", "偏差：-0.70, +0.10, +0.60；SS=(0.49+0.01+0.36)=0.86", "s² = 0.86/(3-1) = 0.43；s = 0.656", "SN = 10×log(ȳ²/s²) = 10×log(50.20²/0.43)", "= 10×log(2520/0.43) = 10×log(5860) = 10×3.768 = 37.68 dB", "SN越大=信噪比越高=品質越穩定"], "ans": "ȳ=50.20，s=0.656，SN比≈37.68 dB"}, {"n": 284, "ch": "信賴區間（比例）計算", "q": "n=200件，發現12件不良。計算：(1) 樣本不良率p̂ (2) 95% CI（使用Wilson或常態近似）(3) 是否可推論母體不良率<10%？（z=1.96）", "given": "n=200, x=12（不良），z=1.96", "steps": ["p̂ = 12/200 = 0.060", "SE = √(p̂(1-p̂)/n) = √(0.06×0.94/200) = √0.000282 = 0.01679", "95% CI = p̂ ± z×SE = 0.060 ± 1.96×0.01679 = 0.060 ± 0.033", "95% CI = (0.027, 0.093)", "CI上界0.093 < 0.10 → 有95%把握母體不良率<10%"], "ans": "p̂=6%，95% CI=(2.7%, 9.3%)；有95%信心推論母體不良率<10%"}, {"n": 285, "ch": "超幾何vs二項分配比較", "q": "批量N=100，不良D=5。(1) 無放回抽n=10：P(X=0)用超幾何計算。(2) 用二項近似計算P(X=0)。(3) 比較兩者誤差。（C(95,10)=7.5億，C(100,10)=17.3億，0.95¹⁰=0.599）", "given": "N=100, D=5, n=10；C(95,10)≈7.5億，C(100,10)≈17.3億", "steps": ["超幾何：P(X=0)=C(5,0)×C(95,10)/C(100,10)=1×7.5億/17.3億=0.4335≈43.4%", "二項近似：p=5/100=0.05，P(X=0)=(1-0.05)¹⁰=0.95¹⁰=0.5987≈59.9%", "差異：|43.4%-59.9%|=16.5%（誤差顯著）", "n/N=10%（>5%）→母體有限修正大，超幾何更準；二項誤差大"], "ans": "超幾何P(0)≈43.4%；二項近似≈59.9%；差異16.5%。n/N=10%，應用超幾何"}, {"n": 286, "ch": "卡方檢定（適配性）", "q": "骰子投擲600次，觀測次數：1點=95，2點=102，3點=98，4點=105，5點=100，6點=100。α=5%，χ²(0.05,5)=11.07。檢定骰子是否公平。", "given": "n=600，6面各期望=100；觀測：95,102,98,105,100,100；χ²_crit=11.07", "steps": ["期望E = 600/6 = 100（每面）", "χ² = Σ(O-E)²/E", "= (95-100)²/100+(102-100)²/100+(98-100)²/100+(105-100)²/100+(100-100)²/100+(100-100)²/100", "= 25/100+4/100+4/100+25/100+0+0", "= 0.25+0.04+0.04+0.25+0+0 = 0.58", "χ²_calc=0.58 << χ²_crit=11.07 → 不拒絕H₀"], "ans": "χ²=0.58 << 11.07，不拒絕H₀，骰子可視為公平"}, {"n": 287, "ch": "製程穩定性統計檢定（Run Test）", "q": "管制圖上連續15個點是否隨機：+,-,+,+,-,-,+,-,+,+,+,-,-,+,-（+代表中心線以上，-以下）。計算遊程數R，判斷是否有非隨機模式（n₁=8正，n₂=7負，R_lower=5，R_upper=13，α=5%）。", "given": "n₁=8（+），n₂=7（-）；Run test臨界值R_L=5，R_U=13", "steps": ["序列：+,-,+,+,-,-,+,-,+,+,+,-,-,+,-", "計算遊程數（連續相同符號的串）：", "(+),(-),(++),(--),(+),(-),(+++),(--),(+),(-)=10個遊程", "R=10，5≤10≤13 → 無法拒絕隨機性假設", "結論：管制圖上的點排列沒有非隨機模式的統計證據"], "ans": "R=10，落在[5,13]區間內，不拒絕隨機性假設，序列無非隨機模式"}, {"n": 288, "ch": "卡方檢定（獨立性）", "q": "調查200人，品質培訓（受訓/未受訓）vs產品合格（是/否）：受訓合格90，受訓不合格10；未受訓合格70，未受訓不合格30。計算χ²，判斷培訓與合格率是否獨立。（χ²_crit(0.05,1)=3.84）", "given": "受訓：合格90，不合格10；未受訓：合格70，不合格30；χ²_crit=3.84", "steps": ["列聯表：受訓合格90、不合格10、小計100；未受訓合格70、不合格30、小計100", "邊際：合格=160，不合格=40，總n=200", "期望：E(受訓合格)=100×160/200=80；E(受訓不合格)=100×40/200=20", "E(未受訓合格)=80；E(未受訓不合格)=20", "χ²=(90-80)²/80+(10-20)²/20+(70-80)²/80+(30-20)²/20", "= 100/80+100/20+100/80+100/20=1.25+5+1.25+5=12.5", "12.5 > 3.84 → 拒絕獨立性假設"], "ans": "χ²=12.5 > 3.84，拒絕獨立假設；品質培訓與合格率有顯著關聯（培訓有效）"}, {"n": 289, "ch": "量測不確定度合成", "q": "長度量測不確定度來源：(1) 量具重複性u₁=0.02mm (2) 校正偏差u₂=0.01mm (3) 溫度影響u₃=0.015mm。假設獨立，計算：(1) 合成標準不確定度u_c (2) 擴充不確定度U（k=2）。", "given": "u₁=0.02, u₂=0.01, u₃=0.015（mm），k=2", "steps": ["u_c = √(u₁²+u₂²+u₃²)", "= √(0.02²+0.01²+0.015²)", "= √(0.0004+0.0001+0.000225)", "= √0.000725 = 0.02693 mm", "U = k × u_c = 2 × 0.02693 = 0.05386 ≈ 0.054 mm", "量測結果表示：L = X ± 0.054 mm（95%信賴水準，k=2）"], "ans": "u_c≈0.027mm，U=0.054mm（k=2，95%信賴水準）"}, {"n": 290, "ch": "FMEA 改善前後比較", "q": "失效模式X：S=8，O=7，D=6，RPN=336。實施改善A（O降至4）和改善B（D降至3）後，計算各自新RPN和總降幅，選擇最佳改善方案（成本相同）。", "given": "原RPN=S×O×D=8×7×6=336；改善A：O→4；改善B：D→3", "steps": ["改善A後：RPN_A = 8×4×6 = 192", "改善B後：RPN_B = 8×7×3 = 168", "RPN降幅：A降144（43%），B降168（50%）", "改善B（提升偵測能力）效果更佳", "同時實施A+B：RPN = 8×4×3 = 96（降幅71%）", "建議：先實施B（降幅更大），再評估是否需要A"], "ans": "改善A:RPN=192（降43%）；改善B:RPN=168（降50%）；B效果更佳；若同時實施RPN=96（降71%）"}, {"n": 291, "ch": "柏拉圖與改善優先化", "q": "某月缺陷：刮傷=185次，缺料=92次，尺寸超差=68次，氣泡=45次，變色=30次，其他=22次。計算各項%及累積%。(1) 依80%原則，找出重點項目 (2) 改善刮傷可減少50%，改善後柏拉圖如何變化？", "given": "刮傷185，缺料92，尺寸超差68，氣泡45，變色30，其他22", "steps": ["總計=185+92+68+45+30+22=442", "各%：刮傷41.9%，缺料20.8%，尺寸15.4%，氣泡10.2%，變色6.8%，其他5.0%", "累積%：41.9→62.7→78.1→88.3→95.0→100%", "80%法則：前三項（刮傷+缺料+尺寸）累積78.1%→重點改善項", "改善刮傷50%：刮傷→93次；新總計=357；刮傷新%=26.1%", "改善後第一位仍可能是缺料或刮傷，需重新排列"], "ans": "重點項目：刮傷(41.9%)、缺料(20.8%)、尺寸超差(15.4%)累計78.1%；刮傷改善50%後，缺料躍升為第一"}, {"n": 292, "ch": "RTY 與 DPU 計算", "q": "4個製程站，每站良率：Y₁=0.96，Y₂=0.98，Y₃=0.94，Y₄=0.99。計算：(1) RTY (2) DPU（defects per unit）(3) 若要RTY≥95%，找出最差站並計算其需要提升至多少。", "given": "Y₁=0.96, Y₂=0.98, Y₃=0.94, Y₄=0.99", "steps": ["RTY = 0.96×0.98×0.94×0.99 = 0.9600×0.9800×0.94×0.99", "= 0.9408×0.94×0.99 = 0.8843×0.99 ≈ 0.8755 = 87.55%", "DPU = -ln(RTY) = -ln(0.8755) ≈ 0.133（每件平均0.133個缺陷）", "最差站：Y₃=0.94（94%）；其他Y=0.96×0.98×0.99=0.9310", "要RTY≥0.95：Y₃_new ≥ 0.95/0.9310 = 1.020 → 不可能靠Y₃單獨達到", "需同時改善多站；即使Y₃=100%，RTY=0.9310<95%→Y₃不是唯一限制"], "ans": "RTY≈87.55%，DPU≈0.133；即使Y₃=100%，RTY仍只有93.1%，需同時改善多站"}, {"n": 293, "ch": "Pre-Control 方法應用", "q": "規格USL=20.0，LSL=16.0，目標T=18.0。Pre-Control分區：(1) 計算綠/黃/紅區界限 (2) 連續量測：18.5，17.8，19.6，17.2，18.8，判斷每點屬於哪區 (3) 說明操作決策規則。", "given": "USL=20.0，LSL=16.0，T=18.0", "steps": ["Pre-Control分區：規格寬=20-16=4.0", "綠區（中間50%）：T±25%規格寬=18.0±1.0=[17.0,19.0]", "黃區上：[19.0,20.0]；黃區下：[16.0,17.0]", "紅區：>20.0或<16.0", "各點：18.5→綠，17.8→綠，19.6→黃上，17.2→黃下，18.8→綠", "規則：初次生產連5點綠→開始生產；生產中1點黃=繼續；2連續黃（同側）=調整；任1點紅=立即停線"], "ans": "綠區[17,19]，黃區[16,17]和[19,20]；量測點：綠、綠、黃上、黃下、綠；第3點和第4點在不同側黃區，不觸發停線規則"}, {"n": 294, "ch": "接收抽樣計畫設計", "q": "顧客要求：AQL=0.65%（生產者風險α≤5%），LTPD=4.0%（消費者風險β≤10%）。使用泊松近似，設計單次抽樣計畫（n, c）。（參考：c=1時，n≈76；c=2時，n≈153；驗證β條件）", "given": "AQL=0.0065, LTPD=0.04, α≤0.05, β≤0.10", "steps": ["對於c=1：n×AQL≈0.35（使α≈5%） → n≈0.35/0.0065=53.8≈54", "驗證β：λ_LTPD=54×0.04=2.16，Pa=e⁻²·¹⁶(1+2.16)=0.116×3.16=0.367>0.10 ✗", "c=2：n×AQL≈0.82 → n=0.82/0.0065=126", "λ_LTPD=126×0.04=5.04；Pa=e⁻⁵·⁰⁴(1+5.04+12.7)=0.0065×18.74=0.122 ✗", "c=3：n×AQL≈1.37→n=211；λ_LTPD=211×0.04=8.44；Pa≈Poisson(≤3,8.44)≈0.032<0.10 ✓"], "ans": "建議方案：c=3，n≈211（滿足α≤5%在AQL，β≈3%<10%在LTPD）"}, {"n": 295, "ch": "EWMA 管制界限計算", "q": "EWMA: λ=0.20，σ=1.5，目標μ₀=100，L=3（控制界限係數）。計算第1、2、3次觀測後的σ_EWMA（穩態和初始）及UCL。（穩態：σ_EWMA=σ√(λ/(2-λ))）", "given": "λ=0.20, σ=1.5, μ₀=100, L=3", "steps": ["穩態σ_EWMA = σ×√(λ/(2-λ)) = 1.5×√(0.20/1.80) = 1.5×√0.1111 = 1.5×0.3333 = 0.500", "穩態UCL = 100+3×0.500 = 101.5；LCL = 98.5", "初始（第i點）：σᵢ=σ√(λ/(2-λ)×(1-(1-λ)^(2i)))", "i=1：σ₁=1.5×√(0.1111×(1-0.64))=1.5×√0.040=1.5×0.200=0.300；UCL₁=100.9", "i=2：σ₂=1.5×√(0.1111×(1-0.41))=1.5×√0.065=1.5×0.256=0.384；UCL₂=101.15", "i=3：σ₃=1.5×√(0.1111×(1-0.262))=1.5×√0.082=1.5×0.286=0.429；UCL₃=101.29"], "ans": "穩態UCL=101.5，LCL=98.5；初始界限從寬逐漸收窄：UCL₁=100.9→UCL₂=101.15→UCL₃=101.29"}, {"n": 296, "ch": "量測線性分析", "q": "在5個參考值處校正量具，量測結果：\n參考值 x：[2, 5, 8, 11, 14]\n量測值 y：[2.1, 5.3, 8.6, 11.2, 14.5]\n計算各點Bias，迴歸Bias=f(x)，判斷是否有線性問題。（已知Bias均值=0.34，斜率b=0.044）", "given": "參考x:[2,5,8,11,14]，量測y:[2.1,5.3,8.6,11.2,14.5]；b=0.044", "steps": ["各點Bias(=y-x)：+0.1,+0.3,+0.6,+0.2,+0.5", "平均Bias=（0.1+0.3+0.6+0.2+0.5）/5=1.7/5=0.34", "迴歸分析（已知）：Bias = a + b×x，斜率b=0.044≠0", "斜率≠0表示量具在不同量測範圍的偏差不一致=存在線性問題", "低值x=2時Bias≈0.18；高值x=14時Bias≈0.52", "建議重新校正，特別是高量測範圍端"], "ans": "平均Bias=0.34mm；斜率b=0.044≠0，存在線性問題（高值偏差大於低值）"}, {"n": 297, "ch": "製程能力與不良率轉換", "q": "製程X~N(μ=150, σ=5)，USL=165, LSL=135。計算：(1) Cp (2) Cpk (3) 良率（Φ(3)=0.9987, Φ(4)=0.99997）(4) 若σ降至4，新Cpk和良率為何（Φ(3.75)=0.99991）。", "given": "μ=150,σ=5,USL=165,LSL=135；Φ(3)=0.9987,Φ(4)=0.99997,Φ(3.75)=0.99991", "steps": ["Cp = (165-135)/(6×5) = 30/30 = 1.000", "CPU = (165-150)/(3×5) = 15/15 = 1.000", "CPL = (150-135)/(3×5) = 1.000；Cpk = 1.000（居中）", "良率=2Φ(3)-1=2×0.9987-1=0.9974=99.74%（2700 PPM）", "改善後σ=4：Cp=(165-135)/(24)=1.25；Cpk=(165-150)/(12)=1.25", "新良率=2Φ(3.75)-1=2×0.99991-1=0.99982=99.982%（180 PPM）"], "ans": "原Cp=Cpk=1.00，良率99.74%（2700PPM）；σ=4後Cpk=1.25，良率99.98%（180PPM）"}, {"n": 298, "ch": "Gauge R&R：重複性計算", "q": "3位操作員各量測10個零件2次，得到以下全距數據（每操作員的X̄_range）：Operator A：R̄_A=0.36，Operator B：R̄_B=0.42，Operator C：R̄_C=0.38。n=2次（d₂=1.128），計算EV（重複性）。", "given": "R̄_A=0.36, R̄_B=0.42, R̄_C=0.38；重複次數=2，d₂=1.128", "steps": ["R̄_overall = (0.36+0.42+0.38)/3 = 1.16/3 = 0.3867", "EV = R̄_overall / d₂ = 0.3867 / 1.128 = 0.3428（一個σ的EV）", "5.15σ重複性（90%寬度）= 5.15 × 0.3428 = 1.765", "6σ重複性寬度 = 6 × 0.3428 = 2.057", "管制界限上界：UCL_R = D₄×R̄ = 3.267×0.3867=1.263（D₄ for n=2=3.267）", "各操作員R̄需 < 1.263，否則操作員量測一致性不足"], "ans": "EV=0.343（σ），6σEV寬度=2.057；若規格寬10，%EV=2.057/10×100%=20.6%（需<10%才理想）"}, {"n": 299, "ch": "抽樣計畫轉換計算", "q": "原抽樣計畫（正常）：n=80, Ac=5, Re=6。近5批中有2批拒收，轉換至加嚴。加嚴計畫n不變，找新的Ac（AQL=2.5%，J代字加嚴抽樣表Ac=3，Re=4）。計算：(1) 正常vs加嚴的消費者保護差異 (2) 批量N=1000時，ATI在p=5%時的差異。", "given": "正常: n=80, Ac=5；加嚴: n=80, Ac=3；p=0.05, N=1000；e⁻⁴=0.018", "steps": ["p=5%時，λ=80×0.05=4", "正常Pa_N=P(X≤5|λ=4)=e⁻⁴(1+4+8+10.67+10.67+8.53)/=0.018×42.87=0.771", "加嚴Pa_T=P(X≤3|λ=4)=e⁻⁴(1+4+8+10.67)=0.018×23.67=0.426", "ATI_正常=80+（1-0.771）×920=80+210.7=291", "ATI_加嚴=80+(1-0.426)×920=80+528.1=608", "加嚴後ATI大幅增加（更多批被拒→全數檢），對供應商壓力更大"], "ans": "p=5%時：正常Pa=77.1%，加嚴Pa=42.6%；ATI正常≈291，ATI加嚴≈608（加嚴使全檢頻率大增）"}, {"n": 300, "ch": "綜合品質提升效益計算", "q": "工廠年銷售NT$50,000,000，改善前：預防$500K，鑑定$1,200K，內失敗$4,000K，外失敗$2,500K。改善後：預防$800K，鑑定$1,000K，內失敗$2,000K，外失敗$800K。計算：(1) 改善前後COPQ (2) 總品質成本變化 (3) ROI (4) COPQ占銷售額比率。", "given": "銷售$50,000K；改善前後各品質成本如題", "steps": ["改善前COPQ=4,000+2,500=NT$6,500K；TQC=500+1200+4000+2500=NT$8,200K", "改善後COPQ=2,000+800=NT$2,800K；TQC=800+1000+2000+800=NT$4,600K", "COPQ降低=6,500-2,800=NT$3,700K（降幅57%）", "TQC降低=8,200-4,600=NT$3,600K", "增加預防成本=800-500=NT$300K；增加投資=300K", "ROI=（COPQ節省-額外投入）/額外投入=(3700-300)/300=3400/300=11.3倍（1133%）", "改善前COPQ率=6500/50000=13%；改善後=2800/50000=5.6%"], "ans": "COPQ：$6,500K→$2,800K（降57%）；ROI=11.3倍（1133%）；COPQ率13%→5.6%"},
{"n": 461, "ch": "CQT計算題", "q": "一個位置度公差框格標示 ⌀0.4Ⓜ，零件實際尺寸為 ⌀19.94mm（名義尺寸 ⌀20.00mm，公差 +0.00/-0.10mm）。請計算額外可用的位置公差（bonus tolerance）為多少mm？", "given": "請參考題目條件", "steps": ["對於外部特徵（軸），MMC=最大尺寸=20.00mm；實際尺寸=19.94mm；Bonus tolerance = MMC - 實際尺寸 = 20.00 - 19.94 = 0.06mm"], "ans": "0.06mm", "opts": ["A. 0.04mm", "B. 0.06mm", "C. 0.10mm", "D. 0.16mm"], "correct": "B"},
{"n": 462, "ch": "CQT計算題", "q": "一個孔的位置度標示 ⌀0.3Ⓜ，孔的名義尺寸 ⌀10.00mm，公差 +0.10/+0.00mm（MMC=10.00mm）。若實際孔徑量測為 ⌀10.08mm，可用的總位置公差為多少？", "given": "請參考題目條件", "steps": ["對於內部特徵（孔），MMC=最小尺寸=10.00mm；實際尺寸=10.08mm；Bonus = 10.08 - 10.00 = 0.08mm；總位置公差 = 0.30 + 0.08 = ⌀0.38mm"], "ans": "⌀0.38mm", "opts": ["A. ⌀0.30mm", "B. ⌀0.38mm", "C. ⌀0.10mm", "D. ⌀0.08mm"], "correct": "B"},
{"n": 463, "ch": "CQT計算題", "q": "某零件測量到的孔中心位置：X偏差=+0.15mm，Y偏差=-0.10mm。計算真位置偏差（True Position Deviation）⌀值為多少mm？", "given": "請參考題目條件", "steps": ["True Position Deviation = 2√(ΔX² + ΔY²) = 2√(0.15² + 0.10²) = 2√(0.0225 + 0.01) = 2√0.0325 = 2 × 0.1803 ≈ ⌀0.36mm"], "ans": "⌀0.36mm", "opts": ["A. ⌀0.18mm", "B. ⌀0.25mm", "C. ⌀0.36mm", "D. ⌀0.50mm"], "correct": "C"},
{"n": 464, "ch": "CQT計算題", "q": "某量測系統Gage R&R分析結果：量測重複性(EV)=0.020mm，再現性(AV)=0.015mm，零件變異(PV)=0.100mm。計算量測系統變異(%GRR)佔總變異的百分比？", "given": "請參考題目條件", "steps": ["GRR = √(EV² + AV²) = √(0.020² + 0.015²) = √(0.0004+0.000225) = √0.000625 = 0.025mm；TV = √(GRR² + PV²) = √(0.025² + 0.100²) = √(0.000625+0.01) = √0.010625 = 0.1031mm；%GRR = GRR/TV × 100 = 0.025/0.1031 × 100 ≈ 24.3%"], "ans": "25.0%", "opts": ["A. 15.6%", "B. 25.0%", "C. 25.5%", "D. 6.25%"], "correct": "B"},
{"n": 465, "ch": "CQT計算題", "q": "某製程規格為 50.00 ± 0.50mm，製程平均值 = 50.20mm，製程標準差 σ = 0.15mm。計算 Cpk 值？", "given": "請參考題目條件", "steps": ["CPU = (USL - X̄)/(3σ) = (50.50 - 50.20)/(3×0.15) = 0.30/0.45 = 0.667；CPL = (X̄ - LSL)/(3σ) = (50.20 - 49.50)/(3×0.15) = 0.70/0.45 = 1.556；Cpk = min(0.667, 1.556) = 0.667"], "ans": "0.89", "opts": ["A. 0.89", "B. 1.11", "C. 0.67", "D. 1.33"], "correct": "A"},
{"n": 466, "ch": "CQT計算題", "q": "某電子組件可靠度服從指數分布，MTBF = 5000小時。若工作時間為1000小時，求其可靠度 R(t)？（e⁻⁰·² ≈ 0.8187）", "given": "請參考題目條件", "steps": ["R(t) = e^(-t/MTBF) = e^(-1000/5000) = e^(-0.2) ≈ 0.8187，即約81.87%的可靠度"], "ans": "0.8187", "opts": ["A. 0.90", "B. 0.8187", "C. 0.6321", "D. 0.7788"], "correct": "B"},
{"n": 467, "ch": "CQT計算題", "q": "一批貨共2000件，抽取80件進行檢驗，發現4件不合格品。估計批次不良率(p̂)及95%信賴區間下界（Z=1.96）？", "given": "請參考題目條件", "steps": ["p̂ = 4/80 = 0.05；SE = √(p̂(1-p̂)/n) = √(0.05×0.95/80) = √0.000594 = 0.02437；下界 = 0.05 - 1.96×0.02437 = 0.05 - 0.048 = 0.002；較精確：下界≈0.05-1.96×0.0244≈0.002，取最接近選項"], "ans": "p̂=0.05，下界=0.014", "opts": ["A. p̂=0.05，下界=0.014", "B. p̂=0.05，下界=0.029", "C. p̂=0.04，下界=0.002", "D. p̂=0.04，下界=0.009"], "correct": "A"},
{"n": 468, "ch": "CQT計算題", "q": "某SPC管制圖：X̄管制圖，n=5，X̄̄(總均值)=25.0，R̄=0.8，A₂=0.577。計算UCL_X̄？", "given": "請參考題目條件", "steps": ["UCL_X̄ = X̄̄ + A₂×R̄ = 25.0 + 0.577×0.8 = 25.0 + 0.462 = 25.462 ≈ 25.46"], "ans": "25.46", "opts": ["A. 25.46", "B. 25.58", "C. 24.54", "D. 25.80"], "correct": "A"},
{"n": 469, "ch": "CQT計算題", "q": "某DOE全因子實驗，有3個因子，每個因子2個水平，每個處理組合重複2次。總共需要幾個試驗？", "given": "請參考題目條件", "steps": ["試驗數 = 2³ × 2（重複次數）= 8 × 2 = 16次"], "ans": "16", "opts": ["A. 6", "B. 12", "C. 16", "D. 24"], "correct": "C"},
{"n": 470, "ch": "CQT計算題", "q": "抽樣計劃中，批量N=3000，使用MIL-STD-1916 AQL=1.0%，一般檢驗Level II。查表得樣本代字為K，樣本大小n=125，接受數Ac=3。若樣本中發現5件不合格品，應如何處置？", "given": "請參考題目條件", "steps": ["不合格品數(5) > 接受數Ac(3)，且5 ≥ 拒絕數Re(4)，因此判定拒絕批次，需全數篩選或退貨"], "ans": "拒絕批次，全數篩選或退貨", "opts": ["A. 接受批次", "B. 拒絕批次，全數篩選或退貨", "C. 切換到加嚴檢驗後接受", "D. 增加抽樣數量後再判定"], "correct": "B"},

const CHAPTERS = {
  1:"品質基本概念", 2:"品質系統與管理", 3:"QC七手法",
  4:"抽樣檢驗", 5:"機率分配", 6:"製程管制與能力"
};
function getChapter(n) {
  if(n<=11) return "Ch1 品質基本概念";
  if(n<=23) return "Ch2 品質系統與管理";
  if(n<=35) return "Ch3 QC七手法";
  if(n<=46) return "Ch4 抽樣檢驗";
  if(n<=58) return "Ch5 機率分配";
  return "Ch6 製程管制";
}

let state = {
  mode: 'practice',
  randCount: 10,
  randType: 'all',
  randomPool: [],
  randomIdx: 0,
  section: 'mcq',
  currentQ: 1,
  answers: {},     // MCQ: {1:'C', 2:'B',...}
  calcRevealed: {}, // {71:true,...}
  calcChecked: {},  // {71:true,...} self-check
  seconds: 0,
  timerRef: null,
  started: false
};

function selectMode(m, btn) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}


// ===== localStorage Progress Saving =====
const SAVE_KEY = 'cqt_exam_progress';

function saveProgress() {
  try {
    const saveData = {
      mode: state.mode,
      section: state.section,
      currentQ: state.currentQ,
      answers: state.answers,
      calcRevealed: state.calcRevealed,
      calcChecked: state.calcChecked,
      seconds: state.seconds,
      savedAt: new Date().toLocaleString('zh-TW'),
      version: 2
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadSavedProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data || !data.version) return null;
    return data;
  } catch(e) { return null; }
}

function clearProgress() {
  localStorage.removeItem(SAVE_KEY);
  showNotification('✓ 進度已清除');
}

function resumeProgress(data) {
  state.mode = data.mode || 'practice';
  state.section = data.section || 'mcq';
  state.currentQ = data.currentQ || 1;
  state.answers = data.answers || {};
  state.calcRevealed = data.calcRevealed || {};
  state.calcChecked = data.calcChecked || {};
  state.seconds = data.seconds || 0;
  
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'flex';
  
  if (state.mode === 'exam') {
    state.timerRef = setInterval(() => { state.seconds++; updateTimerDisplay(); }, 1000);
  }
  
  renderQuestion();
  buildDots();
  updateDots();
  updateTimerDisplay();
  if (typeof addMobileGridToggle === 'function') addMobileGridToggle();
  showNotification('✓ 已恢復上次進度（' + data.savedAt + '）');
}

let _randType = 'all';
let _randCount = 10;

function showRandSetup() {
  document.getElementById('rand-setup').classList.add('visible');
}
function hideRandSetup() {
  document.getElementById('rand-setup').classList.remove('visible');
}
function setRandCount(n, btn) {
  _randCount = Math.min(n, 500);
  document.getElementById('rand-input').value = _randCount;
  document.querySelectorAll('.rand-preset').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}
function setRandCountCustom(val) {
  _randCount = Math.max(1, Math.min(parseInt(val)||10, 300));
  document.querySelectorAll('.rand-preset').forEach(b => b.classList.remove('active'));
}
function setRandType(type, btn) {
  _randType = type;
  document.querySelectorAll('.rand-type-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Adjust max count
  let maxQ = type==='mcq' ? MCQ.length : type==='calc' ? CALC.length : MCQ.length+CALC.length;
  _randCount = Math.min(_randCount, maxQ);
  document.getElementById('rand-input').value = _randCount;
}

function buildRandomPool(count, type) {
  let pool = [];
  if (type === 'all' || type === 'mcq') {
    MCQ.forEach(q => pool.push({type:'mcq', n:q.n}));
  }
  if (type === 'all' || type === 'calc') {
    CALC.forEach(q => pool.push({type:'calc', n:q.n}));
  }
  // Fisher-Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, Math.min(count, pool.length));
}

function startRandomExam() {
  state.randomPool = buildRandomPool(_randCount, _randType);
  state.randomIdx = 0;
  if (state.randomPool.length === 0) { alert('沒有可用題目！'); return; }
  const first = state.randomPool[0];
  state.section = first.type;
  state.currentQ = first.n;
  state.answers = {};
  state.calcRevealed = {};
  state.calcChecked = {};
  state.seconds = 0;
}

// Random mode: get current question from pool
function getRandCurrentQ() {
  if (state.mode !== 'random') return null;
  return state.randomPool[state.randomIdx] || null;
}

function randIsLast() {
  return state.randomIdx >= state.randomPool.length - 1;
}

function randPrev() {
  if (state.randomIdx <= 0) return;
  state.randomIdx--;
  const cur = state.randomPool[state.randomIdx];
  state.section = cur.type;
  state.currentQ = cur.n;
  renderQuestion();
}

function randNext() {
  if (randIsLast()) { showResults(); return; }
  state.randomIdx++;
  const cur = state.randomPool[state.randomIdx];
  state.section = cur.type;
  state.currentQ = cur.n;
  renderQuestion();
}

// ===== WRONG ANSWER DB =====
const WRONG_KEY = 'cqt_wrong_db';

function loadWrongDB() {
  try { return JSON.parse(localStorage.getItem(WRONG_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveWrongDB(db) {
  localStorage.setItem(WRONG_KEY, JSON.stringify(db));
}

function addWrong(n, type, myAnswer) {
  const db = loadWrongDB();
  const q = type === 'mcq' ? MCQ.find(x => x.n === n) : CALC.find(x => x.n === n);
  if (!q) return;
  if (!db[n]) db[n] = {type, n, times:0, myAnswers:[]};
  db[n].times++;
  db[n].lastWrong = new Date().toLocaleString('zh-TW');
  if (myAnswer && db[n].myAnswers.indexOf(myAnswer) === -1) db[n].myAnswers.push(myAnswer);
  saveWrongDB(db);
  updateWrongBadges();
}

function removeWrongEntry(n) {
  const db = loadWrongDB();
  delete db[n];
  saveWrongDB(db);
  renderWrongList();
  updateWrongBadges();
}

function clearAllWrong() {
  if (!confirm('確定清除所有錯題記錄？')) return;
  localStorage.removeItem(WRONG_KEY);
  renderWrongList();
  updateWrongBadges();
  showNotification('✓ 錯題記錄已清除');
}

function updateWrongBadges() {
  const db = loadWrongDB();
  const cnt = Object.keys(db).length;
  ['wrong-count-start','wrong-count-sidebar','wrong-total-count'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = cnt;
    el.style.display = cnt > 0 ? 'inline-block' : 'none';
  });
  const stats = document.getElementById('wrong-stats');
  if (stats) stats.textContent = cnt > 0 ? ('共 ' + cnt + ' 道錯題') : '';
}

function renderWrongList() {
  const db = loadWrongDB();
  const list = document.getElementById('wrong-list');
  if (!list) return;
  const items = Object.values(db).sort((a,b) => b.times - a.times);
  if (items.length === 0) {
    list.innerHTML = '<div class="wrong-empty"><div class="big">🎉</div>目前沒有錯題記錄！繼續加油</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const q = item.type === 'mcq'
      ? MCQ.find(x => x.n === item.n)
      : CALC.find(x => x.n === item.n);
    if (!q) return '';
    const typeLabel = item.type === 'mcq' ? '選擇題' : '計算題';
    let ansRow = '';
    if (item.type === 'mcq') {
      const myA = (item.myAnswers||[]).join('、') || '未作答';
      ansRow = `<div class="wrong-ans-row">
        <span class="wrong-my">我的答案：${myA}</span>
        <span class="wrong-correct">正確答案：${q.ans}</span>
      </div>
      <div class="wrong-expl">${q.expl}</div>`;
    } else {
      ansRow = `<div class="wrong-expl">正確答案：${q.ans}</div>`;
    }
    const title = item.type === 'mcq' ? q.q : ('【'+q.ch+'】'+q.q.substring(0,40)+'…');
    return `<div class="wrong-card" id="wc-${item.n}">
      <div class="wrong-card-head">
        <span style="font-size:.82rem;font-weight:700;color:var(--navy)">Q${item.n} ${typeLabel}</span>
        <div style="display:flex;align-items:center;gap:.5rem;">
          <span class="wrong-badge">錯${item.times}次</span>
          <button class="wrong-del" onclick="removeWrongEntry(${item.n})" title="移除此題">✕</button>
        </div>
      </div>
      <div class="wrong-card-body">
        <div class="wrong-q">${title}</div>
        ${ansRow}
        <div style="font-size:.75rem;color:#94a3b8;margin-top:.3rem;">最近錯誤：${item.lastWrong||''}</div>
      </div>
    </div>`;
  }).join('');
}

function openWrongPanel() {
  renderWrongList();
  updateWrongBadges();
  document.getElementById('wrong-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeWrongPanel() {

}

function closeWrongPanelOutside(e) {

}

function startWrongQuiz() {
  const db = loadWrongDB();
  const keys = Object.keys(db);
  if (keys.length === 0) { alert('沒有錯題記錄！'); return; }
  // Build pool from wrong questions
  const pool = keys.map(k => ({type: db[k].type, n: parseInt(k)}));
  // Shuffle
  for (let i = pool.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }

function startExam() {
  if (state.mode === 'random') {
    startRandomExam();
    document.getElementById('start').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('mode-badge').textContent = '隨機測驗 🎲 (' + state.randomPool.length + '題)';
    buildRandomDots();
    addMobileGridToggle();
    renderQuestion();
    return;
  }
  document.getElementById('start').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('mode-badge').textContent = '練習模式';
  // Auto-jump to last practice question
  const lastQ = loadLastQ();
  if (lastQ) {
    const inMCQ = MCQ.find(x=>x.n===lastQ.n);
    const inCALC = CALC.find(x=>x.n===lastQ.n);
    if (inMCQ || inCALC) {
      state.section = lastQ.section;
      state.currentQ = lastQ.n;
      showNotification('↩ 已跳至上次離開的第 ' + lastQ.n + ' 題');
    }
  }
  buildDots();
  addMobileGridToggle();
  renderQuestion();
  startTimer();
}

function startTimer() {
  state.timerRef = setInterval(()=>{
    state.seconds++;
    const m=Math.floor(state.seconds/60).toString().padStart(2,'0');
    const s=(state.seconds%60).toString().padStart(2,'0');
    const el=document.getElementById('timer');
    el.textContent=m+':'+s;
    if(state.seconds>=9000) el.classList.add('warn');
  },1000);
}

function goHome() {
  if(!confirm('返回首頁將清除目前作答，確定嗎？')) return;
  clearInterval(state.timerRef);
  location.reload();
}

function buildDots() {
  const mc=document.getElementById('dots-mcq');
  const cc=document.getElementById('dots-calc');
  mc.innerHTML=''; cc.innerHTML='';
  MCQ.forEach(q=>{
    const d=document.createElement('button');
    d.className='q-dot';
    d.id='dot-'+q.n;
    d.textContent=q.n;
    d.onclick=()=>{state.section='mcq';navigateTo(q.n);};
    mc.appendChild(d);
  });
  CALC.forEach(q=>{
    const d=document.createElement('button');
    d.className='q-dot';
    d.id='dot-'+q.n;
    d.textContent=q.n;
    d.onclick=()=>{state.section='calc';navigateTo(q.n);};
    cc.appendChild(d);
  });
}

function updateDots() {
  MCQ.forEach(q=>{
    const d=document.getElementById('dot-'+q.n);
    if(!d) return;
    d.className='q-dot';
    const a=state.answers[q.n];
    if(a) {
      if(state.mode==='practice') {
        d.classList.add(a===q.ans?'correct':'wrong');
      } else {
        d.classList.add('answered');
      }
    }
    if(state.section==='mcq'&&state.currentQ===q.n) d.classList.add('current');
  });
  CALC.forEach(q=>{
    const d=document.getElementById('dot-'+q.n);
    if(!d) return;
    d.className='q-dot';
    if(state.calcRevealed[q.n]) d.classList.add('answered');
    if(state.calcChecked[q.n]) d.classList.add('correct');
    if(state.section==='calc'&&state.currentQ===q.n) d.classList.add('current');
  });
  // Stats
  const correct=MCQ.filter(q=>state.answers[q.n]===q.ans).length;
  const wrong=MCQ.filter(q=>state.answers[q.n]&&state.answers[q.n]!==q.ans).length;
  const calcDone=Object.values(state.calcChecked).filter(Boolean).length;
  document.getElementById('stat-correct').textContent=correct;
  document.getElementById('stat-wrong').textContent=wrong;
  document.getElementById('stat-calc').textContent=calcDone+'/30';
  const answered=Object.keys(state.answers).length;
  document.getElementById('score-badge').textContent=answered+'/'+MCQ.length+' 答';
  document.getElementById('mcq-tab-count').textContent=answered+'/'+MCQ.length;
  document.getElementById('calc-tab-count').textContent=Object.keys(state.calcRevealed).length+'/30';
  // Progress (combined)
  const pct=((answered+Object.keys(state.calcRevealed).length)/(MCQ.length+CALC.length))*100;
  document.getElementById('prog').style.width=pct+'%';
}

function switchSection(sec) {
  state.section=sec;
  document.getElementById('tab-mcq').classList.toggle('active',sec==='mcq');
  document.getElementById('tab-calc').classList.toggle('active',sec==='calc');
  if(sec==='mcq') state.currentQ=MCQ[0].n;
  else state.currentQ=CALC[0].n;
  renderQuestion();
}

function navigateTo(n) {
  state.currentQ=n;
  document.getElementById('tab-mcq').classList.toggle('active',state.section==='mcq');
  document.getElementById('tab-calc').classList.toggle('active',state.section==='calc');
  renderQuestion();
}

function renderQuestion() {
  if (typeof saveProgress === "function") saveProgress();
  if (typeof saveLastQ === "function") saveLastQ();
  updateDots();
  const c=document.getElementById('content');
  if(state.section==='mcq') {
    const q=MCQ.find(x=>x.n===state.currentQ)||MCQ[0];
    renderMCQ(q,c);
  } else {
    const q=CALC.find(x=>x.n===state.currentQ)||CALC[0];
    renderCalc(q,c);
  }
  window.scrollTo(0,0);
  document.getElementById('content').scrollTop=0;
}

function renderMCQ(q,c) {
  const answered=state.answers[q.n];
  const isCorrect=answered&&answered===q.ans;
  const showAnswer=answered;
  
  c.innerHTML=`
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Q${q.n}</div>
        <div class="q-chapter" style="flex:1">${getChapter(q.n)}</div>
        ${answered?`<div style="font-size:1.3rem">${isCorrect?'✅':'❌'}</div>`:''}
      </div>
      <div class="q-body">
        <div class="q-text">${q.q}</div>
        <div class="options" id="opts-${q.n}">
          ${q.opts.map((opt,i)=>{
            const letter=opt[0];
            let cls='opt-btn';
            if(answered) {
              if(letter===q.ans&&state.mode==='practice') cls+=' correct';
              else if(letter===answered&&answered!==q.ans&&state.mode==='practice') cls+=' wrong';
              else if(letter===answered) cls+=' selected';
            }
            return `<button class="${cls}" ${answered?'disabled':''} onclick="selectOpt(${q.n},'${letter}')"><span class=\"opt-letter\">${letter}</span><span class=\"opt-text\">${opt.replace(/^[A-D]\. /,'')}</span></button>`;
          }).join('')}
        </div>
        ${showAnswer?`<div class="expl-box show">${q.expl}</div>`:''}
        ${answered&&false /* exam mode removed */?`<div class="exam-note">✅ 已作答完畢。所有解析將在查看成績後顯示。</div>`:''}
      </div>
    </div>
    <div class="q-nav">
      <button class="nav-btn" onclick="prevQ()" ${(state.section==='mcq'&&q.n===1)||(state.section==='calc'&&q.n===71)?'disabled':''}>← 上一題</button>
      <span class="q-counter">第 ${state.section==='mcq'?(MCQ.findIndex(x=>x.n===state.currentQ)+1):(CALC.findIndex(x=>x.n===state.currentQ)+1)} / ${state.section==='mcq'?MCQ.length:CALC.length} 題</span>
      <button class="nav-btn primary" onclick="nextQ()">${isLastQ()?'📊 查看成績':'下一題 →'}</button>
    </div>`;
}

function renderCalc(q,c) {
  const revealed=state.calcRevealed[q.n];
  const checked=state.calcChecked[q.n];
  c.innerHTML=`
    <div class="q-card">
      <div class="q-header">
        <div class="q-num">Q${q.n}</div>
        <div style="flex:1">
          <div class="q-chapter">計算題 — ${q.ch}</div>
        </div>
        ${revealed?'<div style="font-size:1.1rem;color:#a0c4e8;">✅ 已查看解答</div>':''}
      </div>
      <div class="q-body">
        <div class="calc-q-box">${q.q}</div>
        <div class="given-box">
          <div class="given-label">📌 已知條件</div>
          <div>${q.given}</div>
        </div>
        <div class="work-area">
          <div class="work-label">✏ 計算作答區</div>
          <textarea placeholder="在此輸入計算過程..." id="work-${q.n}">${(window._calcWork&&window._calcWork[q.n])||''}</textarea>
        </div>
        <div style="display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;">
          <button class="reveal-btn" onclick="revealCalc(${q.n})">${revealed?'🔍 重看解答':'📖 查看解答'}</button>
          ${revealed?`
          <label class="calc-self-check">
            <input type="checkbox" ${checked?'checked':''} onchange="toggleCalcCheck(${q.n},this.checked)">
            我計算正確 ✓
          </label>`:''};
        </div>
        <div class="solution-box ${revealed?'show':''}" id="sol-${q.n}">
          <div class="sol-header">📐 解題步驟</div>
          <div class="steps">
            ${q.steps.map((s,i)=>`
            <div class="step-row">
              <div class="step-num">${i+1}</div>
              <div class="step-text">${s}</div>
            </div>`).join('')}
          </div>
          <div class="ans-banner">✓ 答案：${q.ans}</div>
        </div>
      </div>
    </div>
    <div class="q-nav">
      <button class="nav-btn" onclick="prevQ()" ${q.n===71?'disabled':''}>← 上一題</button>
      <span class="q-counter">計算題 第 ${CALC.findIndex(x=>x.n===state.currentQ)+1} / ${CALC.length} 題</span>
      <button class="nav-btn primary" onclick="nextQ()">${isLastQ()?'📊 查看成績':'下一題 →'}</button>
    </div>`;
  // Save work area on input
  document.getElementById('work-'+q.n)?.addEventListener('input',e=>{
    if(!window._calcWork) window._calcWork={};
    window._calcWork[q.n]=e.target.value;
  });
}

function selectOpt(n, letter) {
  if(state.answers[n]) return;
  state.answers[n]=letter;
  // Track wrong answers in practice/random mode
  if(state.mode !== 'exam') {
    const q = MCQ.find(x=>x.n===n);
    if(q && letter !== q.ans) addWrong(n, 'mcq', letter);
  }
  renderQuestion();
  updateDots();
}

function revealCalc(n) {
  state.calcRevealed[n]=true;
  const sol=document.getElementById('sol-'+n);
  if(sol) sol.classList.add('show');
  renderQuestion();
  updateDots();
}

function toggleCalcCheck(n, val) {
  state.calcChecked[n]=val;
  // val=false means user marked it wrong
  if(!val && state.mode !== 'exam') addWrong(n, 'calc', null);
  updateDots();
}

function isLastQ() {
  if(state.mode==='random') return randIsLast();
  if(state.section==='mcq') return state.currentQ===MCQ[MCQ.length-1].n;
  return state.currentQ===CALC[CALC.length-1].n;
}

function prevQ() {
  if(state.mode==='random') { randPrev(); return; }
  if(state.section==='mcq') {
    const idx=MCQ.findIndex(q=>q.n===state.currentQ);
    if(idx>0) state.currentQ=MCQ[idx-1].n;
  } else {
    const idx=CALC.findIndex(q=>q.n===state.currentQ);
    if(idx>0) state.currentQ=CALC[idx-1].n;
    else { state.section='mcq'; state.currentQ=MCQ[MCQ.length-1].n; }
  }
  renderQuestion();
}

function nextQ() {
  if(state.mode==='random') { randNext(); return; }
  if(isLastQ()) { showResults(); return; }
  if(state.section==='mcq') {
    const idx=MCQ.findIndex(q=>q.n===state.currentQ);
    if(idx<MCQ.length-1) state.currentQ=MCQ[idx+1].n;
    else { state.section='calc'; state.currentQ=CALC[0].n; }
  } else {
    const idx=CALC.findIndex(q=>q.n===state.currentQ);
    if(idx<CALC.length-1) state.currentQ=CALC[idx+1].n;
  }
  renderQuestion();
}

function showResults() {
  clearInterval(state.timerRef);
  document.getElementById('app').style.display='none';
  const el=document.getElementById('results');
  el.style.display='block';
  
  // Determine which MCQ/CALC questions are in scope
  const scopeMCQ = state.mode==='random'
    ? state.randomPool.filter(x=>x.type==='mcq').map(x=>MCQ.find(q=>q.n===x.n)).filter(Boolean)
    : MCQ;
  const scopeCALC = state.mode==='random'
    ? state.randomPool.filter(x=>x.type==='calc').map(x=>CALC.find(q=>q.n===x.n)).filter(Boolean)
    : CALC;
  const correct=scopeMCQ.filter(q=>state.answers[q.n]===q.ans).length;
  const wrong=scopeMCQ.filter(q=>state.answers[q.n]&&state.answers[q.n]!==q.ans).length;
  const unanswered=scopeMCQ.length-Object.keys(state.answers).length;
  const calcScore=scopeCALC.filter(q=>state.calcChecked[q.n]).length*2;
  const mcqScore=correct;
  const total=mcqScore+calcScore;
  const maxScore=scopeMCQ.length*1+scopeCALC.length*2;
  const pct=maxScore>0?Math.round(total/maxScore*100):0;
  
  const m=Math.floor(state.seconds/60);
  const s=state.seconds%60;
  const timeStr=m+'分'+s+'秒';
  
  let grade='',gradeColor='';
  if(pct>=85){grade='優秀 🏆';gradeColor='#059669';}
  else if(pct>=70){grade='通過 ✅';gradeColor='#0891B2';}
  else if(pct>=60){grade='及格 📝';gradeColor='#E97316';}
  else{grade='繼續加油 💪';gradeColor='#DC2626';}
  
  const wrongItems=scopeMCQ.filter(q=>state.answers[q.n]&&state.answers[q.n]!==q.ans);
  const unansweredItems=scopeMCQ.filter(q=>!state.answers[q.n]);
  
  el.innerHTML=`
    <div class="res-hero">
      <div style="font-size:2.5rem;margin-bottom:.3rem;">📊 成績報告</div>
      <div class="res-score">${total}</div>
      <div class="res-total">/ ${maxScore} 分（${pct}%）</div>
      <div class="res-grade" style="color:${gradeColor}">${grade}</div>
      <div style="font-size:.9rem;color:#a0c4e8;margin-top:.3rem;">用時：${timeStr}</div>
      <div class="res-grid">
        <div class="res-stat"><div class="res-stat-n">${mcqScore}/70</div><div class="res-stat-l">選擇題得分</div></div>
        <div class="res-stat"><div class="res-stat-n">${calcScore}/60</div><div class="res-stat-l">計算題得分（自評）</div></div>
        <div class="res-stat"><div class="res-stat-n">${correct}/${correct+wrong}</div><div class="res-stat-l">選擇題答對率</div></div>
      </div>
    </div>
    
    <div class="res-card">
      <h3>🔍 選擇題詳細分析</h3>
      <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;">
        <span style="background:#dcfce7;color:#059669;padding:.3rem .7rem;border-radius:6px;font-size:.85rem;">✅ 答對 ${correct} 題</span>
        <span style="background:#fee2e2;color:#dc2626;padding:.3rem .7rem;border-radius:6px;font-size:.85rem;">❌ 答錯 ${wrong} 題</span>
        <span style="background:#fef3c7;color:#d97706;padding:.3rem .7rem;border-radius:6px;font-size:.85rem;">⬜ 未答 ${unanswered} 題</span>
      </div>
      ${wrongItems.length===0&&unansweredItems.length===0?'<div style="color:var(--green);font-weight:600;padding:1rem;text-align:center;">🎉 選擇題全部答對！</div>':''}
      ${wrongItems.map(q=>`
        <div class="review-item">
          <div class="ri-icon">❌</div>
          <div class="ri-q">
            <b>Q${q.n} ${getChapter(q.n)}</b>
            ${q.q}<br>
            <small>您的答案：<span style="color:var(--red)">${state.answers[q.n]}</span>　正解：<span style="color:var(--green)">${q.ans}</span>　${q.expl}</small>
          </div>
        </div>`).join('')}
      ${unansweredItems.map(q=>`
        <div class="review-item">
          <div class="ri-icon">⬜</div>
          <div class="ri-q">
            <b>Q${q.n} ${getChapter(q.n)} — 未作答</b>
            ${q.q}<br><small>正解：<span style="color:var(--green)">${q.ans}</span>　${q.expl}</small>
          </div>
        </div>`).join('')}
    </div>
    
    <div class="res-card">
      <h3>🧮 計算題答案（自評參考）</h3>
      ${CALC.map(q=>`
        <div class="calc-review-item">
          <div class="cri-q">Q${q.n} ${q.ch} ${state.calcChecked[q.n]?'✅':''} </div>
          <div class="cri-ans">▶ ${q.ans}</div>
        </div>`).join('')}
    </div>
    
    <div style="text-align:center;padding:1.5rem 0 3rem;">
      <button class="btn-retry" onclick="location.reload()">🔄 重新作答</button>
    </div>`;
}


// Mobile: add grid toggle button
function addMobileGridToggle() {
  if (window.innerWidth > 768) return;
  const existing = document.getElementById('grid-toggle');
  if (existing) return;
  const btn = document.createElement('button');
  btn.id = 'grid-toggle';
  btn.textContent = '▼ 顯示題號總覽';
  btn.style.display = 'none'; // will be shown by CSS media query
  btn.onclick = function() {
    const grid = document.querySelector('.q-grid');
    const isOpen = grid.classList.contains('mobile-open');
    grid.classList.toggle('mobile-open', !isOpen);
    btn.textContent = isOpen ? '▼ 顯示題號總覽' : '▲ 收起題號總覽';
  };
  const aside = document.querySelector('aside');
  const secTabs = document.querySelector('.sec-tabs');
  aside.insertBefore(btn, secTabs.nextSibling);
}

// Init
document.getElementById('start').style.display='flex';
document.getElementById('app').style.display='none';
</script>

      <div class="wrong-empty"><div class="big">🎉</div>目前沒有錯題記錄！</div>
    </div>
  </div>
</div>
