<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CQT 綜合模擬考卷 — 互動版</title>
<style>
/* ═══════════════════════════════════════
   CQT 互動考卷 — Design v2  
   ═══════════════════════════════════════ */
:root{
  --navy:#1C3A5F; --teal:#0891B2; --orange:#E97316;
  --green:#059669; --red:#DC2626; --purple:#7C3AED;
  --bg:#F0F6FF; --dark:#1E293B; --gray:#64748B;
  --lgray:#E2E8F0; --white:#fff;
  --shadow-sm:0 1px 4px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.12);
  --shadow-lg:0 12px 40px rgba(0,0,0,.18);
  --radius:12px; --radius-sm:8px;
  --transition:.18s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Microsoft JhengHei","微軟正黑體",system-ui,Arial,sans-serif;
  background:var(--bg);color:var(--dark);-webkit-tap-highlight-color:transparent;}

/* ════════════════════════════════════════
   START SCREEN
   ════════════════════════════════════════ */
#start{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:1.5rem;
  background:linear-gradient(145deg,#0f2444 0%,#1C3A5F 45%,#1a5f7a 100%);
  position:relative;overflow:hidden;
}
#start::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 70% 30%,rgba(8,145,178,.25) 0%,transparent 70%);
  pointer-events:none;
}

.start-card{
  background:rgba(255,255,255,.97);
  border-radius:20px;padding:2rem 2rem 1.5rem;
  max-width:620px;width:100%;
  box-shadow:var(--shadow-lg);
  position:relative;z-index:1;
}

/* Logo / hero */
.start-logo{
  font-size:2.4rem;font-weight:900;color:var(--navy);
  letter-spacing:-.02em;line-height:1.1;
}
.start-sub{
  font-size:1rem;color:var(--teal);font-weight:600;
  margin-top:.25rem;margin-bottom:1.2rem;
}

/* Info grid */
.start-info{
  display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.3rem;
}
.info-box{
  background:var(--bg);border-radius:10px;padding:.8rem 1rem;
  border-left:3px solid var(--teal);
}
.info-box b{color:var(--navy);display:block;margin-bottom:.2rem;font-size:.88rem;}
.info-box span{color:var(--gray);font-size:.8rem;line-height:1.4;}

/* Section label */
.mode-label{
  font-weight:700;color:var(--navy);font-size:.9rem;
  margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem;
}

/* Mode grid */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.8rem;}
.mode-btn{
  border:2px solid var(--lgray);border-radius:var(--radius);padding:1rem;
  cursor:pointer;text-align:left;background:var(--white);
  transition:var(--transition);position:relative;
}
.mode-btn:hover{border-color:var(--teal);background:#f0f9ff;transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.mode-btn.selected{
  border-color:var(--navy);background:#dbeafe;
  box-shadow:0 0 0 3px rgba(28,58,95,.12);
}
.mode-icon{font-size:1.6rem;margin-bottom:.4rem;}
.mode-title{font-weight:700;color:var(--navy);font-size:.95rem;}
.mode-desc{font-size:.78rem;color:var(--gray);margin-top:.25rem;line-height:1.4;}

/* Start button */
.btn-start{
  width:100%;padding:1rem;
  background:linear-gradient(135deg,var(--navy),#2563a8);
  color:white;border:none;border-radius:var(--radius);
  font-size:1.05rem;font-weight:700;cursor:pointer;
  font-family:inherit;transition:var(--transition);
  box-shadow:0 4px 14px rgba(28,58,95,.3);
  margin-top:.2rem;
}
.btn-start:hover{background:linear-gradient(135deg,var(--teal),#0369a1);
  box-shadow:0 6px 18px rgba(8,145,178,.35);transform:translateY(-1px);}
.btn-start:active{transform:translateY(0);}

.wrong-start-btn{
  width:100%;padding:.65rem;background:var(--white);
  border:2px solid var(--red);color:var(--red);
  border-radius:var(--radius);font-size:.9rem;font-weight:700;
  cursor:pointer;margin-top:.5rem;font-family:inherit;transition:var(--transition);
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.wrong-start-btn:hover{background:#fef2f2;}

/* Random setup */
.random-setup{
  background:#f8faff;border:1.5px solid #bfdbfe;border-radius:var(--radius);
  padding:1rem;margin-bottom:.8rem;display:none;
}
.random-setup.visible{display:block;}
.rand-presets{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem;}
.rand-preset{
  padding:.35rem .75rem;border-radius:20px;border:1.5px solid var(--lgray);
  background:var(--white);font-size:.82rem;cursor:pointer;font-family:inherit;
  font-weight:600;color:var(--gray);transition:var(--transition);
}
.rand-preset.active,.rand-preset:hover{border-color:var(--teal);color:var(--teal);background:#eff6ff;}
.rand-custom{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap;}
.rand-custom input{
  width:70px;padding:.35rem .5rem;border:1.5px solid var(--lgray);
  border-radius:6px;font-size:.88rem;font-family:inherit;
  text-align:center;color:var(--dark);
}
.rand-custom span{font-size:.82rem;color:var(--gray);}
.rand-type-row{display:flex;gap:.4rem;flex-wrap:wrap;}
.rand-type-btn{
  flex:1;min-width:80px;padding:.4rem .5rem;border-radius:7px;
  border:1.5px solid var(--lgray);background:var(--white);
  font-size:.78rem;font-weight:600;color:var(--gray);
  cursor:pointer;font-family:inherit;transition:var(--transition);text-align:center;
}
.rand-type-btn.active,.rand-type-btn:hover{border-color:var(--navy);color:var(--navy);background:#dbeafe;}

/* ════════════════════════════════════════
   APP SHELL
   ════════════════════════════════════════ */
#app{display:none;height:100vh;flex-direction:column;}

header{
  background:linear-gradient(90deg,var(--navy),#1a4f72);
  color:white;padding:.55rem 1rem;
  display:flex;align-items:center;gap:.75rem;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.hdr-home{
  background:rgba(255,255,255,.12);border:none;color:white;
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);flex-shrink:0;
}
.hdr-home:hover{background:rgba(255,255,255,.22);}
.hdr-title{font-size:.95rem;font-weight:700;flex:1;letter-spacing:-.01em;}
.hdr-timer{
  font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums;
  background:rgba(255,255,255,.12);padding:.25rem .7rem;
  border-radius:7px;min-width:76px;text-align:center;
  border:1px solid rgba(255,255,255,.15);
}
.hdr-timer.warn{background:#dc2626;border-color:#dc2626;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.hdr-score{
  font-size:.82rem;background:var(--teal);padding:.25rem .65rem;
  border-radius:7px;white-space:nowrap;font-weight:600;
}

.progress-bar{height:3px;background:rgba(255,255,255,.15);flex-shrink:0;}
.progress-fill{height:100%;background:var(--teal);transition:.4s;}

.layout{display:flex;flex:1;overflow:hidden;}

/* ════════════════════════════════════════
   SIDEBAR
   ════════════════════════════════════════ */
aside{
  width:230px;background:var(--white);
  border-right:1px solid var(--lgray);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.sec-tabs{display:flex;border-bottom:1px solid var(--lgray);flex-shrink:0;}
.sec-tab{
  flex:1;padding:.6rem .3rem;text-align:center;cursor:pointer;
  font-size:.78rem;font-weight:600;color:var(--gray);
  border-bottom:3px solid transparent;transition:var(--transition);
}
.sec-tab.active{color:var(--navy);border-bottom-color:var(--teal);}
.q-grid{padding:.6rem .7rem;overflow-y:auto;flex:1;}
.q-grid-title{font-size:.7rem;color:var(--gray);text-transform:uppercase;
  margin-bottom:.4rem;letter-spacing:.05em;font-weight:600;}
.q-dots{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:.8rem;}
.q-dot{
  aspect-ratio:1;border-radius:4px;background:var(--lgray);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:700;color:var(--gray);
  transition:var(--transition);border:none;
}
.q-dot:hover{background:#cbd5e1;transform:scale(1.1);}
.q-dot.answered{background:#dbeafe;color:var(--navy);}
.q-dot.correct{background:#dcfce7;color:var(--green);}
.q-dot.wrong{background:#fee2e2;color:var(--red);}
.q-dot.current{outline:2px solid var(--navy);outline-offset:1px;z-index:1;}
.sidebar-stats{
  padding:.65rem .8rem;border-top:1px solid var(--lgray);
  font-size:.78rem;color:var(--gray);flex-shrink:0;
}
.stat-row{display:flex;justify-content:space-between;margin-bottom:.3rem;}
.stat-val{font-weight:700;color:var(--dark);}

/* ════════════════════════════════════════
   MAIN QUESTION AREA
   ════════════════════════════════════════ */
main{flex:1;overflow-y:auto;padding:1.2rem;background:var(--bg);}

.q-card{
  background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow-md);overflow:hidden;
  max-width:760px;margin:0 auto;
}

/* Question header bar */
.q-header{
  background:linear-gradient(135deg,var(--navy),#1a4f72);
  color:white;padding:.85rem 1.1rem;
  display:flex;align-items:center;gap:.7rem;
}
.q-num{
  background:var(--teal);color:white;border-radius:7px;
  padding:.2rem .6rem;font-weight:800;font-size:.85rem;white-space:nowrap;
  letter-spacing:.02em;
}
.q-chapter{font-size:.75rem;color:#a0c4e8;flex:1;}

/* Question body */
.q-body{padding:1.2rem 1.2rem 1rem;}
.q-text{
  font-size:1.02rem;font-weight:600;color:var(--dark);
  line-height:1.65;margin-bottom:1.1rem;
}

/* Options */
.options{display:grid;gap:.5rem;}
.opt-btn{
  width:100%;text-align:left;padding:.75rem .95rem;
  border-radius:var(--radius-sm);border:2px solid var(--lgray);
  background:var(--white);cursor:pointer;
  font-size:.95rem;color:var(--dark);
  transition:var(--transition);font-family:inherit;line-height:1.45;
  display:flex;align-items:flex-start;gap:.65rem;
}
.opt-btn:hover:not(:disabled){border-color:var(--teal);background:#f0f9ff;}
.opt-btn.selected:not(.correct):not(.wrong){border-color:#94a3b8;background:#f8fafc;}
.opt-btn.correct{
  border-color:var(--green)!important;background:#f0fdf4!important;
  color:var(--green);font-weight:700;
}
.opt-btn.wrong{
  border-color:var(--red)!important;background:#fef2f2!important;
  color:#b91c1c;text-decoration:line-through;
}
.opt-btn:disabled{cursor:default;}
.opt-letter{
  min-width:26px;height:26px;border-radius:6px;
  background:var(--lgray);color:var(--gray);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.78rem;flex-shrink:0;margin-top:1px;
  transition:var(--transition);
}
.opt-btn:hover:not(:disabled) .opt-letter{background:var(--teal);color:white;}
.opt-btn.correct .opt-letter{background:var(--green);color:white;}
.opt-btn.wrong .opt-letter{background:var(--red);color:white;}
.opt-text{flex:1;}

/* Explanation box */
.expl-box{
  margin-top:.9rem;padding:.85rem 1rem;
  background:#fffbeb;border-left:4px solid var(--orange);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  font-size:.88rem;color:var(--dark);line-height:1.55;display:none;
}
.expl-box.show{display:block;}
.expl-box::before{content:"💡 解析：";font-weight:700;color:var(--orange);}

/* ════════════════════════════════════════
   CALC QUESTION
   ════════════════════════════════════════ */
.calc-q-box{
  background:#eff6ff;border:1.5px solid #bfdbfe;
  border-radius:var(--radius-sm);padding:.9rem 1.1rem;
  margin-bottom:.75rem;font-size:.96rem;font-weight:600;
  color:var(--navy);line-height:1.55;
}
.given-box{
  background:var(--teal);color:white;border-radius:var(--radius-sm);
  padding:.55rem .9rem;margin-bottom:.75rem;font-size:.85rem;
}
.given-label{font-weight:700;margin-bottom:.15rem;font-size:.8rem;opacity:.85;}
.work-area{
  border:2px dashed #cbd5e1;border-radius:var(--radius-sm);
  min-height:160px;padding:.9rem;margin:.75rem 0;position:relative;
  background:#fafbfd;
}
.work-label{
  position:absolute;top:.7rem;left:.8rem;
  font-size:.8rem;color:#cbd5e1;font-weight:600;pointer-events:none;
}
.work-area textarea{
  width:100%;min-height:120px;border:none;background:transparent;
  resize:none;font-family:inherit;font-size:.9rem;color:var(--dark);
  padding-top:1.6rem;outline:none;
}
.reveal-btn{
  padding:.6rem 1.3rem;background:var(--navy);color:white;border:none;
  border-radius:var(--radius-sm);cursor:pointer;font-size:.92rem;
  font-weight:600;font-family:inherit;transition:var(--transition);
}
.reveal-btn:hover{background:var(--teal);}
.solution-box{
  margin-top:.9rem;border:1.5px solid var(--lgray);
  border-radius:var(--radius-sm);overflow:hidden;display:none;
}
.solution-box.show{display:block;}
.sol-header{background:var(--navy);color:white;padding:.55rem 1rem;font-weight:700;font-size:.88rem;}
.steps{padding:.75rem 1rem;}
.step-row{display:flex;gap:.65rem;margin-bottom:.6rem;align-items:flex-start;}
.step-num{
  background:var(--orange);color:white;border-radius:6px;
  min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.78rem;flex-shrink:0;margin-top:2px;
}
.step-text{font-size:.88rem;color:var(--dark);line-height:1.5;padding-top:2px;}
.ans-banner{
  background:var(--green);color:white;padding:.6rem 1rem;
  font-weight:700;font-size:.9rem;
}
.calc-self-check{
  display:flex;align-items:center;gap:.6rem;margin-top:.75rem;
  padding:.65rem .9rem;background:#f0fdf4;border-radius:var(--radius-sm);
  font-size:.88rem;color:var(--dark);
}
.calc-self-check input{width:18px;height:18px;cursor:pointer;accent-color:var(--green);}

/* ════════════════════════════════════════
   NAV BUTTONS
   ════════════════════════════════════════ */
.q-nav{
  display:flex;align-items:center;justify-content:space-between;
  max-width:760px;margin:.9rem auto 0;gap:.5rem;
}
.nav-btn{
  padding:.6rem 1.1rem;border-radius:var(--radius-sm);
  border:2px solid var(--lgray);background:var(--white);
  cursor:pointer;font-size:.88rem;font-weight:600;
  color:var(--dark);font-family:inherit;transition:var(--transition);
}
.nav-btn:hover:not(:disabled){border-color:var(--navy);color:var(--navy);background:#f0f9ff;}
.nav-btn:disabled{opacity:.35;cursor:default;}
.nav-btn.primary{background:var(--navy);color:white;border-color:var(--navy);}
.nav-btn.primary:hover{background:var(--teal);border-color:var(--teal);}
.q-counter{font-size:.85rem;color:var(--gray);text-align:center;flex:1;}

.exam-submit-bar{
  background:var(--navy);color:white;padding:.75rem 1.2rem;
  border-radius:var(--radius);display:flex;align-items:center;
  justify-content:space-between;max-width:760px;margin:1rem auto 0;
  box-shadow:var(--shadow-sm);
}
.submit-btn{
  padding:.5rem 1.3rem;background:var(--orange);color:white;border:none;
  border-radius:var(--radius-sm);cursor:pointer;font-size:.9rem;
  font-weight:700;font-family:inherit;transition:var(--transition);
}
.submit-btn:hover{background:#c75f10;}

.exam-note{
  margin-top:.9rem;padding:.75rem;background:var(--bg);
  border-radius:var(--radius-sm);font-size:.85rem;color:var(--gray);text-align:center;
}

/* ════════════════════════════════════════
   RESULTS
   ════════════════════════════════════════ */
#results{display:none;min-height:100vh;background:var(--bg);padding:1.5rem;}
.res-hero{
  background:linear-gradient(145deg,var(--navy),#1a5f7a);color:white;
  border-radius:16px;padding:2rem 1.5rem;text-align:center;
  margin-bottom:1.2rem;max-width:680px;margin-left:auto;margin-right:auto;
  box-shadow:var(--shadow-lg);
}
.res-score{font-size:4rem;font-weight:900;color:var(--teal);line-height:1;}
.res-total{font-size:.92rem;color:#a0c4e8;margin-bottom:.8rem;}
.res-grade{font-size:1.3rem;font-weight:700;margin:.5rem 0;}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-top:.9rem;}
.res-stat{background:rgba(255,255,255,.1);border-radius:10px;padding:.75rem;}
.res-stat-n{font-size:1.5rem;font-weight:700;}
.res-stat-l{font-size:.75rem;color:#a0c4e8;}
.res-card{
  background:var(--white);border-radius:var(--radius);padding:1.3rem;
  max-width:680px;margin:0 auto .9rem;box-shadow:var(--shadow-sm);
}
.res-card h3{color:var(--navy);margin-bottom:.8rem;font-size:.95rem;font-weight:700;}
.review-item{
  padding:.55rem 0;border-bottom:1px solid var(--lgray);
  display:flex;align-items:flex-start;gap:.6rem;font-size:.85rem;
}
.review-item:last-child{border-bottom:none;}
.ri-icon{font-size:.95rem;flex-shrink:0;margin-top:2px;}
.ri-q{flex:1;}
.ri-q b{display:block;color:var(--dark);margin-bottom:.15rem;font-size:.88rem;}
.ri-q small{color:var(--gray);}
.btn-retry{
  padding:.75rem 2rem;background:var(--teal);color:white;border:none;
  border-radius:var(--radius);font-size:.95rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:var(--transition);
  box-shadow:0 4px 12px rgba(8,145,178,.3);
}
.btn-retry:hover{background:#0369a1;}
.calc-review-item{padding:.75rem 0;border-bottom:1px solid var(--lgray);font-size:.85rem;}
.calc-review-item:last-child{border-bottom:none;}
.cri-q{font-weight:600;color:var(--dark);margin-bottom:.25rem;}
.cri-ans{color:var(--green);font-size:.82rem;}
.section-switch-btn{
  padding:.45rem .9rem;background:var(--bg);border:2px solid var(--navy);
  color:var(--navy);border-radius:var(--radius-sm);cursor:pointer;
  font-size:.82rem;font-weight:600;font-family:inherit;transition:var(--transition);
}
.section-switch-btn:hover,.section-switch-btn.active{background:var(--navy);color:white;}

/* Resume bar */
#resume-bar{
  display:none;
  background:linear-gradient(135deg,#0891B2,#1C3A5F);color:white;
  padding:.75rem 1.1rem;border-radius:var(--radius);
  margin:1rem auto;max-width:620px;
  align-items:center;gap:.75rem;flex-wrap:wrap;font-size:.88rem;
  box-shadow:var(--shadow-md);
}
#resume-info{flex:1;min-width:180px;}
#resume-btn{
  background:var(--orange);color:white;border:none;padding:.4rem .85rem;
  border-radius:6px;cursor:pointer;font-weight:600;font-size:.83rem;
  font-family:inherit;transition:var(--transition);
}
#resume-btn:hover{background:#c75f10;}
#clear-btn-top{
  background:transparent;color:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.35);border-radius:6px;
  padding:.3rem .6rem;cursor:pointer;font-size:.75rem;font-family:inherit;
  transition:var(--transition);
}
#clear-btn-top:hover{background:rgba(255,255,255,.12);}

/* Notification */
.notification{
  position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--dark);color:white;padding:.65rem 1.4rem;
  border-radius:30px;font-size:.88rem;font-weight:600;
  opacity:0;transition:.3s;pointer-events:none;z-index:9999;white-space:nowrap;
  box-shadow:var(--shadow-md);
}
.notification.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Wrong answer panel */
.wrong-panel{
  position:fixed;inset:0;z-index:1000;display:none;
  background:rgba(0,0,0,.45);backdrop-filter:blur(2px);
}
.wrong-panel.open{display:flex;justify-content:flex-end;}
.wrong-drawer{
  background:white;width:min(500px,100vw);height:100vh;overflow-y:auto;
  box-shadow:-6px 0 30px rgba(0,0,0,.25);display:flex;flex-direction:column;
  animation:slideIn .2s ease;
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.wrong-header{
  background:linear-gradient(135deg,var(--navy),#1a4f72);color:white;
  padding:.9rem 1.1rem;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:1;
}
.wrong-header h2{font-size:1rem;margin:0;}
.wrong-close{
  background:rgba(255,255,255,.12);border:none;color:white;
  font-size:1.2rem;cursor:pointer;line-height:1;
  width:32px;height:32px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;transition:var(--transition);
}
